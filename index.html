<style>

   con sus valores light originales. Así browsers agresivos (Samsung Internet Night Mode,
   Chrome Android Auto Dark) ven "sitio tiene dark propio", respetan el CSS y NO remapean. */

    color-scheme:light!important;

    --olive:#5E6B2E!important;

    --sand:#E8E2D4!important;
    --bone:#F2EDE0!important;
    --cream:#FAF7EF!important;
    --ink:#1A1810!important;
    --muted:#6B6650!important;
    --border:rgba(26,24,16,.08)!important;
  }
  html,body{
    background-color:#F2EDE0!important;
    background-image:linear-gradient(#F2EDE0,#F2EDE0)!important;
    color:#1A1810!important;
  }
  img,svg,video,picture,iframe{filter:none!important}
}

.rule{height:1px;background:currentColor;opacity:.12}

.hp-field{position:absolute !important;left:-10000px !important;top:auto;width:1px;height:1px;overflow:hidden}

@media(prefers-reduced-motion:reduce){

/* ═══════════ BOOKING WIZARD ═══════════ */
const BookingWizard=({open,onClose,svcs,blocks,initialSvcId,coupons,payment})=>{
  const[step,setStep]=useState("servicio"); // servicio | fecha | datos | exito
  const[selSvc,setSelSvc]=useState(null);
  const[viewMode,setViewMode]=useState("week");
  // Cursor inicial: primer día reservable, avanzando a la próxima semana si la actual queda toda en el pasado
  const initialCursor=()=>{
    const tomorrow=addDays(new Date(),1);
    const monday=mondayOf(tomorrow);
    const saturday=addDays(monday,5);
    return toISO(saturday)<toISO(tomorrow) ? addDays(monday,7) : tomorrow;
  };
  const[cursorDate,setCursorDate]=useState(initialCursor);
  const[selDate,setSelDate]=useState("");
  const[selTime,setSelTime]=useState("");
  const[takenSlots,setTakenSlots]=useState([]);
  const[loadingSlots,setLoadingSlots]=useState(false);
  const[fm,setFm]=useState(()=>{
    try{
      const saved=JSON.parse(localStorage.getItem("gf_client_data"));
      if(saved&&saved.n) return {n:saved.n,em:saved.em||"",ph:saved.ph||"",country:saved.country||"AR"};
    }catch(_){}
    return {n:"",em:"",ph:"",country:"AR",hp:""};
  });
  const[couponInput,setCouponInput]=useState("");
  const[couponApplied,setCouponApplied]=useState(null); // {code,discount}
  const[couponError,setCouponError]=useState("");
  const[emailSugg,setEmailSugg]=useState("");
  const[submitting,setSubmitting]=useState(false);
  const[submitError,setSubmitError]=useState("");
  const[sentData,setSentData]=useState(null);

  const todayISO=toISO(new Date());
  const minISO=toISO(addDays(new Date(),1));

  // ESC + body scroll lock
  useEffect(()=>{
    if(!open)return;
    const onKey=e=>{if(e.key==="Escape")handleClose()};
    document.addEventListener("keydown",onKey);
    const prev=document.body.style.overflow;
    document.body.style.overflow="hidden";
    return()=>{document.removeEventListener("keydown",onKey);document.body.style.overflow=prev};
    // eslint-disable-next-line
  },[open]);

  // Initial service from deep link
  useEffect(()=>{
    if(!open||!initialSvcId||!svcs.length)return;
    const s=svcs.find(x=>x.id===initialSvcId);
    if(s){setSelSvc(s);setStep("fecha");}
  },[open,initialSvcId,svcs]);

  // Load taken slots when date changes
  useEffect(()=>{
    if(!selDate||!sb){setTakenSlots([]);setLoadingSlots(false);return}
    setSelTime("");
    let cancelled=false;
    setLoadingSlots(true);
    sb.from("gf_appointments_slots").select("time_slot,service_id,status")
      .eq("appointment_date",selDate)
      .then(({data})=>{if(!cancelled){setTakenSlots(data||[]);setLoadingSlots(false)}},
            ()=>{if(!cancelled){setTakenSlots([]);setLoadingSlots(false)}});
    return()=>{cancelled=true};
  },[selDate]);

  const resetWizard=()=>{
    setStep("servicio");setSelSvc(null);setSelDate("");setSelTime("");
    setFm({n:"",em:"",ph:"",country:"AR"});setSentData(null);setSubmitError("");setEmailSugg("");
    setCursorDate(initialCursor());setViewMode("week");setTakenSlots([]);
    setCouponInput("");setCouponApplied(null);setCouponError("");
  };

  const isDirty=()=>{
    if(step==="exito")return false;
    return !!(selSvc||selDate||selTime||fm.n||fm.em||fm.ph);
  };
  const handleClose=()=>{
    if(isDirty()&&!window.confirm("¿Descartar reserva? Vas a perder los datos que ya cargaste."))return;
    resetWizard();onClose();
  };

  const applyCoupon=async()=>{
    setCouponError("");
    const code=(couponInput||"").trim().toUpperCase();
    if(!code){setCouponError("Ingresá un código.");return}
    const c=coupons.find(x=>x.code.toUpperCase()===code);
    if(!c){setCouponError("Código no válido.");return}
    if(!c.active){setCouponError("Cupón inactivo.");return}
    const today=todayISO;
    if(c.valid_from&&today<c.valid_from){setCouponError("Cupón aún no vigente.");return}
    if(c.valid_to&&today>c.valid_to){setCouponError("Cupón vencido.");return}
    if(c.max_uses&&c.uses_count>=c.max_uses){setCouponError("Cupón agotado.");return}
    if(c.applies_to==="services"&&c.applies_ids?.length&&selSvc&&!c.applies_ids.includes(selSvc.id)){
      setCouponError("Este cupón no aplica a este servicio.");return;
    }
    if(c.applies_to==="packs"){setCouponError("Este cupón es para packs, no servicios.");return}
    const price=Number(selSvc?.price)||0;
    if(c.min_amount&&price<Number(c.min_amount)){setCouponError(`Mínimo ${fP(c.min_amount)} para usar este cupón.`);return}
    // Validaciones por-cliente: requieren email cargado
    const needsClientCheck = c.first_visit_only || (c.max_per_client && c.max_per_client>0);
    if(needsClientCheck){
      const email=(fm.em||"").trim().toLowerCase();
      if(!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
        setCouponError("Ingresá tu email primero para validar el cupón.");return;
      }
      try{
        const{data:prev}=await sb.from("gf_appointments")
          .select("id,coupon_code,status")
          .ilike("client_email",email);
        const effective=(prev||[]).filter(r=>r.status!=="cancelled");
        if(c.first_visit_only && effective.length>0){
          setCouponError("Este cupón es solo para el primer turno.");return;
        }
        if(c.max_per_client && c.max_per_client>0){
          const used=effective.filter(r=>(r.coupon_code||"").toUpperCase()===c.code.toUpperCase()).length;
          if(used>=c.max_per_client){
            setCouponError(`Ya usaste este cupón ${used===1?"una vez":used+" veces"}.`);return;
          }
        }
      }catch(_){/* si falla la consulta, dejamos que el server-side / submit vuelva a chequear */}
    }
    const discount=c.type==="percent"?Math.round(price*Number(c.value)/100):Math.min(Number(c.value),price);
    setCouponApplied({code:c.code,discount,type:c.type,value:Number(c.value)});
  };
  const removeCoupon=()=>{setCouponApplied(null);setCouponInput("");setCouponError("")};

  const finalPrice=useMemo(()=>{
    if(!selSvc)return 0;
    return Math.max(0,Number(selSvc.price)-(couponApplied?.discount||0));
  },[selSvc,couponApplied]);

  const handleSubmit=async(e)=>{
    e.preventDefault();setSubmitError("");
    const{n,em,ph,country,hp}=fm;
    // Honeypot: humanos no ven el campo .hp-field, bots sí lo completan.
    // Simulamos éxito para no revelar la detección — el turno NO se crea.
    if(hp){
      console.warn("[booking] honeypot hit — bot filtered");
      setSentData({svcName:selSvc?.name||"",date:selDate,time:selTime,name:n,finalPrice:0,whatsapp:""});
      setStep("exito");
      return;
    }
    if(!n||!em||!ph||!selSvc||!selDate||!selTime){setSubmitError("Completá todos los campos.");return}
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em.trim())){setSubmitError("Ingresá un email válido.");return}
    const digits=ph.replace(/\D/g,'');
    if(digits.length<7){setSubmitError("Ingresá un teléfono válido.");return}
    if(!sb){setSubmitError("Error de conexión. Intentá de nuevo.");return}
    setSubmitting(true);
    try{
      // Re-check collision with fresh data
      const{data:freshSlots}=await sb.from("gf_appointments_slots").select("time_slot,service_id,status").eq("appointment_date",selDate);
      const dur=selSvc.duration_minutes||60;
      const sMin=toMin(selTime),eMin=sMin+dur;
      const collision=freshSlots&&freshSlots.some(r=>{
        if(r.status==="cancelled")return false;
        const aMin=toMin(r.time_slot);
        const aDur=(svcs.find(s=>s.id===r.service_id)?.duration_minutes)||60;
        return aMin<eMin&&(aMin+aDur)>sMin;
      });
      if(collision){
        setTakenSlots(freshSlots);setSelTime("");
        setSubmitError("Ese horario acaba de ser reservado. Elegí otro.");
        setSubmitting(false);setStep("fecha");return;
      }
      const phoneFmt=normPhoneByCountry(ph,country);
      // UUID generado en cliente: evita necesidad de SELECT policy para leer el insert con RETURNING.
      const apptId=(crypto.randomUUID?crypto.randomUUID():null);
      const apptInsert={
        ...(apptId?{id:apptId}:{}),
        client_name:n.trim(),client_email:em.trim(),client_phone:phoneFmt,
        service_id:selSvc.id,appointment_date:selDate,time_slot:selTime,status:"pending"
      };
      // Defensive: try with new fields, fallback if column missing
      if(couponApplied){
        apptInsert.coupon_code=couponApplied.code;
        apptInsert.discount_amount=couponApplied.discount;
        apptInsert.final_price=finalPrice;
      }
      let {error}=await sb.from("gf_appointments").insert(apptInsert);
      if(error&&(error.message||"").includes("column")){
        // Fallback: insert without new columns
        const fallback={...apptInsert};
        delete fallback.coupon_code;delete fallback.discount_amount;delete fallback.final_price;
        const r=await sb.from("gf_appointments").insert(fallback);
        error=r.error;
      }
      if(error){
        if(error.code==="23505"){
          setSubmitError("Ese horario acaba de ser reservado. Elegí otro.");
          setTakenSlots(p=>[...p,{time_slot:selTime,service_id:selSvc.id,status:"pending"}]);
          setSelTime("");setStep("fecha");
        }else{
          setSubmitError("Error al reservar. Intentá de nuevo.");
        }
        setSubmitting(false);return;
      }
      // Upsert client (idempotent by phone) — ignoreDuplicates:true evita UPDATE,
      // que no está permitido para anon bajo RLS. El admin puede editar desde el panel.
      try{
        await sb.from("gf_clients").upsert({name:n.trim(),phone:phoneFmt,email:em.trim()},{onConflict:"phone",ignoreDuplicates:true});
      }catch(_){/* tabla puede no existir aún */}
      // Bump coupon usage vía Edge Function (RLS bloquea UPDATE desde anon).
      // Si falla el server responde { ok:false, error } y la reserva ya está
      // hecha — no rollbackeamos para no perder el turno por un error del bump.
      if(couponApplied){
        try{
          await fetch(`${SB_URL}/functions/v1/bump-coupon-usage`,{
            method:"POST",
            headers:{"Content-Type":"application/json","apikey":SB_KEY},
            body:JSON.stringify({code:couponApplied.code})
          });
        }catch(_){}
      }
      const df=fromISO(selDate).toLocaleDateString("es-AR",{weekday:"long",day:"numeric",month:"long"});
      try{
        await fetch(`${SB_URL}/functions/v1/notify-booking`,{
          method:"POST",headers:{"Content-Type":"application/json","apikey":SB_KEY},
          body:JSON.stringify({nombre:n.trim(),email:em.trim(),telefono:phoneFmt,servicio:selSvc.name,fecha:df,horario:selTime,precio:fP(finalPrice)})
        });
      }catch(_){}
      // Persistir datos del cliente para próximas reservas
      try{localStorage.setItem("gf_client_data",JSON.stringify({n:n.trim(),em:em.trim(),ph:ph,country}));}catch(_){}
      setSentData({appointment_id:apptId||null,nombre:n.trim(),email:em.trim(),servicio:selSvc.name,fecha:df,horario:selTime,precio:fP(finalPrice),final_price:finalPrice,fecha_raw:selDate,dur_min:selSvc.duration_minutes||60,coupon:couponApplied?.code||null,discount:couponApplied?.discount||0});
      setSubmitting(false);setStep("exito");
    }catch(err){
      setSubmitError("Error de conexión. Intentá de nuevo.");setSubmitting(false);
    }
  };

  if(!open)return null;

  const STEPS=[{id:"servicio",label:"Servicio"},{id:"fecha",label:"Fecha y horario"},{id:"datos",label:"Tus datos"}];
  const curIdx=STEPS.findIndex(s=>s.id===step);

  return(
    <div className="bk-overlay flex items-center justify-center p-0 sm:p-6">
      <div className="absolute inset-0" onClick={handleClose}/>
      <div className="bk-modal" role="dialog" aria-modal="true">
        {/* Header */}
        <div className="flex-shrink-0 px-6 sm:px-8 pt-6 pb-5 border-b" style={{borderColor:"var(--border)"}}>
          <div className="flex items-center justify-between mb-4">
            <span className="sec-label" style={{color:"var(--olive)"}}>Reserva</span>
            <button onClick={handleClose} aria-label="Cerrar reserva" className="w-9 h-9 rounded-full flex items-center justify-center transition-colors hover:bg-black/5">
              <svg aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
          </div>
          {step!=="exito"&&(
            <div className="flex items-center gap-2 overflow-x-auto">
              {STEPS.map((s,i)=>(
                <React.Fragment key={s.id}>
                  <button
                    onClick={()=>i<curIdx&&setStep(s.id)}
                    disabled={i>curIdx}
                    className="flex items-center gap-2.5 transition-opacity flex-shrink-0"
                    style={{opacity:i===curIdx?1:i<curIdx?.55:.3,cursor:i<curIdx?"pointer":"default"}}>
                    <span className="mono text-[10px] tracking-[.15em]" style={{color:"var(--muted)"}}>0{i+1}</span>
                    <span className="text-[12px]" style={{color:"var(--ink)",fontWeight:i===curIdx?500:400}}>{s.label}</span>
                  </button>
                  {i<STEPS.length-1&&<span className="w-6 h-px flex-shrink-0" style={{background:"var(--border)"}}/>}
                </React.Fragment>
              ))}
            </div>
          )}
        </div>

        {/* Body */}
        <div className="flex-1 overflow-y-auto">
          <div className="bk-step-body" key={step}>
            {step==="servicio"&&<StepService svcs={svcs} onSelect={s=>{setSelSvc(s);setStep("fecha");setSelDate("");setSelTime("")}} selected={selSvc}/>}

            {step==="fecha"&&<StepDate selSvc={selSvc} viewMode={viewMode} setViewMode={setViewMode}
              cursorDate={cursorDate} setCursorDate={setCursorDate}
              selDate={selDate} setSelDate={setSelDate}
              selTime={selTime} setSelTime={setSelTime}
              takenSlots={takenSlots} loadingSlots={loadingSlots}
              svcs={svcs} blocks={blocks} minISO={minISO} todayISO={todayISO}
              onNext={()=>setStep("datos")} onBack={()=>setStep("servicio")}/>}

            {step==="datos"&&<StepData selSvc={selSvc} selDate={selDate} selTime={selTime}
              fm={fm} setFm={setFm} emailSugg={emailSugg} setEmailSugg={setEmailSugg}
              couponInput={couponInput} setCouponInput={setCouponInput}
              couponApplied={couponApplied} couponError={couponError}
              applyCoupon={applyCoupon} removeCoupon={removeCoupon}
              finalPrice={finalPrice}
              onSubmit={handleSubmit} submitting={submitting} submitError={submitError}
              onBack={()=>setStep("fecha")}
              onEditSvc={()=>setStep("servicio")} onEditDate={()=>setStep("fecha")}/>}

            {step==="exito"&&sentData&&<StepExito data={sentData} payment={payment} onClose={handleClose} onNew={resetWizard}/>}
          </div>
        </div>
      </div>
    </div>
  );
};

/* ------- Step 1: Servicio ------- */
const StepService=({svcs,onSelect,selected})=>{
  const cats=useMemo(()=>{
    const set=new Set(svcs.map(s=>s.category||"otros"));
    return ["todos",...Array.from(set)];
  },[svcs]);
  const[cat,setCat]=useState("todos");
  const visible=svcs.filter(s=>cat==="todos"||(s.category||"otros")===cat);
  return(
    <div className="p-6 sm:p-8">
      <h2 className="serif text-[1.75rem] leading-tight mb-1" style={{color:"var(--ink)"}}>¿Qué te hacés hoy?</h2>
      <p className="text-[13px] mb-5" style={{color:"var(--muted)"}}>Elegí el servicio que vas a reservar.</p>
      {cats.length>2&&(
        <div className="flex flex-wrap gap-1.5 mb-5">
          {cats.map(c=>(
            <button key={c} onClick={()=>setCat(c)}
              className="text-[11px] px-3 py-1.5 rounded-full capitalize transition-colors"
              style={{
                background:cat===c?"var(--ink)":"rgba(94,107,46,.06)",
                color:cat===c?"var(--cream)":"var(--olive-dk)",
              }}>{c}</button>
          ))}
        </div>
      )}
      <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
        {visible.length===0?(
          <p className="text-sm py-8 col-span-full text-center" style={{color:"var(--muted)"}}>Cargando servicios…</p>
        ):visible.map(s=>{
          const sel=selected?.id===s.id;
          return(
            <button key={s.id} onClick={()=>onSelect(s)} className="text-left p-4 rounded transition-all hover:shadow-sm"
              style={{background:sel?"rgba(94,107,46,.06)":"rgba(255,255,255,.6)",
                      border:`1px solid ${sel?"var(--olive)":"var(--border)"}`}}>
              <div className="flex items-start justify-between gap-2 mb-2">
                <span className="text-[14px] font-medium" style={{color:"var(--ink)"}}>{s.name}</span>
                <span className="mono text-[11px] px-2 py-0.5 rounded-full flex-shrink-0"
                      style={{background:"rgba(94,107,46,.08)",color:"var(--olive-dk)"}}>{fDur(s.duration_minutes||60)}</span>
              </div>
              {s.description&&<p className="text-[12px] leading-relaxed mb-3" style={{color:"var(--muted)"}}>{s.description}</p>}
              <div className="flex items-center justify-between mt-auto">
                <span className="serif text-[18px]" style={{color:"var(--olive-dk)"}}>{fP(s.price)}</span>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" style={{color:"var(--olive)"}}>
                  <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
              </div>
            </button>
          );
        })}
      </div>
    </div>
  );
};

/* ------- Step 2: Fecha + Hora ------- */
const StepDate=({selSvc,viewMode,setViewMode,cursorDate,setCursorDate,selDate,setSelDate,selTime,setSelTime,takenSlots,loadingSlots,svcs,blocks,minISO,todayISO,onNext,onBack})=>{
  const dur=selSvc?.duration_minutes||60;

  const monday=mondayOf(cursorDate);
  const week=weekDaysFrom(monday);
  const weekRange=`${week[0].getDate()} ${MONTH_ABBR[week[0].getMonth()]} — ${week[5].getDate()} ${MONTH_ABBR[week[5].getMonth()]}`;

  const monthFirst=new Date(cursorDate.getFullYear(),cursorDate.getMonth(),1);
  const monthGrid=(()=>{
    const firstDow=monthFirst.getDay();
    const lead=firstDow===0?6:firstDow-1;
    const days=new Date(cursorDate.getFullYear(),cursorDate.getMonth()+1,0).getDate();
    const cells=[];for(let i=0;i<lead;i++)cells.push(null);
    for(let d=1;d<=days;d++)cells.push(new Date(cursorDate.getFullYear(),cursorDate.getMonth(),d));
    return cells;
  })();

  const slotsList=selDate?(()=>{
    const all=genSlots(dur);
    return all.map(t=>({t,ok:slotAvailable(t,dur,takenSlots,svcs,blocks,selDate)}));
  })():[];

  const morning=slotsList.filter(s=>toMin(s.t)<13*60);
  const afternoon=slotsList.filter(s=>toMin(s.t)>=13*60);
  const anyAvail=slotsList.some(s=>s.ok);

  return(
    <div className="flex flex-col h-full">
      <div className="flex-1 overflow-y-auto px-6 sm:px-8 pt-6 pb-4">
        <div className="flex items-start justify-between gap-4 mb-5">
          <div>
            <h2 className="serif text-[1.5rem] leading-tight" style={{color:"var(--ink)"}}>Elegí fecha</h2>
            <p className="text-[13px] mt-1" style={{color:"var(--muted)"}}>{selSvc?.name} · {fDur(dur)} · {fP(selSvc?.price||0)}</p>
          </div>
          <div className="flex rounded-full p-0.5" style={{background:"rgba(0,0,0,.04)"}}>
            {[["week","Semana"],["month","Mes"]].map(([k,l])=>(
              <button key={k} onClick={()=>setViewMode(k)}
                aria-label={`Ver calendario por ${l.toLowerCase()}`} aria-pressed={viewMode===k}
                className="px-3.5 py-1.5 rounded-full text-[12px] transition-all"
                style={{background:viewMode===k?"var(--cream)":"transparent",color:viewMode===k?"var(--ink)":"var(--muted)",fontWeight:viewMode===k?500:400,boxShadow:viewMode===k?"0 1px 3px rgba(0,0,0,.06)":"none"}}>{l}</button>
            ))}
          </div>
        </div>

        {viewMode==="week"&&(
          <div className="mb-5">

/* ------- Step 4: Éxito ------- */
const DepositBlock=({payment,data})=>{
  const[mpUrl,setMpUrl]=useState(null);
  const[mpLoading,setMpLoading]=useState(false);

  const enabled=!!payment?.deposit_enabled;
  const mpOn=enabled && !!payment?.mp_enabled && !!data?.appointment_id;
  const hasTransfer=enabled && (!!payment?.cbu || !!payment?.alias);

  useEffect(()=>{
    if(!mpOn) return;
    setMpLoading(true);
    const amount=Number(payment.deposit_amount)>0 ? Number(payment.deposit_amount) : Math.max(1,Math.round((data.final_price||0)*0.3));
    fetch(`${SB_URL}/functions/v1/create-mp-preference`,{
      method:"POST",
      headers:{"Content-Type":"application/json","apikey":SB_KEY,"Authorization":`Bearer ${SB_KEY}`},
      body:JSON.stringify({
        appointment_id:data.appointment_id,
        service_name:data.servicio,
        amount,
        client_name:data.nombre,
        client_email:data.email||"",
      }),
    }).then(r=>r.json()).then(j=>{
      if(j?.configured && j?.init_point) setMpUrl(j.init_point);
    }).catch(()=>{}).finally(()=>setMpLoading(false));
  },[mpOn]);

  if(!enabled) return null;
  if(!mpUrl && !hasTransfer && !mpLoading) return null;

  const amountTxt=Number(payment.deposit_amount)>0 ? ` de ${fP(Number(payment.deposit_amount))}` : "";
  const waMsg=`Hola Guada! Reservé ${data.servicio} el ${data.fecha} a las ${data.horario} hs y quiero dejar la seña${amountTxt} por transferencia. ¿Me pasás CBU/alias?`;
  const waHref=`https://wa.me/${WA_GUADA}?text=${encodeURIComponent(waMsg)}`;

  return(
    <div className="text-left rounded p-4 mb-5 max-w-sm mx-auto w-full" style={{background:"rgba(94,107,46,.06)",border:"1px solid var(--border)"}}>
      <div className="mono text-[9px] uppercase tracking-[.2em] mb-1" style={{color:"var(--muted)"}}>Seña · opcional</div>
      <div className="text-[13px] mb-1" style={{color:"var(--ink)"}}>{payment.deposit_headline||"Realizá tu seña"}</div>
      <div className="text-[11px] mb-3" style={{color:"var(--muted)",lineHeight:1.4}}>{payment.deposit_copy||"Por Mercado Pago o transferencia — se descuenta del total."}</div>
      <div className="flex gap-2">
        {mpUrl ? (
          <a href={mpUrl} target="_blank" rel="noopener" className="btn btn-dk flex-1" style={{fontSize:12,padding:"10px 12px"}}>Mercado Pago</a>
        ) : mpLoading ? (
          <button disabled className="btn btn-dk flex-1" style={{fontSize:12,padding:"10px 12px",opacity:.55}}>Cargando…</button>
        ) : null}
        {hasTransfer && (
          <a href={waHref} target="_blank" rel="noopener" className="btn btn-ghost flex-1" style={{fontSize:12,padding:"10px 12px"}}>Transferencia</a>
        )}
      </div>
    </div>
  );
};

/* ═══════════ LANDING ═══════════ */
const Landing=({content,svcs,packs,promos,coupons,blocks,gallery,openBooking,openGallery})=>{
  const[scrolled,setScrolled]=useState(false);
  const[mobileNav,setMobileNav]=useState(false);

  useEffect(()=>{
    const onScroll=()=>setScrolled(window.scrollY>40);
    window.addEventListener("scroll",onScroll,{passive:true});
    const io=typeof IntersectionObserver!=="undefined"
      ? new IntersectionObserver(es=>es.forEach(e=>e.isIntersecting&&e.target.classList.add("vis")),{threshold:.01,rootMargin:"200px 0px 200px 0px"})
      : null;
    if(io){
      document.querySelectorAll(".reveal").forEach(el=>io.observe(el));
      setTimeout(()=>document.querySelectorAll(".reveal:not(.vis)").forEach(el=>{
        const r=el.getBoundingClientRect();
        if(r.top<window.innerHeight+200)el.classList.add("vis");
      }),300);
    }else{
      document.querySelectorAll(".reveal").forEach(el=>el.classList.add("vis"));
    }
    return()=>{window.removeEventListener("scroll",onScroll);if(io)io.disconnect()};
  },[]);
  // Re-observe revealed elements when async data lands
  useEffect(()=>{
    if(!svcs.length)return;
    const io=typeof IntersectionObserver!=="undefined"
      ? new IntersectionObserver(es=>es.forEach(e=>e.isIntersecting&&e.target.classList.add("vis")),{threshold:.01,rootMargin:"200px 0px 200px 0px"})
      : null;
    if(!io){document.querySelectorAll(".reveal:not(.vis)").forEach(el=>el.classList.add("vis"));return}
    document.querySelectorAll(".reveal:not(.vis)").forEach(el=>io.observe(el));
    return()=>io.disconnect();
  },[svcs,packs,coupons]);

  return(
    <div className="relative" style={{zIndex:2}}>
      <Nav scrolled={scrolled} mobileNav={mobileNav} setMobileNav={setMobileNav} onBook={()=>openBooking()} onGallery={openGallery}/>
      <Hero data={content.hero} onBook={()=>openBooking()}/>
      <Ticker svcs={svcs}/>
      <About data={content.about}/>
      <Services svcs={svcs} onPick={id=>openBooking(id)}/>
      <Packs packs={packs} onBook={()=>openBooking()}/>
      <Testimonios items={content.testimonials}/>

/* ---------- Gallery Overlay (antes/después) ---------- */
const GalleryOverlay=({open,onClose,items})=>{
  const[filter,setFilter]=useState("todos");
  const[expanded,setExpanded]=useState(null);
  useEffect(()=>{
    if(!open)return;
    const onKey=e=>{if(e.key==="Escape"){if(expanded)setExpanded(null);else onClose()}};
    document.addEventListener("keydown",onKey);
    const prev=document.body.style.overflow;
    document.body.style.overflow="hidden";
    return()=>{document.removeEventListener("keydown",onKey);document.body.style.overflow=prev};
  },[open,expanded,onClose]);
  if(!open)return null;
  const list=(items||[]).filter(i=>i.active!==false).sort((a,b)=>(a.display_order||0)-(b.display_order||0));
  const cats=["todos",...Array.from(new Set(list.map(i=>i.category||"otros")))];
  const visible=list.filter(i=>filter==="todos"||(i.category||"otros")===filter);
  return(
    <div className="gal-overlay" role="dialog" aria-modal="true" aria-label="Galería">
      <div className="gal-header">
        <div className="min-w-0 flex-1">
          <span className="sec-label mb-2" style={{color:"var(--olive)"}}>Trabajos</span>
          <h2 className="serif text-[clamp(1.75rem,4vw,3rem)] leading-[1.05] mt-3" style={{color:"var(--ink)"}}>
            El resultado <em style={{color:"var(--olive)"}}>habla por sí solo.</em>
          </h2>
        </div>
        <button onClick={onClose} aria-label="Cerrar galería" className="w-10 h-10 rounded-full flex items-center justify-center transition-colors hover:bg-black/5 flex-shrink-0" style={{border:"1px solid var(--border)"}}>
          <svg aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      {cats.length>2&&(
        <div className="gal-tabs">
          {cats.map(c=>(
            <button key={c} onClick={()=>setFilter(c)}
              className="text-[11px] px-3 py-1.5 rounded-full capitalize transition-colors flex-shrink-0"
              style={{background:filter===c?"var(--ink)":"rgba(94,107,46,.06)",color:filter===c?"var(--cream)":"var(--olive-dk)"}}>{c}</button>
          ))}
        </div>
      )}
      <div className="gal-body">
        {visible.length===0?(
          <EmptyGallery/>
        ):(
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
            {visible.map((it,i)=><GalleryCard key={it.id||i} item={it} onOpen={()=>setExpanded(it)}/>)}
          </div>
        )}
      </div>
      {expanded&&<GalleryLightbox item={expanded} onClose={()=>setExpanded(null)}/>}
    </div>
  );
};

const GalleryCard=({item,onOpen})=>{
  const[showBefore,setShowBefore]=useState(false);
  const hasBefore=!!item.before_url;
  const src=showBefore&&hasBefore?item.before_url:item.after_url;
  return(
    <figure className="overflow-hidden rounded-sm flex flex-col" style={{background:"var(--cream)",border:"1px solid var(--border)"}}>
      <button onClick={onOpen} aria-label={`Ampliar foto${item.title?": "+item.title:""}`} className="relative block w-full aspect-[4/5] overflow-hidden" style={{cursor:"zoom-in",background:"var(--sand)"}}>
        <img src={src} alt={item.title||""} className="w-full h-full object-cover" loading="lazy" onError={e=>{e.target.style.display="none"}}/>
        {hasBefore&&(
          <span className="absolute top-3 left-3 mono text-[10px] uppercase tracking-[.2em] px-2.5 py-1 rounded-full" style={{background:"rgba(26,24,16,.78)",color:"var(--cream)"}}>
            {showBefore?"antes":"después"}
          </span>
        )}
      </button>
      <figcaption className="p-4 flex items-start justify-between gap-3">
        <div className="min-w-0 flex-1">
          {item.title&&<div className="serif text-[16px] leading-tight" style={{color:"var(--ink)"}}>{item.title}</div>}
          {item.description&&<p className="text-[12.5px] leading-relaxed mt-1" style={{color:"var(--muted)"}}>{item.description}</p>}
        </div>
        {hasBefore&&(
          <button onClick={()=>setShowBefore(!showBefore)} aria-label={showBefore?"Mostrar foto de después":"Mostrar foto de antes"} aria-pressed={showBefore} className="mono text-[10px] uppercase tracking-[.15em] px-2.5 py-1.5 rounded-full flex-shrink-0 transition-colors" style={{background:"rgba(94,107,46,.08)",color:"var(--olive-dk)",border:"1px solid var(--border)"}}>

    </figure>
  );

     style={{background:"var(--olive-dk)",color:"var(--cream)",boxShadow:"0 8px 24px rgba(61,74,24,.3)"}}>

/* ═══════════ APP ROOT ═══════════ */
const App=()=>{
  const[bk,setBk]=useState(false);
  const[initialSvcId,setInitialSvcId]=useState(null);
  const[svcs,setSvcs]=useState([]);
  const[blocks,setBlocks]=useState([]);
  const[packs,setPacks]=useState([]);
  const[coupons,setCoupons]=useState([]);
  const[content,setContent]=useState(DEFAULT_CONTENT);
  const[gallery,setGallery]=useState([]);
  const[galleryOpen,setGalleryOpen]=useState(false);

  const handleBkClose=useCallback(()=>{setBk(false);setInitialSvcId(null);history.replaceState(null,"","/")},[]);
  const openBooking=svcId=>{setInitialSvcId(svcId||null);setBk(true)};
  const openGallery=useCallback(()=>setGalleryOpen(true),[]);
  const closeGallery=useCallback(()=>setGalleryOpen(false),[]);

  // Load all data
  const loadAll=useCallback(async()=>{
    if(!sb)return;
    // Services + blocks (always exist)
    try{
      const svcRes=await sb.from("gf_services").select("*").order("display_order",{ascending:true,nullsFirst:false});
      let svcData=svcRes.data;
      if(svcRes.error||!svcData){
        // Fallback if display_order doesn't exist yet
        const r=await sb.from("gf_services").select("*").order("id");
        svcData=r.data||[];
      }
      // Filter active (default true if column missing)
      svcData=(svcData||[]).filter(s=>s.active!==false);
      setSvcs(svcData);
    }catch(_){setSvcs([])}
    try{
      const{data}=await sb.from("gf_blocked_slots").select("*");
      setBlocks(data||[]);
    }catch(_){setBlocks([])}
    // Packs (may have new columns)
    try{
      const{data}=await sb.from("gf_packs").select("*");
      const visible=(data||[]).filter(p=>p.active!==false&&p.landing_visible!==false);
      setPacks(visible);
    }catch(_){setPacks([])}
    // Coupons (may not exist)
    try{
      const{data}=await sb.from("gf_coupons").select("*").eq("active",true);
      setCoupons(data||[]);
    }catch(_){setCoupons([])}
    // Content (may not exist)
    try{
      const{data}=await sb.from("gf_content").select("*");
      if(data&&data.length){
        const map={...DEFAULT_CONTENT};
        data.forEach(r=>{
          if(r.key==="schedule"){
            try{
              const sch=typeof r.value==="string"?JSON.parse(r.value):r.value;
              if(sch.open_min) SLOT_START=sch.open_min;
              if(sch.close_min) SLOT_END=sch.close_min;
              if(sch.slot_step) SLOT_STEP=sch.slot_step;
              if(sch.break_start) BREAK_START=sch.break_start;
              if(sch.break_end) BREAK_END=sch.break_end;
            }catch(_){}
          } else { map[r.key]=r.value; }
        });
        setContent(map);
      }
    }catch(_){/* fallback to defaults */}
    // Gallery (may not exist yet — Fase D.2)
    try{
      const{data}=await sb.from("gf_gallery").select("*").eq("active",true).order("display_order",{ascending:true});
      setGallery(data||[]);
    }catch(_){setGallery([])}
  },[]);

  useEffect(()=>{loadAll()},[loadAll]);

  // Realtime subscription with debounce
  useEffect(()=>{
    if(!sb)return;
    let timer=null;
    const debouncedReload=()=>{clearTimeout(timer);timer=setTimeout(loadAll,400)};
    const ch=sb.channel("gf-public-realtime")
      .on("postgres_changes",{event:"*",schema:"public",table:"gf_services"},debouncedReload)
      .on("postgres_changes",{event:"*",schema:"public",table:"gf_blocked_slots"},debouncedReload)
      .on("postgres_changes",{event:"*",schema:"public",table:"gf_packs"},debouncedReload)
      .on("postgres_changes",{event:"*",schema:"public",table:"gf_coupons"},debouncedReload)
      .on("postgres_changes",{event:"*",schema:"public",table:"gf_content"},debouncedReload)
      .on("postgres_changes",{event:"*",schema:"public",table:"gf_gallery"},debouncedReload)
      .subscribe();
    return()=>{clearTimeout(timer);sb.removeChannel(ch)};
  },[loadAll]);

  // Deep link ?book=1 (&svc=ID)
  useEffect(()=>{
    const p=new URLSearchParams(window.location.search);
    if(p.get("book")==="1"){
      setBk(true);
      const svcParam=p.get("svc");
      if(svcParam)setInitialSvcId(parseInt(svcParam,10));
    }
  },[]);

  return(
    <>
      <Landing
        content={content}
        svcs={svcs}
        packs={packs}
        coupons={coupons}
        blocks={blocks}
        gallery={gallery}
        openBooking={openBooking}
        openGallery={openGallery}
      />
      <BookingWizard
        open={bk}
        onClose={handleBkClose}
        svcs={svcs}
        blocks={blocks}
        coupons={coupons}
        initialSvcId={initialSvcId}
        payment={content.payment}
      />
      <GalleryOverlay
        open={galleryOpen}
        onClose={closeGallery}
        items={gallery}
      />
    </>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
