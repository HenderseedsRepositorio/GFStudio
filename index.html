<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light only">
<meta name="supported-color-schemes" content="light only">
<title>GF Studio — Tu espacio de belleza y cuidado personal</title>
<meta name="description" content="GF Studio — Tratamientos profesionales de belleza y cuidado de la piel en Henderson, Buenos Aires. Reservá tu turno online.">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600&family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{color-scheme:light only}
*,*::before,*::after{box-sizing:border-box;margin:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;color-scheme:light}
body{font-family:'Figtree',sans-serif;background:#E8E2D4 !important;color:#1C1A14 !important;overflow-x:hidden}
@media(prefers-color-scheme:dark){html,body{background:#E8E2D4 !important;color:#1C1A14 !important}img,svg{filter:none !important}}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(0,0,0,.12);border-radius:3px}

@keyframes up{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
@keyframes fadeI{from{opacity:0}to{opacity:1}}
@keyframes morph{0%,100%{border-radius:60% 40% 30% 70%/60% 30% 70% 40%}50%{border-radius:30% 60% 70% 40%/50% 60% 30% 60%}}
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-18px)}}
.au{animation:up .75s cubic-bezier(.16,1,.3,1) both}
.ap{animation:pop .6s cubic-bezier(.16,1,.3,1) both}
.af{animation:fadeI .5s ease both}
.d1{animation-delay:.06s}.d2{animation-delay:.12s}.d3{animation-delay:.18s}

.reveal{opacity:0;transform:translateY(24px);transition:all .8s cubic-bezier(.16,1,.3,1)}.reveal.vis{opacity:1;transform:none}
.cta{transition:all .35s cubic-bezier(.16,1,.3,1);position:relative;overflow:hidden}
.cta:hover{transform:translateY(-3px);filter:brightness(1.08)}
.cta::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);transform:translateX(-100%);transition:transform .5s}.cta:hover::after{transform:translateX(100%)}
.sc{transition:all .4s cubic-bezier(.16,1,.3,1)}.sc:hover{transform:translateY(-8px)}
.fi{transition:border-color .3s,box-shadow .3s;border:1.5px solid rgba(0,0,0,.08)}
.fi:focus{outline:none;border-color:#5E6B2E;box-shadow:0 0 0 4px rgba(94,107,46,.09)}
.sb{transition:all .2s ease}.sb:hover{transform:scale(1.06)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
/* ═══════════ CONFIG ═══════════ */
const WA="5491112345678";
const SB_URL="https://nawinxkwfrkxvqwinegi.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hd2lueGt3ZnJreHZxd2luZWdpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NDE4MTAsImV4cCI6MjA5MDAxNzgxMH0.nSjNXK1bIpR-4Qmlh9UkUjf0TeNsz295bg-ktoLakd0";
const sb=window.supabase.createClient(SB_URL,SB_KEY);

/* ═══ THEME: Oliva & Arena ═══ */
const TH={p:"#5E6B2E",s:"#C8C4A8",a:"#3D4A18",bg:"#E8E2D4",bga:"#DED8C8",tx:"#1C1A14",txs:"#5C5840"};
const cardBg='rgba(255,255,255,.65)';
const cardBd='rgba(0,0,0,.04)';

/* ═══ LOGO: Serif Clásico ═══ */
const Logo=({c="#3D4A18",s=100})=>(
  <svg width={s} height={s} viewBox="0 0 100 100">
    <text x="50" y="58" textAnchor="middle" fontFamily="Playfair Display,serif" fontSize="48" fontWeight="700" fill={c} letterSpacing="-1">GF</text>
    <line x1="16" y1="68" x2="84" y2="68" stroke={c} strokeWidth="1" opacity=".2"/>
    <text x="50" y="84" textAnchor="middle" fontFamily="Figtree,sans-serif" fontSize="12" letterSpacing="7" fill={c} opacity=".5" fontWeight="400">STUDIO</text>
  </svg>
);

const{useState,useEffect,useCallback}=React;

/* ═══ SERVICES ═══ */
const SVCS=[
{id:1,nm:"Perfilado de Cejas",pr:18000,dur:"45 min",desc:"Diseño personalizado según morfología facial, con técnica de cera y pinza profesional para cejas simétricas y definidas.",det:["Diseño según rostro","Cera profesional","Pinza de precisión","Tinte opcional"]},
{id:2,nm:"Laminado de Cejas y Pestañas",pr:22000,dur:"60 min",desc:"Tratamiento con keratina que alisa, fija y da forma natural a cejas y pestañas por 6-8 semanas.",det:["Keratina vegetal","Fijación duradera","Efecto lifting","Nutrición profunda"]},
{id:3,nm:"Fototerapia LED Facial",pr:25000,dur:"50 min",desc:"Tecnología de luz LED que penetra en la piel para estimular colágeno, reducir acné y unificar tono.",det:["Luz roja antiedad","Luz azul anti-acné","Sin dolor ni invasión","Resultados acumulativos"]},
{id:4,nm:"Limpieza Facial Profunda",pr:20000,dur:"60 min",desc:"Protocolo completo de limpieza profesional: desmaquillado, vaporización, extracción, máscara y protección solar.",det:["Desmaquillado enzimático","Vaporización + extracción","Máscara hidratante","Protector solar SPF50"]},
{id:5,nm:"Anti-Edad con Radiofrecuencia",pr:35000,dur:"60 min",desc:"Radiofrecuencia que genera calor controlado en dermis profunda, estimulando colágeno y elastina para firmeza visible.",det:["Radiofrecuencia tripolar","Estimula colágeno","Efecto tensor inmediato","Protocolo de 6-8 sesiones"]},
{id:6,nm:"Skincare Personalizado",pr:15000,dur:"30 min",desc:"Diagnóstico completo de tu tipo de piel con lupa profesional y armado de rutina diaria con productos recomendados.",det:["Diagnóstico con lupa LED","Análisis de hidratación","Rutina AM/PM personalizada","Seguimiento post-consulta"]},
];
const fP=n=>"$"+n.toLocaleString("es-AR");
const TIMES=["09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00","17:00"];

/* ═══ APP ═══ */
const App=()=>{
  const[bk,setBk]=useState(false);
  const[fm,setFm]=useState({n:"",ph:"",sv:"",dt:"",tm:""});
  const[sent,setSent]=useState(false);
  const[sentData,setSentData]=useState(null);
  const[mn,setMn]=useState(false);
  const[takenSlots,setTakenSlots]=useState([]);
  const[loadingSlots,setLoadingSlots]=useState(false);
  const[slotsError,setSlotsError]=useState(false);
  const[submitting,setSubmitting]=useState(false);
  const[submitError,setSubmitError]=useState("");
  const[dateError,setDateError]=useState("");

  useEffect(()=>{
    const o=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting)e.target.classList.add("vis")})},{threshold:.06});
    document.querySelectorAll(".reveal").forEach(el=>o.observe(el));
    return()=>o.disconnect();
  },[]);

  const fetchSlots=useCallback(async(date)=>{
    if(!date)return;
    setLoadingSlots(true);setSlotsError(false);
    const{data,error}=await sb.from("gf_appointments")
      .select("time_slot")
      .eq("appointment_date",date)
      .neq("status","cancelled");
    if(error){setSlotsError(true);setLoadingSlots(false);return;}
    setTakenSlots(data?data.map(r=>r.time_slot):[]);
    setLoadingSlots(false);
  },[]);

  useEffect(()=>{
    fetchSlots(fm.dt);
    if(!fm.dt)return;
    const iv=setInterval(()=>fetchSlots(fm.dt),20000);
    return()=>clearInterval(iv);
  },[fm.dt,fetchSlots]);

  const minD=()=>{
    const now=new Date();
    const ar=new Date(now.toLocaleString("en-US",{timeZone:"America/Argentina/Buenos_Aires"}));
    ar.setDate(ar.getDate()+1);
    return ar.getFullYear()+'-'+String(ar.getMonth()+1).padStart(2,'0')+'-'+String(ar.getDate()).padStart(2,'0');
  };
  const isWeekday=v=>{if(!v)return true;const d=new Date(v+"T12:00:00").getDay();return d>=1&&d<=5};
  const validPhone=p=>/^\d[\d\s\-]{6,}$/.test(p.trim());

  const sub=async(e)=>{
    e.preventDefault();setSubmitError("");
    const{n,ph,sv,dt,tm}=fm;
    if(!n||!ph||!sv||!dt||!tm){setSubmitError("Completá todos los campos.");return}
    if(!validPhone(ph)){setSubmitError("Ingresá un número de teléfono válido.");return}
    setSubmitting(true);

    const{data:freshSlots}=await sb.from("gf_appointments")
      .select("time_slot").eq("appointment_date",dt).neq("status","cancelled");
    if(freshSlots&&freshSlots.some(r=>r.time_slot===tm)){
      setTakenSlots(freshSlots.map(r=>r.time_slot));
      setFm(p=>({...p,tm:""}));
      setSubmitError("Ese horario acaba de ser reservado. Elegí otro.");
      setSubmitting(false);return;
    }

    const{error}=await sb.from("gf_appointments").insert({
      client_name:n.trim(),
      client_phone:"+54"+ph.replace(/\D/g,''),
      service_id:parseInt(sv),
      appointment_date:dt,
      time_slot:tm,
      status:"pending"
    });

    if(error){
      setSubmitting(false);
      if(error.code==="23505"){setSubmitError("Ese horario acaba de ser reservado. Elegí otro.");setTakenSlots(p=>[...p,tm]);setFm(p=>({...p,tm:""}));}
      else{setSubmitError("Error al reservar. Intentá de nuevo.");}
      return;
    }

    const sn=SVCS.find(s=>s.id===+sv)?.nm||sv;
    const pr=SVCS.find(s=>s.id===+sv)?.pr||0;
    const df=new Date(dt+"T12:00:00").toLocaleDateString("es-AR",{weekday:"long",day:"numeric",month:"long"});

    try{
      await fetch("https://hook.us2.make.com/vbqc4j85mqfp506npf3p99rnr1yl3a5n",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({nombre:n.trim(),telefono:"+54"+ph.replace(/\D/g,''),servicio:sn,fecha:df,horario:tm+" hs",precio:fP(pr)})
      });
    }catch(e){}

    setSentData({nombre:n.trim(),servicio:sn,fecha:df,horario:tm,precio:fP(pr)});
    setSubmitting(false);setSent(true);

    const msg=encodeURIComponent(`*Reserva — GF Studio*\n\n${n.trim()}\n+54${ph.replace(/\D/g,'')}\n${sn}\n${df}\n${tm} hs`);
    setTimeout(()=>window.open(`https://wa.me/${WA}?text=${msg}`,"_blank"),300);
  };

  const go=id=>{document.getElementById(id)?.scrollIntoView({behavior:"smooth"});setMn(false)};

  return(
    <div className="min-h-screen" style={{background:TH.bg}}>
      {/* Mesh background */}
      <div className="fixed inset-0 pointer-events-none -z-10" style={{background:`radial-gradient(ellipse at 15% 10%,${TH.p}10 0%,transparent 55%),radial-gradient(ellipse at 85% 40%,${TH.s}08 0%,transparent 50%)`}}/>

      {/* Nav */}
      <nav className="sticky top-0 z-40" style={{background:'rgba(255,255,255,.75)',backdropFilter:'blur(18px)',WebkitBackdropFilter:'blur(18px)',borderBottom:`1px solid ${TH.p}12`}}>
        <div className="max-w-6xl mx-auto px-5 flex items-center justify-between h-16">
          <div className="cursor-pointer" onClick={()=>go("hero")}><Logo c={TH.a} s={48}/></div>
          <div className="hidden md:flex items-center gap-8">
            {["servicios","reservar","contacto"].map(id=><button key={id} onClick={()=>go(id)} className="text-xs tracking-wide capitalize" style={{color:TH.txs}}>{id}</button>)}
            <button onClick={()=>{setBk(true);setTimeout(()=>go("reservar"),100)}} className="cta text-xs font-medium px-6 py-2.5 rounded-full text-white" style={{background:TH.p,boxShadow:`0 4px 20px ${TH.p}30`}}>Reservar</button>
          </div>
          <button className="md:hidden" onClick={()=>setMn(!mn)}><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d={mn?"M6 6L18 18M6 18L18 6":"M4 7H20M4 12H20M4 17H20"} stroke={TH.p} strokeWidth="1.5" strokeLinecap="round"/></svg></button>
        </div>
        {mn&&<div className="md:hidden px-5 pb-4 space-y-2 af">{["servicios","reservar","contacto"].map(id=><button key={id} onClick={()=>go(id)} className="block w-full text-left text-sm py-1.5 capitalize" style={{color:TH.txs}}>{id}</button>)}<button onClick={()=>{setBk(true);setMn(false);setTimeout(()=>go("reservar"),100)}} className="cta w-full text-xs font-medium py-3 rounded-full text-white mt-1" style={{background:TH.p}}>Reservar Turno</button></div>}
      </nav>

      {/* Hero */}
      <section id="hero" className="relative min-h-[80vh] sm:min-h-[85vh] flex items-center overflow-hidden">
        <div className="absolute top-10 right-[6%] w-48 sm:w-96 h-48 sm:h-96 opacity-20 pointer-events-none" style={{background:`radial-gradient(circle,${TH.s},transparent 70%)`,animation:'morph 14s ease-in-out infinite',borderRadius:'60% 40% 30% 70%/60% 30% 70% 40%'}}/>
        <div className="absolute bottom-20 left-[4%] w-28 sm:w-56 h-28 sm:h-56 rounded-full opacity-10 pointer-events-none" style={{background:`radial-gradient(circle,${TH.p},transparent 70%)`,animation:'float 9s ease-in-out infinite 1s'}}/>

        <div className="max-w-6xl mx-auto px-4 sm:px-5 py-16 sm:py-20 w-full relative">
          <div className="text-center max-w-2xl mx-auto">
            <div className="au mb-5 sm:mb-8 flex justify-center"><Logo c={TH.a} s={window.innerWidth<640?120:160}/></div>
            <h1 className="au d1" style={{fontFamily:'Playfair Display,serif',fontSize:'clamp(2.2rem,7vw,5.5rem)',fontWeight:700,lineHeight:1.08,color:TH.tx}}>
              Tu espacio de{' '}<em style={{color:TH.p}}>belleza</em><br/>y cuidado personal
            </h1>
            <p className="au d2 mt-4 sm:mt-5 text-sm sm:text-lg font-light leading-relaxed max-w-lg mx-auto" style={{color:TH.txs}}>
              Tratamientos profesionales con tecnología de última generación. Henderson, Buenos Aires.
            </p>
            <div className="au d3 mt-7 sm:mt-10 flex flex-col sm:flex-row gap-3 justify-center">
              <button onClick={()=>{setBk(true);setTimeout(()=>go("reservar"),100)}} className="cta text-sm font-medium px-8 sm:px-10 py-3.5 sm:py-4 rounded-full text-white text-center" style={{background:TH.a,boxShadow:`0 8px 30px ${TH.a}25`}}>Reservá tu turno</button>
              <button onClick={()=>go("servicios")} className="text-sm font-light px-8 sm:px-10 py-3.5 sm:py-4 rounded-full transition-all hover:shadow-md text-center" style={{background:TH.s+'50',color:TH.a}}>Ver servicios ↓</button>
            </div>
          </div>
        </div>
      </section>

      {/* Marquee */}
      <div className="overflow-hidden py-5 border-y" style={{borderColor:TH.p+'10'}}>
        <div style={{display:'flex',width:'max-content',animation:'marquee 35s linear infinite'}}>
          {[...Array(6)].map((_,i)=><span key={i} className="mx-8 whitespace-nowrap" style={{fontFamily:'Playfair Display,serif',fontSize:'1.15rem',fontStyle:'italic',color:TH.p,opacity:.15}}>Perfilado · Laminado · Fototerapia · Skincare · Radiofrecuencia · Limpieza ·{' '}</span>)}
        </div>
      </div>

      {/* Services */}
      <section id="servicios" className="py-16 sm:py-28">
        <div className="max-w-6xl mx-auto px-4 sm:px-5">
          <div className="reveal text-center mb-10 sm:mb-14">
            <p className="text-[10px] uppercase tracking-[.4em] mb-2" style={{color:TH.p}}>Nuestros servicios</p>
            <h2 style={{fontFamily:'Playfair Display,serif',fontSize:'clamp(1.8rem,4vw,3.2rem)',color:TH.tx}}>Tratamientos <em style={{color:TH.p}}>especializados</em></h2>
            <p className="mt-3 text-sm font-light max-w-lg mx-auto" style={{color:TH.txs}}>Cada tratamiento combina técnica profesional con tecnología de última generación para resultados visibles.</p>
          </div>
          <div className="space-y-4 sm:space-y-5">
            {SVCS.map((s,i)=>(
              <div key={s.id} className="reveal sc rounded-2xl sm:rounded-3xl overflow-hidden cursor-pointer group" style={{background:cardBg,backdropFilter:'blur(12px)',border:`1px solid ${cardBd}`,transitionDelay:`${i*.06}s`}}
                onClick={()=>{setFm(p=>({...p,sv:String(s.id)}));setBk(true);setTimeout(()=>go("reservar"),100)}}>
                <div className="p-5 sm:p-8">
                  <div className="flex items-start justify-between mb-3 sm:mb-4">
                    <div className="flex items-center gap-3">
                      <div className="w-10 h-10 sm:w-12 sm:h-12 rounded-xl flex items-center justify-center text-sm sm:text-base font-bold" style={{background:TH.p+'12',color:TH.p}}>{String(s.id).padStart(2,'0')}</div>
                      <div>
                        <h3 className="text-sm sm:text-base font-semibold" style={{color:TH.tx}}>{s.nm}</h3>
                        <span className="text-[10px] sm:text-xs" style={{color:TH.txs,opacity:.5}}>⏱ {s.dur}</span>
                      </div>
                    </div>
                    <span className="flex-shrink-0 ml-2" style={{fontFamily:'Playfair Display,serif',fontSize:'clamp(1.1rem,3vw,1.5rem)',color:TH.p}}>{fP(s.pr)}</span>
                  </div>
                  <p className="text-xs sm:text-sm font-light leading-relaxed mb-4" style={{color:TH.txs}}>{s.desc}</p>
                  <div className="flex flex-wrap gap-1.5 sm:gap-2 mb-3">
                    {s.det.map((d,di)=>(
                      <span key={di} className="text-[10px] sm:text-xs px-2.5 sm:px-3 py-1 sm:py-1.5 rounded-full font-light" style={{background:TH.p+'0A',color:TH.a,border:`1px solid ${TH.p}12`}}>{d}</span>
                    ))}
                  </div>
                  <div className="flex items-center justify-end">
                    <span className="text-xs font-medium flex items-center gap-1 opacity-50 group-hover:opacity-100 transition-opacity" style={{color:TH.p}}>
                      Reservar turno <span className="text-base">→</span>
                    </span>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* Booking */}
      <section id="reservar" className="py-20">
        <div className="max-w-xl mx-auto px-5">
          {!bk?(
            <div className="reveal text-center">
              <p className="text-[10px] uppercase tracking-[.4em] mb-2" style={{color:TH.p}}>Turnos online</p>
              <h2 className="mb-4" style={{fontFamily:'Playfair Display,serif',fontSize:'clamp(1.8rem,4vw,3rem)',color:TH.tx}}>Reservá tu <em style={{color:TH.p}}>momento</em></h2>
              <p className="text-sm font-light mb-8" style={{color:TH.txs}}>Elegí servicio, día y horario. Te confirmamos por WhatsApp.</p>
              <button onClick={()=>setBk(true)} className="cta text-sm font-medium px-10 py-4 rounded-full text-white" style={{background:TH.p,boxShadow:`0 8px 28px ${TH.p}25`}}>Reservar turno</button>
            </div>
          ):sent?(
            <div className="ap rounded-3xl p-8 sm:p-10 text-center" style={{background:cardBg,backdropFilter:'blur(12px)',border:`1px solid ${cardBd}`}}>
              <div className="w-16 h-16 rounded-full mx-auto mb-4 flex items-center justify-center" style={{background:'#25D36618'}}><svg width="30" height="30" viewBox="0 0 24 24" fill="#25D366"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div>
              <h3 className="mb-2" style={{fontFamily:'Playfair Display,serif',fontSize:'1.5rem',color:TH.tx}}>¡Turno reservado!</h3>
              {sentData&&(
                <div className="text-left rounded-2xl p-4 mb-4 space-y-1.5" style={{background:TH.bg,border:`1px solid ${TH.p}10`}}>
                  <p className="text-xs" style={{color:TH.txs}}><strong style={{color:TH.tx}}>Servicio:</strong> {sentData.servicio}</p>
                  <p className="text-xs" style={{color:TH.txs}}><strong style={{color:TH.tx}}>Fecha:</strong> {sentData.fecha}</p>
                  <p className="text-xs" style={{color:TH.txs}}><strong style={{color:TH.tx}}>Horario:</strong> {sentData.horario} hs</p>
                  <p className="text-xs" style={{color:TH.txs}}><strong style={{color:TH.tx}}>Precio:</strong> {sentData.precio}</p>
                </div>
              )}
              <p className="text-xs font-light mb-5" style={{color:TH.txs}}>Enviá el mensaje de WhatsApp para confirmar. Te responderemos a la brevedad.</p>
              <button onClick={()=>{setSent(false);setSentData(null);setFm({n:"",ph:"",sv:"",dt:"",tm:""})}} className="text-xs px-5 py-2 rounded-full" style={{background:TH.p+'15',color:TH.p}}>Reservar otro turno</button>
            </div>
          ):(
            <div className="ap">
              <div className="text-center mb-6">
                <p className="text-[10px] uppercase tracking-[.4em] mb-1" style={{color:TH.p}}>Turnos</p>
                <h2 style={{fontFamily:'Playfair Display,serif',fontSize:'1.8rem',color:TH.tx}}>Reservá tu <em style={{color:TH.p}}>turno</em></h2>
              </div>
              <form onSubmit={sub} className="rounded-3xl p-6 sm:p-8 space-y-4" style={{background:cardBg,backdropFilter:'blur(12px)',border:`1px solid ${cardBd}`}}>
                <div><label className="text-[10px] uppercase tracking-widest block mb-1.5" style={{color:TH.txs,opacity:.6}}>Nombre completo</label><input type="text" autoComplete="name" value={fm.n} onChange={e=>setFm(p=>({...p,n:e.target.value}))} className="fi w-full px-4 py-3.5 rounded-xl text-sm" style={{background:'rgba(255,255,255,.8)',color:TH.tx}} placeholder="María García" required maxLength={80}/></div>
                <div><label className="text-[10px] uppercase tracking-widest block mb-1.5" style={{color:TH.txs,opacity:.6}}>WhatsApp</label><div className="flex gap-2"><span className="flex items-center px-3 py-3.5 rounded-xl text-xs font-medium" style={{background:'rgba(0,0,0,.04)',color:TH.txs}}>+54</span><input type="tel" inputMode="numeric" autoComplete="tel" value={fm.ph} onChange={e=>setFm(p=>({...p,ph:e.target.value.replace(/[^\d\s\-]/g,'')}))} className="fi flex-1 px-4 py-3.5 rounded-xl text-sm" style={{background:'rgba(255,255,255,.8)',color:TH.tx}} placeholder="2317 40-1234" required maxLength={20}/></div></div>
                <div><label className="text-[10px] uppercase tracking-widest block mb-1.5" style={{color:TH.txs,opacity:.6}}>Servicio</label><select value={fm.sv} onChange={e=>setFm(p=>({...p,sv:e.target.value}))} className="fi w-full px-4 py-3.5 rounded-xl text-sm appearance-none cursor-pointer" style={{background:'rgba(255,255,255,.8)',color:fm.sv?TH.tx:TH.txs}} required><option value="">Seleccioná un servicio</option>{SVCS.map(s=><option key={s.id} value={s.id}>{s.nm} — {fP(s.pr)}</option>)}</select></div>
                <div>
                  <label className="text-[10px] uppercase tracking-widest block mb-1.5" style={{color:TH.txs,opacity:.6}}>Fecha (Lun a Vie)</label>
                  <input type="date" value={fm.dt} min={minD()} onChange={e=>{
                    setDateError("");
                    if(!isWeekday(e.target.value)){setDateError("Solo atendemos de lunes a viernes.");return}
                    setFm(p=>({...p,dt:e.target.value,tm:""}));
                  }} className="fi w-full px-4 py-3.5 rounded-xl text-sm" style={{background:'rgba(255,255,255,.8)',color:TH.tx}} required/>
                  {dateError&&<p className="text-[11px] mt-1.5 font-medium" style={{color:'#B91C1C'}}>{dateError}</p>}
                </div>
                {fm.dt&&<div className="af">
                  <label className="text-[10px] uppercase tracking-widest block mb-2" style={{color:TH.txs,opacity:.6}}>
                    Horario {loadingSlots&&<span className="opacity-50">· cargando...</span>}
                  </label>
                  {slotsError?(
                    <div className="text-center py-4 rounded-xl" style={{background:'rgba(0,0,0,.03)'}}>
                      <p className="text-xs mb-2" style={{color:'#B91C1C'}}>No se pudieron cargar los horarios</p>
                      <button type="button" onClick={()=>fetchSlots(fm.dt)} className="text-xs font-medium px-4 py-1.5 rounded-lg" style={{background:TH.p+'15',color:TH.p}}>Reintentar</button>
                    </div>
                  ):(
                  <div className="grid grid-cols-3 gap-2">
                    {TIMES.map(t=>{
                      const taken=takenSlots.includes(t);
                      return <button key={t} type="button" disabled={taken}
                        onClick={()=>!taken&&setFm(p=>({...p,tm:t}))}
                        className="sb rounded-xl text-sm font-medium relative"
                        style={{
                          padding:'14px 0',
                          background:taken?'rgba(0,0,0,.03)':fm.tm===t?TH.p:TH.p+'10',
                          color:taken?'rgba(0,0,0,.15)':fm.tm===t?'#fff':TH.a,
                          boxShadow:fm.tm===t?`0 4px 16px ${TH.p}28`:'none',
                          cursor:taken?'not-allowed':'pointer',
                          textDecoration:taken?'line-through':'none',
                          minHeight:'48px'
                        }}>
                        {t}{taken&&<span className="block text-[9px] font-normal opacity-60" style={{textDecoration:'none'}}>Ocupado</span>}
                      </button>
                    })}
                  </div>
                  )}
                </div>}
                {submitError&&<p className="text-xs text-center py-2 px-3 rounded-lg" style={{background:'#fee2e2',color:'#991b1b'}}>{submitError}</p>}
                <button type="submit" disabled={submitting}
                  className="w-full text-sm font-medium py-3.5 rounded-xl text-white flex items-center justify-center gap-2.5 transition-all hover:shadow-lg hover:brightness-110 disabled:opacity-50"
                  style={{background:'#25D366'}}>
                  {submitting?<span>Reservando...</span>:<>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                  Confirmar por WhatsApp</>}
                </button>
              </form>
            </div>
          )}
        </div>
      </section>

      {/* Contact */}
      <section id="contacto" className="py-20 relative">
        <div className="absolute inset-0 -z-10" style={{background:TH.s+'08'}}/>
        <div className="max-w-5xl mx-auto px-5">
          <div className="reveal text-center mb-10">
            <p className="text-[10px] uppercase tracking-[.4em] mb-2" style={{color:TH.p}}>Encontranos</p>
            <h2 style={{fontFamily:'Playfair Display,serif',fontSize:'clamp(1.6rem,3.5vw,2.5rem)',color:TH.tx}}>Vení a <em style={{color:TH.p}}>conocernos</em></h2>
          </div>
          <div className="reveal grid grid-cols-1 sm:grid-cols-3 gap-4">
            {[
              {e:"📍",t:"Ubicación",d:"Henderson, Buenos Aires"},
              {e:"🕐",t:"Horarios",d:"Lunes a Viernes\n09:00 a 18:00 hs"},
              {e:"📱",t:"Contacto",d:"WhatsApp Business\nTurnos online 24/7"}
            ].map((c,i)=>(
              <div key={i} className="rounded-2xl p-6 text-center" style={{background:cardBg,backdropFilter:'blur(12px)',border:`1px solid ${cardBd}`}}>
                <span className="text-2xl block mb-2">{c.e}</span>
                <h3 className="text-sm font-semibold mb-1" style={{color:TH.tx}}>{c.t}</h3>
                <p className="text-xs font-light whitespace-pre-line" style={{color:TH.txs}}>{c.d}</p>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* Footer */}
      <footer className="py-10" style={{background:TH.tx}}>
        <div className="max-w-5xl mx-auto px-5">
          <div className="flex flex-col sm:flex-row items-center justify-between gap-4">
            <div className="text-center sm:text-left">
              <Logo c="rgba(255,255,255,.4)" s={42}/>
              <p className="text-[10px] font-light mt-1" style={{color:"rgba(255,255,255,.18)"}}>Tu espacio de belleza y cuidado personal</p>
            </div>
            <div className="flex gap-3">
              {[
                {n:"IG",d:"M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"},
                {n:"TT",d:"M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.99-.32-2.15-.23-3.02.37-.63.41-1.11 1.04-1.36 1.75-.21.51-.15 1.07-.14 1.61.24 1.64 1.82 3.02 3.5 2.87 1.12-.01 2.19-.66 2.77-1.61.19-.33.4-.67.41-1.06.1-1.79.06-3.57.07-5.36.01-4.03-.01-8.05.02-12.07z"}
              ].map(s=><a key={s.n} href="#" className="w-9 h-9 rounded-full flex items-center justify-center transition-all hover:scale-110" style={{background:"rgba(255,255,255,.06)"}}><svg width="14" height="14" viewBox="0 0 24 24" fill="rgba(255,255,255,.35)"><path d={s.d}/></svg></a>)}
            </div>
          </div>
          <div className="border-t mt-6 pt-4" style={{borderColor:"rgba(255,255,255,.06)"}}>
            <p className="text-[10px] text-center" style={{color:"rgba(255,255,255,.1)"}}>© 2026 GF Studio · Henderson, Buenos Aires</p>
          </div>
        </div>
      </footer>
    </div>
  );
};
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
