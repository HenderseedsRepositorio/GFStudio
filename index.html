<style>
*,*::before,*::after{box-sizing:border-box;margin:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{font-family:'Figtree',sans-serif;background:#F5F1E8;color:#1C1A14;overflow-x:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(0,0,0,.12);border-radius:3px}

@keyframes up{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
@keyframes slideD{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeI{from{opacity:0}to{opacity:1}}
@keyframes morph{0%,100%{border-radius:60% 40% 30% 70%/60% 30% 70% 40%}50%{border-radius:30% 60% 70% 40%/50% 60% 30% 60%}}
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-18px)}}
@keyframes glow{0%,100%{opacity:.3}50%{opacity:.6}}
.au{animation:up .75s cubic-bezier(.16,1,.3,1) both}
.ap{animation:pop .6s cubic-bezier(.16,1,.3,1) both}
.as{animation:slideD .5s cubic-bezier(.16,1,.3,1) both}
.af{animation:fadeI .5s ease both}
.d1{animation-delay:.06s}.d2{animation-delay:.12s}.d3{animation-delay:.18s}.d4{animation-delay:.24s}.d5{animation-delay:.3s}

.nav-pill{backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}

/* Logo cards */
.lc{transition:all .4s cubic-bezier(.16,1,.3,1);border:2px solid transparent;cursor:pointer;background:#FEFDF8}
.lc:hover{transform:translateY(-8px);box-shadow:0 24px 60px rgba(28,26,20,.08);border-color:rgba(28,26,20,.06)}
.lc.on{border-color:#1C1A14;box-shadow:0 16px 48px rgba(28,26,20,.1)}

/* Theme cards */
.tc{transition:all .4s cubic-bezier(.16,1,.3,1);border:2.5px solid transparent;cursor:pointer}
.tc:hover{transform:translateY(-6px);box-shadow:0 20px 50px rgba(0,0,0,.07)}
.tc.on{border-color:#1C1A14;box-shadow:0 8px 32px rgba(0,0,0,.08)}

/* Landing */
.reveal{opacity:0;transform:translateY(24px);transition:all .8s cubic-bezier(.16,1,.3,1)}.reveal.vis{opacity:1;transform:none}
.cta{transition:all .35s cubic-bezier(.16,1,.3,1);position:relative;overflow:hidden}
.cta:hover{transform:translateY(-3px);filter:brightness(1.08)}
.cta::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);transform:translateX(-100%);transition:transform .5s}.cta:hover::after{transform:translateX(100%)}
.sc{transition:all .4s cubic-bezier(.16,1,.3,1)}.sc:hover{transform:translateY(-8px)}
.fi{transition:border-color .3s,box-shadow .3s;border:1.5px solid rgba(0,0,0,.08)}
.fi:focus{outline:none;border-color:var(--ac);box-shadow:0 0 0 4px var(--gl)}
.sb{transition:all .2s ease}.sb:hover{transform:scale(1.06)}
</style>

const Landing=({logoId,themeId})=>{
  const th=TH(themeId);
  const logo=LOGOS.find(l=>l.id===logoId)||LOGOS[0];
  const dk=!!th.dk;
  const cardBg=dk?'rgba(255,255,255,.04)':'rgba(255,255,255,.65)';
  const cardBd=dk?'rgba(255,255,255,.06)':'rgba(0,0,0,.04)';

  const[bk,setBk]=useState(false);
  const[fm,setFm]=useState({n:"",ph:"",sv:"",dt:"",tm:""});
  const[sent,setSent]=useState(false);
  const[mn,setMn]=useState(false);

  useEffect(()=>{
    const o=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting)e.target.classList.add("vis")})},{threshold:.06});
    document.querySelectorAll(".reveal").forEach(el=>o.observe(el));
    return()=>o.disconnect();
  },[]);

  const minD=()=>{const d=new Date();d.setDate(d.getDate()+1);return d.toISOString().split("T")[0]};
  const wk=v=>{if(!v)return 1;const d=new Date(v+"T12:00:00").getDay();return d>=1&&d<=5};

  const sub=e=>{
    e.preventDefault();const{n,ph,sv,dt,tm}=fm;
    if(!n||!ph||!sv||!dt||!tm){alert("Completá todos los campos");return}
    const sn=SVCS.find(s=>s.id===+sv)?.nm||sv;
    const df=new Date(dt+"T12:00:00").toLocaleDateString("es-AR",{weekday:"long",day:"numeric",month:"long"});
    const msg=encodeURIComponent(`*Reserva — GF Studio*\n\n${n}\n${ph}\n${sn}\n${df}\n${tm} hs`);
    window.open(`https://wa.me/${WA}?text=${msg}`,"_blank");setSent(true);
  };

  const go=id=>{document.getElementById(id)?.scrollIntoView({behavior:"smooth"});setMn(false)};

  return(
    <div className="min-h-screen" style={{background:th.bg,"--ac":th.p,"--gl":th.p+"18"}}>
      {/* Mesh */}
      <div className="fixed inset-0 pointer-events-none -z-10" style={{background:`radial-gradient(ellipse at 15% 10%,${th.p}${dk?'06':'10'} 0%,transparent 55%),radial-gradient(ellipse at 85% 40%,${th.s}${dk?'04':'08'} 0%,transparent 50%)`}}/>

      {/* Nav */}
      <nav className="sticky top-0 z-40" style={{background:dk?'rgba(10,10,14,.85)':'rgba(255,255,255,.75)',backdropFilter:'blur(18px)',borderBottom:`1px solid ${dk?'rgba(255,255,255,.04)':th.p+'12'}`}}>
        <div className="max-w-6xl mx-auto px-5 flex items-center justify-between h-16">
          <div className="cursor-pointer" onClick={()=>go("hero")}>{logo.r({c:th.p,s:48})}</div>
          <div className="hidden md:flex items-center gap-8">
            {["servicios","nosotras","contacto"].map(id=><button key={id} onClick={()=>go(id)} className="text-xs tracking-wide capitalize" style={{color:th.txs}}>{id}</button>)}
            <button onClick={()=>{setBk(true);setTimeout(()=>go("reservar"),100)}} className="cta text-xs font-medium px-6 py-2.5 rounded-full text-white" style={{background:th.p,boxShadow:`0 4px 20px ${th.p}30`}}>Reservar</button>
          </div>

// ═══ APP ═══
const App=()=>{
  const[view,setView]=useState("logos");
  const[logo,setLogo]=useState(1);
  const[theme,setTheme]=useState("oliva-arena");
  return(
    <div className="min-h-screen" style={{background:'#F5F1E8'}}>
      <Nav view={view} setView={setView}/>
      {view==="logos"&&<LogoGallery sel={logo} onSel={setLogo} theme={theme}/>}
      {view==="temas"&&<ThemeGallery sel={theme} onSel={setTheme} logo={logo}/>}
      {view==="landing"&&<Landing logoId={logo} themeId={theme}/>}
    </div>
  );
};
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
