<style>
:root{color-scheme:light only}
*,*::before,*::after{box-sizing:border-box;margin:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;color-scheme:light}
body{font-family:'Figtree',sans-serif;background:#E8E2D4 !important;color:#1C1A14 !important;overflow-x:hidden}
@media(prefers-color-scheme:dark){html,body{background:#E8E2D4 !important;color:#1C1A14 !important}img,svg{filter:none !important}}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(0,0,0,.12);border-radius:3px}

@keyframes up{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
@keyframes slideD{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeI{from{opacity:0}to{opacity:1}}
@keyframes morph{0%,100%{border-radius:60% 40% 30% 70%/60% 30% 70% 40%}50%{border-radius:30% 60% 70% 40%/50% 60% 30% 60%}}
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-18px)}}
@keyframes glow{0%,100%{opacity:.3}50%{opacity:.6}}
.au{animation:up .75s cubic-bezier(.16,1,.3,1) both}
.ap{animation:pop .6s cubic-bezier(.16,1,.3,1) both}
.as{animation:slideD .5s cubic-bezier(.16,1,.3,1) both}
.af{animation:fadeI .5s ease both}
.d1{animation-delay:.06s}.d2{animation-delay:.12s}.d3{animation-delay:.18s}.d4{animation-delay:.24s}.d5{animation-delay:.3s}

.nav-pill{backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}

/* Logo cards */
.lc{transition:all .4s cubic-bezier(.16,1,.3,1);border:2px solid transparent;cursor:pointer;background:#FEFDF8}
.lc:hover{transform:translateY(-8px);box-shadow:0 24px 60px rgba(28,26,20,.08);border-color:rgba(28,26,20,.06)}
.lc.on{border-color:#1C1A14;box-shadow:0 16px 48px rgba(28,26,20,.1)}

/* Theme cards */
.tc{transition:all .4s cubic-bezier(.16,1,.3,1);border:2.5px solid transparent;cursor:pointer}
.tc:hover{transform:translateY(-6px);box-shadow:0 20px 50px rgba(0,0,0,.07)}
.tc.on{border-color:#1C1A14;box-shadow:0 8px 32px rgba(0,0,0,.08)}

/* Landing */
.reveal{opacity:0;transform:translateY(24px);transition:all .8s cubic-bezier(.16,1,.3,1)}.reveal.vis{opacity:1;transform:none}
.cta{transition:all .35s cubic-bezier(.16,1,.3,1);position:relative;overflow:hidden}
.cta:hover{transform:translateY(-3px);filter:brightness(1.08)}
.cta::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);transform:translateX(-100%);transition:transform .5s}.cta:hover::after{transform:translateX(100%)}
.sc{transition:all .4s cubic-bezier(.16,1,.3,1)}.sc:hover{transform:translateY(-8px)}
.fi{transition:border-color .3s,box-shadow .3s;border:1.5px solid rgba(0,0,0,.08)}
.fi:focus{outline:none;border-color:var(--ac);box-shadow:0 0 0 4px var(--gl)}
.sb{transition:all .2s ease}.sb:hover{transform:scale(1.06)}
</style>

const Landing=({logoId,themeId,embedMode})=>{
  const th=TH(themeId);
  const logo=LOGOS.find(l=>l.id===logoId)||LOGOS[0];
  const dk=!!th.dk;
  const cardBg=dk?'rgba(255,255,255,.04)':'rgba(255,255,255,.65)';
  const cardBd=dk?'rgba(255,255,255,.06)':'rgba(0,0,0,.04)';

  const[bk,setBk]=useState(false);
  const[fm,setFm]=useState({n:"",ph:"",sv:"",dt:"",tm:""});
  const[sent,setSent]=useState(false);
  const[sentData,setSentData]=useState(null);
  const[mn,setMn]=useState(false);
  const[takenSlots,setTakenSlots]=useState([]);
  const[loadingSlots,setLoadingSlots]=useState(false);
  const[slotsError,setSlotsError]=useState(false);
  const[submitting,setSubmitting]=useState(false);
  const[submitError,setSubmitError]=useState("");
  const[dateError,setDateError]=useState("");

  useEffect(()=>{
    const o=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting)e.target.classList.add("vis")})},{threshold:.06});
    document.querySelectorAll(".reveal").forEach(el=>o.observe(el));
    return()=>o.disconnect();
  },[]);

  // Fetch taken slots — on date change + poll every 20s
  const fetchSlots=useCallback(async(date)=>{
    if(!date)return;
    setLoadingSlots(true);setSlotsError(false);
    const{data,error}=await sb.from("gf_appointments")
      .select("time_slot")
      .eq("appointment_date",date)
      .neq("status","cancelled");
    if(error){setSlotsError(true);setLoadingSlots(false);return;}
    setTakenSlots(data?data.map(r=>r.time_slot):[]);
    setLoadingSlots(false);
  },[]);

  useEffect(()=>{
    fetchSlots(fm.dt);
    if(!fm.dt)return;
    const iv=setInterval(()=>fetchSlots(fm.dt),20000);
    return()=>clearInterval(iv);
  },[fm.dt,fetchSlots]);

  // Argentina timezone-safe min date (tomorrow)
  const minD=()=>{
    const now=new Date();
    const ar=new Date(now.toLocaleString("en-US",{timeZone:"America/Argentina/Buenos_Aires"}));
    ar.setDate(ar.getDate()+1);
    return ar.getFullYear()+'-'+String(ar.getMonth()+1).padStart(2,'0')+'-'+String(ar.getDate()).padStart(2,'0');
  };
  const isWeekday=v=>{if(!v)return true;const d=new Date(v+"T12:00:00").getDay();return d>=1&&d<=5};
  const validPhone=p=>/^\d[\d\s\-]{6,}$/.test(p.trim());

  const sub=async(e)=>{
    e.preventDefault();setSubmitError("");
    const{n,ph,sv,dt,tm}=fm;
    if(!n||!ph||!sv||!dt||!tm){setSubmitError("Completá todos los campos.");return}
    if(!validPhone(ph)){setSubmitError("Ingresá un número de teléfono válido.");return}
    setSubmitting(true);

    // 1. Refresh slots one last time before inserting
    const{data:freshSlots}=await sb.from("gf_appointments")
      .select("time_slot").eq("appointment_date",dt).neq("status","cancelled");
    if(freshSlots&&freshSlots.some(r=>r.time_slot===tm)){
      setTakenSlots(freshSlots.map(r=>r.time_slot));
      setFm(p=>({...p,tm:""}));
      setSubmitError("Ese horario acaba de ser reservado. Elegí otro.");
      setSubmitting(false);return;
    }

    // 2. Insert into Supabase
    const{error}=await sb.from("gf_appointments").insert({
      client_name:n.trim(),
      client_phone:"+54"+ph.replace(/\D/g,''),
      service_id:parseInt(sv),
      appointment_date:dt,
      time_slot:tm,
      status:"pending"
    });

    if(error){
      setSubmitting(false);
      if(error.code==="23505"){setSubmitError("Ese horario acaba de ser reservado. Elegí otro.");setTakenSlots(p=>[...p,tm]);setFm(p=>({...p,tm:""}));}
      else{setSubmitError("Error al reservar. Intentá de nuevo.");}
      return;
    }

    const sn=SVCS.find(s=>s.id===+sv)?.nm||sv;
    const pr=SVCS.find(s=>s.id===+sv)?.pr||0;
    const df=new Date(dt+"T12:00:00").toLocaleDateString("es-AR",{weekday:"long",day:"numeric",month:"long"});

    // 3. Notify owner FIRST (before opening WhatsApp which can kill the tab on mobile)
    try{
      await fetch("https://hook.us2.make.com/vbqc4j85mqfp506npf3p99rnr1yl3a5n",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({nombre:n.trim(),telefono:"+54"+ph.replace(/\D/g,''),servicio:sn,fecha:df,horario:tm+" hs",precio:fP(pr)})
      });
    }catch(e){}

    // 4. Save confirmation data for display
    setSentData({nombre:n.trim(),servicio:sn,fecha:df,horario:tm,precio:fP(pr)});
    setSubmitting(false);setSent(true);

    // 5. Open WhatsApp LAST (this may navigate away on mobile)
    const msg=encodeURIComponent(`*Reserva — GF Studio*\n\n${n.trim()}\n+54${ph.replace(/\D/g,'')}\n${sn}\n${df}\n${tm} hs`);
    setTimeout(()=>window.open(`https://wa.me/${WA}?text=${msg}`,"_blank"),300);
  };

  const go=id=>{document.getElementById(id)?.scrollIntoView({behavior:"smooth"});setMn(false)};

  // Embed mode — only booking section, no nav/hero/footer
  if(embedMode) return(
    <section className="py-16" style={{"--ac":th.p,"--gl":th.p+"18"}}>
      <div className="max-w-xl mx-auto px-5">
        {!bk?(
          <div className="text-center">
            <p className="text-[10px] uppercase tracking-[.4em] mb-2" style={{color:th.p}}>Turnos online</p>
            <h2 className="mb-4" style={{fontFamily:'Playfair Display,serif',fontSize:'clamp(1.6rem,4vw,2.5rem)',color:th.tx}}>Reservá tu <em style={{color:th.p}}>turno</em></h2>
            <p className="text-sm font-light mb-8" style={{color:th.txs}}>Elegí servicio, día y horario. Te confirmamos por WhatsApp.</p>
            <button onClick={()=>setBk(true)} className="cta text-sm font-medium px-10 py-4 rounded-full text-white" style={{background:th.p}}>Reservar turno</button>
          </div>
        ):sent?(
          <div className="ap rounded-3xl p-8 text-center" style={{background:cardBg,border:`1px solid ${cardBd}`}}>
            <div className="w-14 h-14 rounded-full mx-auto mb-3 flex items-center justify-center" style={{background:'#25D36618'}}><svg width="28" height="28" viewBox="0 0 24 24" fill="#25D366"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div>
            <h3 className="mb-2" style={{fontFamily:'Playfair Display,serif',fontSize:'1.3rem',color:th.tx}}>¡Turno reservado!</h3>
            {sentData&&<div className="text-left rounded-xl p-3 mb-3 space-y-1" style={{background:th.bg,border:`1px solid ${th.p}10`}}><p className="text-xs" style={{color:th.txs}}><strong style={{color:th.tx}}>{sentData.servicio}</strong> · {sentData.fecha} · {sentData.horario} hs · {sentData.precio}</p></div>}
