const SLOT_START=9*60, SLOT_END=18*60, SLOT_STEP=30;
const toMin=t=>{const[h,m]=t.split(":").map(Number);return h*60+m};
const toHHMM=m=>`${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;

const genSlots=dur=>{
  const s=[];
  for(let t=SLOT_START;t+dur<=SLOT_END;t+=SLOT_STEP) s.push(toHHMM(t));
  return s;
};

const blockCoversSlot=(block,date,sMin,eMin)=>{
  const dow=new Date(date+"T12:00:00").getDay();
  const mb=dow===0?6:dow-1;
  switch(block.type){
    case"full_day": return block.block_date===date;
    case"datetime_range":{
      if(block.block_date!==date)return false;
      const bs=toMin(block.start_time.slice(0,5)),be=toMin(block.end_time.slice(0,5));
      return bs<eMin&&be>sMin;
    }
    case"date_range": return date>=block.date_from&&date<=block.date_to;
    case"weekly":{
      if(block.day_of_week!==mb)return false;
      if(block.recurring_from&&date<block.recurring_from)return false;
      if(block.recurring_to&&date>block.recurring_to)return false;
      if(block.start_time&&block.end_time){
        const bs=toMin(block.start_time.slice(0,5)),be=toMin(block.end_time.slice(0,5));
        return bs<eMin&&be>sMin;
      }
      return true;
    }
    default: return false;
  }
};

const slotAvailable=(slot,dur,appts,svcs,blocks,date)=>{
  const sMin=toMin(slot),eMin=sMin+dur;
  for(const a of appts){
    if(a.status==="cancelled")continue;
    const aMin=toMin(a.time_slot);
    const aDur=(svcs.find(s=>s.id===a.service_id)?.duration_minutes)||60;
    if(aMin<eMin&&(aMin+aDur)>sMin)return false;
  }
  for(const b of blocks){
    if(blockCoversSlot(b,date,sMin,eMin))return false;
  }
  return true;
};

const EMAIL_TYPOS={"gmial.com":"gmail.com","gamil.com":"gmail.com","gmaol.com":"gmail.com","gmal.com":"gmail.com","gnail.com":"gmail.com","hotmial.com":"hotmail.com","hotamail.com":"hotmail.com","hotnail.com":"hotmail.com","yaho.com":"yahoo.com","yahooo.com":"yahoo.com","outlok.com":"outlook.com","outlookk.com":"outlook.com"};

const downloadICS=({nombre,servicio,fecha_raw,horario,dur_min})=>{
  const[h,m]=horario.split(":").map(Number);
  const eMin=h*60+m+dur_min;

  const pad=n=>String(n).padStart(2,'0');
  const base=fecha_raw.replace(/-/g,'');
  const dtS=`${base}T${pad(h)}${pad(m)}00`;
  const dtE=`${base}T${pad(eh)}${pad(em2)}00`;
  const ics=`BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//GF Studio//ES\r\nBEGIN:VEVENT\r\nSUMMARY:${servicio} - GF Studio\r\nDTSTART;TZID=America/Argentina/Buenos_Aires:${dtS}\r\nDTEND;TZID=America/Argentina/Buenos_Aires:${dtE}\r\nLOCATION:Hip\u00f3lito Yrigoyen 229, Henderson, Buenos Aires\r\nDESCRIPTION:Turno de ${nombre} en GF Studio\r\nEND:VEVENT\r\nEND:VCALENDAR`;
  const url=URL.createObjectURL(new Blob([ics],{type:'text/calendar;charset=utf-8'}));
  const a=document.createElement('a');a.href=url;a.download='turno-gf-studio.ics';a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
};

const{useState,useEffect,useCallback,useRef}=React;

/* ═══ LOGO ═══ */
const Logo=({c="#3D4A18",s=100})=>(
  <svg width={s} height={s} viewBox="0 0 100 100">
    <text x="50" y="58" textAnchor="middle" fontFamily="Playfair Display,serif" fontSize="48" fontWeight="700" fill={c} letterSpacing="-1">GF</text>

  </svg>
);

/* ═══ APP ═══ */
const App=()=>{
  const[bk,setBk]=useState(false);
  const[fm,setFm]=useState({n:"",em:"",ph:"",sv:"",dt:"",tm:""});
  const[sent,setSent]=useState(false);
  const[sentData,setSentData]=useState(null);
  const[mn,setMn]=useState(false);
  const[takenSlots,setTakenSlots]=useState([]);
  const[loadingSlots,setLoadingSlots]=useState(false);
  const[submitting,setSubmitting]=useState(false);
  const[submitError,setSubmitError]=useState("");
  const[dateError,setDateError]=useState("");
  const[expandedSvc,setExpandedSvc]=useState(null);
  const[scrolled,setScrolled]=useState(false);
  const[svcs,setSvcs]=useState([]);
  const[blocks,setBlocks]=useState([]);
  const[loadingSvcs,setLoadingSvcs]=useState(true);
  const[emailSuggestion,setEmailSuggestion]=useState("");

  // Scroll observer for nav + reveal
  useEffect(()=>{
    const onScroll=()=>setScrolled(window.scrollY>40);
    window.addEventListener("scroll",onScroll,{passive:true});
    const o=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting)e.target.classList.add("vis")})},{threshold:.05,rootMargin:"0px 0px -60px 0px"});
    document.querySelectorAll(".reveal").forEach(el=>o.observe(el));
    return()=>{window.removeEventListener("scroll",onScroll);o.disconnect()};
  },[]);
  // Re-observe reveal elements after dynamic content (services) loads
  useEffect(()=>{
    if(!svcs.length)return;
    const o=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting)e.target.classList.add("vis")})},{threshold:.05,rootMargin:"0px 0px -60px 0px"});
    document.querySelectorAll(".reveal:not(.vis)").forEach(el=>o.observe(el));
    return()=>o.disconnect();
  },[svcs]);

  useEffect(()=>{
    if(!sb){setLoadingSvcs(false);return;}
    Promise.all([
      sb.from("gf_services").select("*").order("id"),
      sb.from("gf_blocked_slots").select("*")
    ]).then(([{data:s},{data:b}])=>{
      setSvcs(s||[]);
      setBlocks(b||[]);
      setLoadingSvcs(false);
    }).catch(()=>setLoadingSvcs(false));
  },[]);

  const fetchSlots=useCallback(async(date)=>{
    if(!date||!sb)return;
    setLoadingSlots(true);
    try{
      const{data}=await sb.from("gf_appointments")
        .select("time_slot,service_id,status")
        .eq("appointment_date",date);
      setTakenSlots(data||[]);
    }catch(e){
      console.warn("Slots fetch failed",e);
      setTakenSlots([]);
    }finally{setLoadingSlots(false);}
  },[]);

  useEffect(()=>{
    fetchSlots(fm.dt);
    if(!fm.dt)return;
    const iv=setInterval(()=>fetchSlots(fm.dt),60000);
    return()=>clearInterval(iv);
  },[fm.dt,fetchSlots]);

  const minD=()=>{
    const now=new Date();
    const ar=new Date(now.toLocaleString("en-US",{timeZone:"America/Argentina/Buenos_Aires"}));
    ar.setDate(ar.getDate()+1);
    return ar.getFullYear()+'-'+String(ar.getMonth()+1).padStart(2,'0')+'-'+String(ar.getDate()).padStart(2,'0');
  };
  const isWeekday=v=>{if(!v)return true;const d=new Date(v+"T12:00:00").getDay();return d>=1&&d<=5};
  const validPhone=p=>/^\d[\d\s\-]{6,}$/.test(p.trim());
  // Normaliza a "+549..." aceptando que el usuario pegue con o sin 54/549 adelante
  const normPhone=p=>{let t=(p||"").replace(/\D/g,'');if(t.startsWith("549"))return "+"+t;if(t.startsWith("54"))return "+549"+t.slice(2);return "+549"+t};

  const sub=async(e)=>{
    e.preventDefault();setSubmitError("");
    const{n,em,ph,sv,dt,tm}=fm;
    if(!n||!em||!ph||!sv||!dt||!tm){setSubmitError("Completá todos los campos.");return}
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em.trim())){setSubmitError("Ingresá un email válido.");return}
    if(!validPhone(ph)){setSubmitError("Ingresá un número de teléfono válido.");return}
    if(!sb){setSubmitError("Error de conexión. Intentá de nuevo.");return}
    setSubmitting(true);

    try{
      // Refresh slots before inserting
      const{data:freshSlots}=await sb.from("gf_appointments")
        .select("time_slot,service_id,status").eq("appointment_date",dt);
      if(freshSlots&&freshSlots.some(r=>r.time_slot===tm&&r.status!=="cancelled")){
        setTakenSlots(freshSlots);
        setFm(p=>({...p,tm:""}));
        setSubmitError("Ese horario acaba de ser reservado. Elegí otro.");
        setSubmitting(false);return;
      }

      const{error}=await sb.from("gf_appointments").insert({
        client_name:n.trim(),
        client_email:em.trim(),
        client_phone:normPhone(ph),
        service_id:parseInt(sv),
        appointment_date:dt,
        time_slot:tm,
        status:"pending"
      });

      if(error){
        if(error.code==="23505"){setSubmitError("Ese horario acaba de ser reservado. Elegí otro.");setTakenSlots(p=>[...p,{time_slot:tm,service_id:parseInt(sv),status:"pending"}]);setFm(p=>({...p,tm:""}));}
        else{setSubmitError("Error al reservar. Intentá de nuevo.");}
        setSubmitting(false);return;
      }

      const selSvc=svcs.find(s=>s.id===+sv);
      const sn=selSvc?.name||sv;
      const pr=selSvc?.price||0;
      const dur_min=selSvc?.duration_minutes||60;
      const df=new Date(dt+"T12:00:00").toLocaleDateString("es-AR",{weekday:"long",day:"numeric",month:"long"});

      try{
        await fetch(`${SB_URL}/functions/v1/notify-booking`,{
          method:"POST",
          headers:{"Content-Type":"application/json","apikey":SB_KEY},

        });
      }catch(e){console.warn("notify-booking failed",e)}

      setSentData({nombre:n.trim(),servicio:sn,fecha:df,horario:tm,precio:fP(pr),fecha_raw:dt,dur_min});
      setSubmitting(false);setSent(true);
    }catch(err){
      setSubmitError("Error de conexión. Intentá de nuevo.");
      setSubmitting(false);
    }
  };

  const go=id=>{document.getElementById(id)?.scrollIntoView({behavior:"smooth"});setMn(false)};

  return(

            )}

          </div>
          <button className="md:hidden w-10 h-10 flex items-center justify-center rounded-xl transition-colors" style={{background:mn?'rgba(61,74,24,.08)':'transparent'}} onClick={()=>setMn(!mn)}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d={mn?"M6 6L18 18M6 18L18 6":"M4 7H20M4 12H16M4 17H20"} stroke="var(--olive-dk)" strokeWidth="1.5" strokeLinecap="round"/></svg>
          </button>
        </div>

          {[{id:"servicios",l:"Servicios"},{id:"reservar",l:"Turnos"},{id:"contacto",l:"Contacto"}].map(x=>
            <button key={x.id} onClick={()=>go(x.id)} className="block w-full text-left text-sm py-3 px-3 rounded-xl transition-colors hover:bg-[rgba(94,107,46,.05)] capitalize font-light" style={{color:'var(--muted)'}}>{x.l}</button>
          )}
          <button onClick={()=>{setBk(true);setMn(false);setTimeout(()=>go("reservar"),100)}} className="btn-primary w-full text-sm font-medium py-3.5 rounded-full mt-2">Reservar Turno</button>
        </div>}
      </nav>

      {/* ══════ HERO ══════ */}
      <section id="hero" className="relative min-h-screen flex items-center overflow-hidden">
        {/* Organic shapes */}
        <div className="absolute top-[10%] left-1/2 -translate-x-1/2 w-72 sm:w-[480px] h-72 sm:h-[480px] opacity-[.06] pointer-events-none" style={{background:'var(--olive)',animation:'blob 20s ease-in-out infinite',borderRadius:'60% 40% 30% 70%/60% 30% 70% 40%'}}/>

                    setDateError("");

                    setFm(p=>({...p,dt:e.target.value,tm:""}));
                  }} className="field w-full px-4 py-3.5 rounded-xl text-sm" required/>
                  {dateError&&<p className="text-[11px] mt-2 font-medium" style={{color:'#B91C1C'}}>{dateError}</p>}
                </div>
                {/* Time slots */}
                {fm.dt&&fm.sv&&(()=>{
                  const selSvc=svcs.find(s=>s.id===+fm.sv);
                  const dur=selSvc?.duration_minutes||60;
                  const slots=genSlots(dur);
                  return(
                  <div className="fade">
                    <label className="text-[10px] uppercase tracking-[.2em] block mb-3 font-medium" style={{color:'var(--muted)',opacity:.5}}>
                      Horario {loadingSlots&&<span className="opacity-50 normal-case tracking-normal">· cargando...</span>}

                    <div className="grid grid-cols-3 gap-2">
                      {slots.map(t=>{
                        const avail=slotAvailable(t,dur,takenSlots,svcs,blocks,fm.dt);
                        const sel=fm.tm===t;
                        return <button key={t} type="button" disabled={!avail}
                          onClick={()=>avail&&setFm(p=>({...p,tm:t}))}
                          className="slot-btn rounded-xl text-sm font-medium"
                          style={{

                            background:!avail?'rgba(0,0,0,.02)':sel?'var(--olive-dk)':'rgba(255,255,255,.6)',

                            borderColor:!avail?'rgba(0,0,0,.03)':sel?'var(--olive-dk)':'rgba(94,107,46,.12)',
                            boxShadow:sel?'0 6px 24px rgba(61,74,24,.2)':'none',
                            cursor:!avail?'not-allowed':'pointer',
                            opacity:!avail?0.4:1,
                          }}>
                          {t}
                        </button>
                      })}
                    </div>
                    {fm.tm&&(()=>{
                      const[h,m]=fm.tm.split(":").map(Number);
                      const endMin=h*60+m+dur;
                      const eh=Math.floor(endMin/60),em=endMin%60;
                      const endStr=`${String(eh).padStart(2,'0')}:${String(em).padStart(2,'0')}`;
                      return <p className="text-xs font-medium mt-2 text-center" style={{color:'var(--olive-dk)'}}>
                        {fm.tm} → {endStr} hs
                      </p>;
                    })()}
                  </div>
                  );
                })()}
                {fm.dt&&!fm.sv&&(
                  <p className="text-xs text-center py-3" style={{color:'var(--muted)',opacity:.6}}>Elegí un servicio para ver los horarios disponibles</p>
                )}
                {/* Error */}
                {submitError&&<p className="text-xs text-center py-2.5 px-4 rounded-xl" style={{background:'#fef2f2',color:'#991b1b',border:'1px solid #fecaca'}}>{submitError}</p>}
                {/* Submit */}
                <button type="submit" disabled={submitting}

                </button>
                <p className="text-center text-[11px] font-light leading-relaxed" style={{color:'var(--muted)',opacity:.5}}>
                  Política de cancelación: avisanos por WhatsApp con al menos 4 hs de anticipación.
                </p>
              </form>
            </div>
          )}
