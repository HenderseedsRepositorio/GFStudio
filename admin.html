const getWeekDates=(offset)=>{
  const now=new Date();
  const dow=now.getDay();
  const diff=dow===0?-6:1-dow;
  const mon=new Date(now);
  mon.setDate(now.getDate()+diff+offset*7);
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d});
};

const dateToYMD=d=>d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,'0')+"-"+String(d.getDate()).padStart(2,'0');

const toMinB=t=>{if(!t)return 0;const[h,m]=t.split(":").map(Number);return h*60+m};

const isSlotBlockedAdmin=(date,time,blocks)=>{
  const dow=new Date(date+"T12:00:00").getDay();
  const mb=dow===0?6:dow-1;
  const tMin=toMinB(time),tEnd=tMin+30;
  return blocks.some(b=>{
    switch(b.type){
      case"full_day": return b.block_date===date;
      case"datetime_range":
        if(b.block_date!==date)return false;
        return toMinB(b.start_time.slice(0,5))<tEnd&&toMinB(b.end_time.slice(0,5))>tMin;
      case"date_range": return date>=b.date_from&&date<=b.date_to;
      case"weekly":
        if(b.day_of_week!==mb)return false;
        if(b.recurring_from&&date<b.recurring_from)return false;
        if(b.recurring_to&&date>b.recurring_to)return false;
        if(b.start_time&&b.end_time) return toMinB(b.start_time.slice(0,5))<tEnd&&toMinB(b.end_time.slice(0,5))>tMin;
        return true;
      default: return false;
    }
  });
};

          {a.status==="confirmed"&&(
            <button onClick={()=>markNoShow(a)} disabled={updating===a.id}

          {a.status!=="cancelled"&&a.status!=="no_show"&&(
            <button onClick={()=>cancelAndNotify(a)} disabled={updating===a.id}

              {updating===a.id?"...":"Cancelar + Avisar"}
            </button>
          )}
          {(a.status==="cancelled"||a.status==="no_show")&&(
            <button onClick={()=>updateStatus(a.id,"pending")} disabled={updating===a.id}
              className="text-[11px] font-medium px-3 py-1.5 rounded-lg" style={{background:'rgba(0,0,0,.04)',color:'#8A8470'}}>
              Reactivar
            </button>
          )}
          <button onClick={()=>deleteAppt(a.id,a.client_name)} className="text-[11px] px-3 py-1.5 rounded-lg ml-auto" style={{color:'#8A8470'}}>Eliminar</button>
          <a href={`https://api.whatsapp.com/send?phone=${waTel(a.client_phone)}`} target="_blank"
            className="text-[11px] font-medium px-2.5 py-1.5 rounded-lg text-white flex items-center justify-center" style={{background:'#25D366'}}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="#fff"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          </a>
        </div>
        <p className="text-[9px] mt-2" style={{color:'rgba(0,0,0,.15)'}}>Reservado: {new Date(a.created_at).toLocaleString("es-AR")}</p>
      </div>
    );
  };

  const svcName=id=>services.find(s=>s.id===id)?.name||"—";
  const svcPrice=id=>services.find(s=>s.id===id)?.price||0;

  const getPeriodDates=(filter,from,to)=>{
    const now=new Date();
    const pad=n=>String(n).padStart(2,'0');
    const fmt=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    if(filter==="today"){const t=fmt(now);return{from:t,to:t};}
    if(filter==="week"){
      const dow=now.getDay(),diff=dow===0?-6:1-dow;
      const mon=new Date(now);mon.setDate(now.getDate()+diff);
      const sun=new Date(mon);sun.setDate(mon.getDate()+6);
      return{from:fmt(mon),to:fmt(sun)};
    }
    if(filter==="month"){
      const f=new Date(now.getFullYear(),now.getMonth(),1);
      const l=new Date(now.getFullYear(),now.getMonth()+1,0);
      return{from:fmt(f),to:fmt(l)};
    }
    return{from,to};
  };

  const saveApptDetails=async(id)=>{
    setSavingAppt(id);
    const edit=apptEdit[id]||{};
    await sb.from("gf_appointments").update({
      charged_price:edit.charged_price?Number(edit.charged_price):null,
      payment_method:edit.payment_method||null,
      notes:edit.notes||null,
    }).eq("id",id);
    setApptEdit(p=>{const n={...p};delete n[id];return n;});
    await fetchData();
    setSavingAppt(null);
  };

  // Stats
  const pendingCount=appointments.filter(a=>a.status==="pending"&&a.appointment_date>=today).length;
  const confirmedCount=appointments.filter(a=>a.status==="confirmed"&&a.appointment_date>=today).length;
  const todayCount=appointments.filter(a=>a.appointment_date===today&&a.status!=="cancelled").length;

  if(!auth){
    return(
      <div className="min-h-screen flex items-center justify-center px-4">
        <form onSubmit={login} className="w-full max-w-xs">
          <div className="rounded-2xl p-8 text-center" style={{background:'#FEFDF8',border:'1px solid rgba(0,0,0,.06)',boxShadow:'0 20px 60px rgba(0,0,0,.05)'}}>
            <h1 className="text-xl font-bold mb-1">GF Studio</h1>
            <p className="text-xs mb-6" style={{color:'#8A8470'}}>Panel de Turnos</p>
            <input type="password" value={pass} onChange={e=>setPass(e.target.value)}
              className="w-full px-4 py-3 rounded-xl text-sm text-center mb-3"
              style={{background:'#F5F1E8',border:'1.5px solid rgba(0,0,0,.08)'}}
              placeholder="Contraseña" autoFocus/>
            <button type="submit" className="w-full py-3 rounded-xl text-sm font-medium text-white" style={{background:'#3D4A18'}}>
              Entrar
            </button>
          </div>
        </form>
        {modal&&(
          <div className="fixed inset-0 z-50 flex items-center justify-center px-5" style={{background:'rgba(0,0,0,.4)',backdropFilter:'blur(4px)'}}>
            <div className="w-full max-w-sm rounded-2xl p-6 text-center" style={{background:'#FEFDF8',boxShadow:'0 24px 80px rgba(0,0,0,.15)'}}>
              <h3 className="text-base font-bold mb-2" style={{color:'#1C1A14'}}>{modal.title}</h3>
              <p className="text-sm mb-6 leading-relaxed whitespace-pre-line" style={{color:'#5C5840'}}>{modal.message}</p>
              <button onClick={()=>{setModal(null);modal.onConfirm()}} className="w-full py-2.5 rounded-xl text-sm font-medium text-white" style={{background:modal.confirmColor||'#3D4A18'}}>
                {modal.confirmLabel||"OK"}
              </button>
            </div>
          </div>
        )}
      </div>
    );
  }

  return(
    <div className="min-h-screen">
      {/* Header */}
      <div className="sticky top-0 z-10 px-4 py-3" style={{background:'rgba(245,241,232,.92)',backdropFilter:'blur(12px)',borderBottom:'1px solid rgba(0,0,0,.04)'}}>
        <div className="flex items-center justify-between mb-2">
          <div>
            <h1 className="text-base font-bold">GF Studio</h1>
            <p className="text-[10px]" style={{color:'#8A8470'}}>Panel de administración</p>
          </div>
          <button onClick={fetchData} className="text-xs px-3 py-1.5 rounded-lg" style={{background:'rgba(0,0,0,.04)',color:'#8A8470'}}>
            Actualizar
          </button>
        </div>
        <div className="flex gap-1 overflow-x-auto pb-0.5">
          {[{k:"turnos",l:"Turnos"},{k:"servicios",l:"Servicios"},{k:"bloqueos",l:"Bloqueos"},{k:"resultados",l:"Resultados"},{k:"clientes",l:"Clientes"},{k:"packs",l:"Packs"}].map(t=>(
            <button key={t.k} onClick={()=>setTab(t.k)}
              className="px-3.5 py-1.5 rounded-lg text-xs font-semibold whitespace-nowrap transition-all flex-shrink-0"
              style={{background:tab===t.k?'#3D4A18':'rgba(0,0,0,.04)',color:tab===t.k?'#F5F1E8':'#8A8470'}}>
              {t.l}
            </button>
          ))}
        </div>
      </div>

      {tab==="turnos"&&(
      <div className="px-4 py-4 max-w-3xl mx-auto">
        {/* Stats */}
        <div className="grid grid-cols-3 gap-2 mb-5">
          {[
            {n:todayCount,l:"Hoy",bg:"#3D4A18",tx:"#fff"},
            {n:pendingCount,l:"Pendientes",bg:"#FEF3C7",tx:"#92400E"},
            {n:confirmedCount,l:"Confirmados",bg:"#D1FAE5",tx:"#065F46"},
          ].map((s,i)=>(
            <div key={i} className="rounded-xl p-3 text-center" style={{background:s.bg,color:s.tx}}>
              <p className="text-2xl font-bold">{s.n}</p>
              <p className="text-[10px] opacity-70">{s.l}</p>
            </div>
          ))}
        </div>

        {/* View toggle */}
        <div className="flex gap-1.5 mb-3">
          {[{k:"list",l:"Lista"},{k:"calendar",l:"Calendario"}].map(v=>(
            <button key={v.k} onClick={()=>{setView(v.k);setCalSelectedDay(null)}}
              className="px-3 py-1.5 rounded-lg text-xs font-medium transition-all"
              style={{background:view===v.k?'#3D4A18':'rgba(0,0,0,.04)',color:view===v.k?'#F5F1E8':'#8A8470'}}>
              {v.l}
            </button>
          ))}
        </div>

        {view==="calendar"?(
          <div>
            {/* Month nav */}
            <div className="flex items-center justify-between mb-3 px-1">
              <button onClick={()=>setCalMonth(d=>new Date(d.getFullYear(),d.getMonth()-1,1))}
                className="w-8 h-8 rounded-lg flex items-center justify-center" style={{background:'rgba(0,0,0,.04)'}}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="#5C5840" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
              </button>
              <h2 className="text-sm font-semibold" style={{color:'#1C1A14'}}>{monthLabel(calMonth)}</h2>
              <button onClick={()=>setCalMonth(d=>new Date(d.getFullYear(),d.getMonth()+1,1))}
                className="w-8 h-8 rounded-lg flex items-center justify-center" style={{background:'rgba(0,0,0,.04)'}}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="#5C5840" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
              </button>
            </div>

            {/* Day headers */}
            <div className="grid grid-cols-7 gap-1 mb-1">
              {["L","M","X","J","V","S","D"].map((d,i)=>(
                <div key={d} className="text-center text-[10px] font-medium py-1.5" style={{color:'#8A8470'}}>{d}</div>
              ))}

            {/* Calendar grid */}
            <div className="grid grid-cols-7 gap-1 mb-5">

                if(!cell)return <div key={i}/>;
                const counts=dayCounts(cell);
                const isToday=cell===today;
                const isSelected=cell===calSelectedDay;
                const isPast=cell<today;
                return(
                  <button key={i} onClick={()=>setCalSelectedDay(cell)}
                    className="rounded-lg p-1 flex flex-col items-center justify-between transition-all"
                    style={{
                      minHeight:'44px',
                      background:isSelected?'#3D4A18':isToday?'rgba(61,74,24,.12)':'#FEFDF8',
                      color:isSelected?'#F5F1E8':isPast?'#A8A296':'#1C1A14',
                      border:isSelected?'none':'1px solid rgba(0,0,0,.04)',
                      opacity:(isPast&&!isSelected)?0.7:1,
                    }}>
                    <span className="text-[12px] font-semibold leading-none mt-0.5">{parseInt(cell.split("-")[2])}</span>
                    <div className="flex gap-0.5">
                      {counts.confirmed>0&&<span className="w-2 h-2 rounded-full" style={{background:isSelected?'#fff':'#10B981'}}/>}
                      {counts.pending>0&&<span className="w-2 h-2 rounded-full" style={{background:isSelected?'#fff':'#F59E0B'}}/>}
                      {counts.cancelled>0&&counts.total===0&&<span className="w-2 h-2 rounded-full" style={{background:isSelected?'#fff':'#EF4444'}}/>}
                    </div>
                    {counts.total>0&&<span className="text-[9px] font-medium opacity-70 leading-none mb-0.5">{counts.total}</span>}
                    {counts.total===0&&<span className="text-[9px] opacity-0 leading-none mb-0.5">0</span>}
                  </button>
                );
              })}
            </div>

            {/* Selected day details */}
            {calSelectedDay&&(
              <div>
                <h3 className="text-sm font-semibold mb-2 px-1" style={{color:'#3D4A18'}}>
                  Turnos del {fDate(calSelectedDay)}
                </h3>
                {dayAppts(calSelectedDay).length===0?(
                  <p className="text-center text-xs py-6" style={{color:'#8A8470'}}>Sin turnos este día</p>
                ):(
                  <div className="space-y-2.5">
                    {dayAppts(calSelectedDay).sort((a,b)=>a.time_slot.localeCompare(b.time_slot)).map(renderAppt)}
                  </div>
                )}
              </div>
            )}

            {!calSelectedDay&&(
              <p className="text-center text-xs py-4" style={{color:'#8A8470'}}>Tocá un día para ver sus turnos</p>
            )}
          </div>
        ):(
        <>
        {/* Filters */}
        <div className="flex gap-1.5 mb-5">
          {[{k:"upcoming",l:"Próximos"},{k:"today",l:"Hoy"},{k:"all",l:"Todos"}].map(f=>(
            <button key={f.k} onClick={()=>setFilter(f.k)}
              className="px-3 py-1.5 rounded-lg text-xs font-medium transition-all"
              style={{background:filter===f.k?'#1C1A14':'rgba(0,0,0,.04)',color:filter===f.k?'#F5F1E8':'#8A8470'}}>
              {f.l}
            </button>
          ))}
        </div>

        {/* Appointments list */}
        {loading?(
          <p className="text-center text-sm py-10" style={{color:'#8A8470'}}>Cargando...</p>
        ):filtered.length===0?(
          <p className="text-center text-sm py-10" style={{color:'#8A8470'}}>No hay turnos {filter==="today"?"para hoy":filter==="upcoming"?"próximos":""}</p>
        ):(
          <div className="space-y-2.5">
            {filtered.map(renderAppt)}
          </div>
        )}
        </>
        )}
      </div>
      )}

      {tab==="servicios"&&(
        <div className="px-4 py-4 max-w-3xl mx-auto space-y-4">
          {/* Form */}

            <h2 className="text-sm font-bold mb-3" style={{color:'#1C1A14'}}>{editingSvc?"Editar servicio":"Nuevo servicio"}</h2>
            <div className="space-y-3">
              <div>
                <label className="text-[10px] uppercase tracking-widest font-medium block mb-1" style={{color:'#8A8470'}}>Nombre</label>
                <input value={svcForm.name} onChange={e=>setSvcForm(p=>({...p,name:e.target.value}))}
                  className="w-full px-3 py-2.5 rounded-lg text-sm"
                  style={{background:'#F5F1E8',border:'1.5px solid rgba(0,0,0,.07)'}}
                  placeholder="Ej: Limpieza Facial"/>
              </div>
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="text-[10px] uppercase tracking-widest font-medium block mb-1" style={{color:'#8A8470'}}>Precio ($)</label>
                  <input type="number" value={svcForm.price} onChange={e=>setSvcForm(p=>({...p,price:e.target.value}))}
                    className="w-full px-3 py-2.5 rounded-lg text-sm"
                    style={{background:'#F5F1E8',border:'1.5px solid rgba(0,0,0,.07)'}}
                    placeholder="20000"/>
                </div>
                <div>
                  <label className="text-[10px] uppercase tracking-widest font-medium block mb-1" style={{color:'#8A8470'}}>Duración</label>
                  <select value={svcForm.duration_minutes} onChange={e=>setSvcForm(p=>({...p,duration_minutes:+e.target.value}))}
                    className="w-full px-3 py-2.5 rounded-lg text-sm appearance-none"
                    style={{background:'#F5F1E8',border:'1.5px solid rgba(0,0,0,.07)'}}>
                    {[30,45,60,90,120].map(m=><option key={m} value={m}>{m} min</option>)}
                  </select>
                </div>
              </div>
              <div>
                <label className="text-[10px] uppercase tracking-widest font-medium block mb-1" style={{color:'#8A8470'}}>Descripción (opcional)</label>
                <input value={svcForm.description} onChange={e=>setSvcForm(p=>({...p,description:e.target.value}))}
                  className="w-full px-3 py-2.5 rounded-lg text-sm"
                  style={{background:'#F5F1E8',border:'1.5px solid rgba(0,0,0,.07)'}}
                  placeholder="Breve descripción del servicio"/>
              </div>
              <div className="flex gap-2 pt-1">
                {editingSvc&&<button onClick={()=>{setEditingSvc(null);setSvcForm({name:"",price:"",duration_minutes:60,description:""})}}
                  className="flex-1 py-2.5 rounded-xl text-sm" style={{background:'rgba(0,0,0,.05)',color:'#8A8470'}}>
                  Cancelar
                </button>}
                <button onClick={saveSvc} disabled={!svcForm.name||!svcForm.price||svcLoading}
                  className="flex-1 py-2.5 rounded-xl text-sm font-semibold text-white disabled:opacity-40"
                  style={{background:'#3D4A18'}}>
                  {svcLoading?"Guardando...":(editingSvc?"Guardar cambios":"+ Agregar servicio")}
                </button>
              </div>
            </div>
          </div>

          {/* Lista */}
          <div className="space-y-2">
            {svcList.map(s=>(
              <div key={s.id} className="rounded-xl p-3.5 flex items-center gap-3" style={{background:'#FEFDF8',border:'1px solid rgba(0,0,0,.05)'}}>
                <div className="flex-1 min-w-0">
                  <p className="text-sm font-semibold truncate">{s.name}</p>
                  <p className="text-xs" style={{color:'#8A8470'}}>{s.duration_minutes||60} min · ${(s.price||0).toLocaleString("es-AR")}</p>
                </div>
                <button onClick={()=>startEditSvc(s)} className="text-xs px-2.5 py-1.5 rounded-lg flex-shrink-0" style={{background:'rgba(61,74,24,.08)',color:'#3D4A18'}}>Editar</button>
                <button onClick={()=>deleteSvc(s.id,s.name)} className="text-xs px-2.5 py-1.5 rounded-lg flex-shrink-0" style={{background:'#FEE2E2',color:'#991B1B'}}>Eliminar</button>
              </div>
            ))}
            {svcList.length===0&&<p className="text-center text-sm py-6" style={{color:'#8A8470'}}>No hay servicios cargados</p>}
          </div>
        </div>
      )}
      {tab==="bloqueos"&&(()=>{
  const weekDates=getWeekDates(blkWeekOffset);
  const todayYMD=new Date().toISOString().split("T")[0];
  const fromD=weekDates[0],toD=weekDates[6];
  const weekLabel=`${fromD.getDate()} ${MONTHS_ES[fromD.getMonth()]} — ${toD.getDate()} ${MONTHS_ES[toD.getMonth()]} ${toD.getFullYear()}`;
  return(
  <div className="px-4 py-4 max-w-3xl mx-auto space-y-4">
    {/* Grilla semanal */}
    <div className="rounded-xl p-3" style={{background:'#FEFDF8',border:'1px solid rgba(0,0,0,.05)'}}>
      <div className="flex items-center justify-between mb-3">
        <button onClick={()=>setBlkWeekOffset(o=>o-1)} className="w-8 h-8 rounded-lg flex items-center justify-center text-sm" style={{background:'rgba(0,0,0,.05)'}}>←</button>
        <span className="text-xs font-semibold" style={{color:'#1C1A14'}}>{weekLabel}</span>
        <button onClick={()=>setBlkWeekOffset(o=>o+1)} className="w-8 h-8 rounded-lg flex items-center justify-center text-sm" style={{background:'rgba(0,0,0,.05)'}}>→</button>
      </div>

      <div style={{overflowX:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:'10px',minWidth:'340px'}}>
          <thead>
            <tr>
              <th style={{width:'36px',background:'transparent'}}></th>
              {weekDates.map((d,i)=>{
                const isToday=dateToYMD(d)===todayYMD;
                const isFullBlocked=blockList.some(b=>b.type==="full_day"&&b.block_date===dateToYMD(d));
                return(
                  <th key={i} onClick={()=>toggleFullDayBlock(dateToYMD(d))}
                    style={{
                      padding:'5px 2px 7px',textAlign:'center',cursor:'pointer',
                      background:isFullBlocked?'#FECACA':isToday?'#5E6B2E':'#3D4A18',
                      color:'#F5F1E8',userSelect:'none'
                    }}>
                    <span style={{display:'block',fontSize:'9px',fontWeight:700,letterSpacing:'.05em'}}>{DAYS_ES[i]}</span>
                    <span style={{display:'block',fontSize:'13px',fontWeight:700,marginTop:'2px'}}>{d.getDate()}</span>
                    <span style={{display:'block',fontSize:'9px',opacity:.7}}>{MONTHS_ES[d.getMonth()]}</span>
                    {isFullBlocked&&<span style={{display:'block',fontSize:'8px',marginTop:'2px'}}>CERRADO</span>}
                  </th>
                );
              })}
            </tr>
          </thead>
          <tbody>
            {BLK_TIMES.map(t=>(
              <tr key={t}>
                <td style={{background:'#F5F1E8',color:'#8A8470',textAlign:'right',paddingRight:'4px',fontSize:'9px',fontWeight:500,border:'none',whiteSpace:'nowrap'}}>{t}</td>
                {weekDates.map((d,ci)=>{
                  const date=dateToYMD(d);
                  const isBlocked=isSlotBlockedAdmin(date,t,blockList);
                  const hasAppt=appointments.some(a=>a.appointment_date===date&&a.time_slot===t&&a.status!=="cancelled");
                  return(
                    <td key={ci} onClick={()=>!hasAppt&&toggleDayTimeBlock(date,t)}
                      style={{
                        border:'1px solid rgba(0,0,0,.05)',height:'20px',textAlign:'center',

                <div className="grid grid-cols-2 gap-2 pt-3">

                    <label className="text-[10px] uppercase tracking-widest font-medium block mb-1" style={{color:'#8A8470'}}>Precio cobrado ($)</label>
                    <input type="number" value={edit.charged_price} onChange={e=>setApptEdit(p=>({...p,[a.id]:{...(p[a.id]||{}),charged_price:e.target.value}}))} className="w-full px-2.5 py-2 rounded-lg text-sm" style={{background:'#F5F1E8',border:'1.5px solid rgba(0,0,0,.07)'}} placeholder={String(listPrice)}/>
                    <p className="text-[9px] mt-0.5" style={{color:'#8A8470'}}>Lista: ${listPrice.toLocaleString("es-AR")}</p>
                  </div>
                  <div>
                    <label className="text-[10px] uppercase tracking-widest font-medium block mb-1" style={{color:'#8A8470'}}>Método de pago</label>
                    <select value={edit.payment_method} onChange={e=>setApptEdit(p=>({...p,[a.id]:{...(p[a.id]||{}),payment_method:e.target.value}}))} className="w-full px-2.5 py-2 rounded-lg text-sm appearance-none" style={{background:'#F5F1E8',border:'1.5px solid rgba(0,0,0,.07)'}}>
                      <option value="">Sin registrar</option>
                      <option value="efectivo">Efectivo</option>
                      <option value="transferencia">Transferencia</option>
                      <option value="tarjeta_debito">Tarjeta débito</option>
                      <option value="tarjeta_credito">Tarjeta crédito</option>
                    </select>
                  </div>
                </div>
                <div>
                  <label className="text-[10px] uppercase tracking-widest font-medium block mb-1" style={{color:'#8A8470'}}>Notas internas</label>
                  <input value={edit.notes} onChange={e=>setApptEdit(p=>({...p,[a.id]:{...(p[a.id]||{}),notes:e.target.value}}))} className="w-full px-2.5 py-2 rounded-lg text-sm" style={{background:'#F5F1E8',border:'1.5px solid rgba(0,0,0,.07)'}} placeholder="Observaciones, descuentos, etc."/>
                </div>
                <button onClick={()=>saveApptDetails(a.id)} disabled={savingAppt===a.id} className="w-full py-2 rounded-lg text-xs font-semibold text-white disabled:opacity-40" style={{background:'#3D4A18'}}>
                  {savingAppt===a.id?"Guardando...":"Guardar"}
                </button>
              </div>
            )}
          </div>
        );
      })}
    </div>
  </div>
  );
})()}

      {tab==="clientes"&&(()=>{
  const clientMap={};
  appointments.filter(a=>a.status!=="cancelled").forEach(a=>{
    if(!a.client_email)return;
    if(!clientMap[a.client_email])clientMap[a.client_email]={email:a.client_email,name:a.client_name,phone:a.client_phone,turnos:[]};
    clientMap[a.client_email].turnos.push(a);
    clientMap[a.client_email].name=a.client_name;
    clientMap[a.client_email].phone=a.client_phone;
  });
  const clients=Object.values(clientMap).sort((a,b)=>{
    const la=a.turnos.slice().sort((x,y)=>y.appointment_date.localeCompare(x.appointment_date))[0]?.appointment_date||'';
    const lb=b.turnos.slice().sort((x,y)=>y.appointment_date.localeCompare(x.appointment_date))[0]?.appointment_date||'';
    return lb.localeCompare(la);
  });
  return(
  <div className="px-4 py-4 max-w-3xl mx-auto space-y-2">
    <p className="text-xs font-semibold mb-1" style={{color:'#8A8470'}}>{clients.length} clientes únicos</p>
    {clients.length===0&&<p className="text-center text-sm py-8" style={{color:'#8A8470'}}>No hay clientes aún</p>}
    {clients.map(c=>{
      const sorted=c.turnos.slice().sort((a,b)=>b.appointment_date.localeCompare(a.appointment_date));
      const ltv=c.turnos.reduce((acc,a)=>acc+(a.charged_price!=null?Number(a.charged_price):svcPrice(a.service_id)),0);
      const lastVisit=sorted[0]?.appointment_date;
      const isExp=selectedClient===c.email;
      return(
        <div key={c.email} className="rounded-xl overflow-hidden" style={{background:'#FEFDF8',border:'1px solid rgba(0,0,0,.05)'}}>
          <div className="p-3 flex items-center gap-3 cursor-pointer" onClick={()=>setSelectedClient(isExp?null:c.email)}>
            <div className="w-9 h-9 rounded-full flex items-center justify-center flex-shrink-0 text-sm font-bold" style={{background:'rgba(61,74,24,.08)',color:'#3D4A18'}}>
              {c.name.charAt(0).toUpperCase()}
            </div>
            <div className="flex-1 min-w-0">
              <p className="text-sm font-semibold truncate">{c.name}</p>
              <p className="text-[11px]" style={{color:'#8A8470'}}>{c.phone} · {c.email}</p>
            </div>
            <div className="text-right flex-shrink-0">
              <p className="text-xs font-bold" style={{color:'#3D4A18'}}>${ltv.toLocaleString("es-AR")}</p>
              <p className="text-[10px]" style={{color:'#8A8470'}}>{c.turnos.length} {c.turnos.length===1?"turno":"turnos"}</p>
            </div>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" style={{flexShrink:0,transform:isExp?'rotate(180deg)':'none',transition:'transform .2s'}}><path d="M6 9l6 6 6-6" stroke="#8A8470" strokeWidth="2" strokeLinecap="round"/></svg>
          </div>
          {isExp&&(
            <div className="px-3 pb-3 space-y-1.5" style={{borderTop:'1px solid rgba(0,0,0,.04)'}}>
              <p className="text-[10px] font-semibold pt-2 mb-1" style={{color:'#8A8470'}}>Última visita: {lastVisit?fDate(lastVisit):"—"}</p>
              {sorted.map(a=>{
                const st=STATUS_COLORS[a.status]||STATUS_COLORS.pending;
                return(
                  <div key={a.id} className="flex items-center justify-between p-2 rounded-lg" style={{background:'#F5F1E8'}}>
                    <div className="min-w-0">
                      <p className="text-xs font-medium truncate">{fDate(a.appointment_date)} · {a.time_slot} hs</p>
                      <p className="text-[10px]" style={{color:'#8A8470'}}>{svcName(a.service_id)}</p>
                    </div>
                    <div className="flex items-center gap-2 flex-shrink-0">
                      <span className="text-[10px] font-medium px-2 py-0.5 rounded-full" style={{background:st.bg,color:st.tx}}>{st.label}</span>
                      <span className="text-xs font-bold" style={{color:'#3D4A18'}}>${(a.charged_price!=null?Number(a.charged_price):svcPrice(a.service_id)).toLocaleString("es-AR")}</span>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    })}
  </div>
  );
})()}

      {tab==="packs"&&(
        <div className="px-4 py-4 max-w-3xl mx-auto space-y-4">
          <div className="rounded-xl p-4" style={{background:'#FEFDF8',border:'1px solid rgba(0,0,0,.05)'}}>
            <h2 className="text-sm font-bold mb-3" style={{color:'#1C1A14'}}>{editingPack?"Editar pack":"Nuevo pack"}</h2>
            <div className="space-y-3">
              <div>
                <label className="text-[10px] uppercase tracking-widest font-medium block mb-1" style={{color:'#8A8470'}}>Nombre del pack</label>
                <input value={packForm.name} onChange={e=>setPackForm(p=>({...p,name:e.target.value}))} className="w-full px-3 py-2.5 rounded-lg text-sm" style={{background:'#F5F1E8',border:'1.5px solid rgba(0,0,0,.07)'}} placeholder="Ej: Pack 3 Limpiezas"/>
              </div>
              <div>
                <label className="text-[10px] uppercase tracking-widest font-medium block mb-1" style={{color:'#8A8470'}}>Servicios incluidos</label>
                <input value={packForm.services_included} onChange={e=>setPackForm(p=>({...p,services_included:e.target.value}))} className="w-full px-3 py-2.5 rounded-lg text-sm" style={{background:'#F5F1E8',border:'1.5px solid rgba(0,0,0,.07)'}} placeholder="Ej: 3x Limpieza Facial Profunda"/>
              </div>
              <div className="grid grid-cols-3 gap-2">
                <div>
                  <label className="text-[10px] uppercase tracking-widest font-medium block mb-1" style={{color:'#8A8470'}}>Precio pack ($)</label>
                  <input type="number" value={packForm.pack_price} onChange={e=>setPackForm(p=>({...p,pack_price:e.target.value}))} className="w-full px-3 py-2.5 rounded-lg text-sm" style={{background:'#F5F1E8',border:'1.5px solid rgba(0,0,0,.07)'}} placeholder="50000"/>
                </div>
                <div>
                  <label className="text-[10px] uppercase tracking-widest font-medium block mb-1" style={{color:'#8A8470'}}>Precio lista ($)</label>
                  <input type="number" value={packForm.list_price} onChange={e=>setPackForm(p=>({...p,list_price:e.target.value}))} className="w-full px-3 py-2.5 rounded-lg text-sm" style={{background:'#F5F1E8',border:'1.5px solid rgba(0,0,0,.07)'}} placeholder="60000"/>
                </div>
                <div>
                  <label className="text-[10px] uppercase tracking-widest font-medium block mb-1" style={{color:'#8A8470'}}>Usos</label>
                  <input type="number" min="1" value={packForm.uses_count} onChange={e=>setPackForm(p=>({...p,uses_count:e.target.value}))} className="w-full px-3 py-2.5 rounded-lg text-sm" style={{background:'#F5F1E8',border:'1.5px solid rgba(0,0,0,.07)'}}/>
                </div>
              </div>
              <div className="flex gap-2 pt-1">
                {editingPack&&<button onClick={()=>{setEditingPack(null);setPackForm({name:"",services_included:"",pack_price:"",list_price:"",uses_count:1})}} className="flex-1 py-2.5 rounded-xl text-sm" style={{background:'rgba(0,0,0,.05)',color:'#8A8470'}}>Cancelar</button>}
                <button onClick={savePack} disabled={!packForm.name||!packForm.pack_price||packLoading} className="flex-1 py-2.5 rounded-xl text-sm font-semibold text-white disabled:opacity-40" style={{background:'#3D4A18'}}>
                  {packLoading?"Guardando...":(editingPack?"Guardar cambios":"+ Agregar pack")}
                </button>
              </div>
            </div>
          </div>
          <div className="space-y-2">
            {packList.map(pk=>{
              const disc=pk.list_price&&pk.list_price>pk.pack_price?Math.round((1-pk.pack_price/pk.list_price)*100):0;
              return(
                <div key={pk.id} className="rounded-xl p-3.5" style={{background:'#FEFDF8',border:'1px solid rgba(0,0,0,.05)'}}>
                  <div className="flex items-start justify-between gap-2 mb-1">
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2 flex-wrap">
                        <p className="text-sm font-semibold">{pk.name}</p>
                        {disc>0&&<span className="text-[10px] font-bold px-1.5 py-0.5 rounded-full" style={{background:'#D1FAE5',color:'#065F46'}}>-{disc}%</span>}
                      </div>
                      {pk.services_included&&<p className="text-xs mt-0.5" style={{color:'#8A8470'}}>{pk.services_included}</p>}
                    </div>
                    <div className="text-right flex-shrink-0">
                      <p className="text-sm font-bold" style={{color:'#3D4A18'}}>${(pk.pack_price||0).toLocaleString("es-AR")}</p>
                      {pk.list_price&&<p className="text-[10px] line-through" style={{color:'#8A8470'}}>${pk.list_price.toLocaleString("es-AR")}</p>}
                      <p className="text-[10px]" style={{color:'#8A8470'}}>{pk.uses_count} {pk.uses_count===1?"uso":"usos"}</p>
                    </div>
                  </div>
                  <div className="flex gap-2 mt-2">
                    <button onClick={()=>{setEditingPack(pk.id);setPackForm({name:pk.name,services_included:pk.services_included||"",pack_price:String(pk.pack_price),list_price:String(pk.list_price||""),uses_count:pk.uses_count||1})}} className="text-xs px-2.5 py-1.5 rounded-lg" style={{background:'rgba(61,74,24,.08)',color:'#3D4A18'}}>Editar</button>
                    <button onClick={()=>deletePack(pk.id,pk.name)} className="text-xs px-2.5 py-1.5 rounded-lg" style={{background:'#FEE2E2',color:'#991B1B'}}>Eliminar</button>
                  </div>
                </div>
              );
            })}
            {packList.length===0&&<p className="text-center text-sm py-6" style={{color:'#8A8470'}}>No hay packs cargados</p>}
          </div>
        </div>
      )}

      {/* Modal Reagendar */}
      {rescheduleModal&&(
        <div className="fixed inset-0 z-50 flex items-center justify-center px-5" style={{background:'rgba(0,0,0,.4)',backdropFilter:'blur(4px)'}}>
          <div className="w-full max-w-sm rounded-2xl p-6" style={{background:'#FEFDF8',boxShadow:'0 24px 80px rgba(0,0,0,.15)'}}>
            <h3 className="text-base font-bold mb-1" style={{color:'#1C1A14'}}>Reagendar turno</h3>
            <p className="text-xs mb-4" style={{color:'#8A8470'}}>{rescheduleModal.appt.client_name} · {svcName(rescheduleModal.appt.service_id)}</p>
            <div className="space-y-3">
              <div>
                <label className="text-[10px] uppercase tracking-widest font-medium block mb-1" style={{color:'#8A8470'}}>Nueva fecha</label>
                <input type="date" value={rescheduleModal.date}
                  onChange={e=>{
                    const d=e.target.value;
                    setRescheduleModal(p=>({...p,date:d,slot:""}));
                    fetchRescheduleSlots(d,rescheduleModal.appt);
                  }}
                  min={today}
                  className="w-full px-3 py-2.5 rounded-lg text-sm" style={{background:'#F5F1E8',border:'1.5px solid rgba(0,0,0,.07)'}}/>
              </div>
              {rescheduleModal.date&&(
                <div>
                  <label className="text-[10px] uppercase tracking-widest font-medium block mb-2" style={{color:'#8A8470'}}>
                    Horario disponible {rescheduleModal.loading&&<span className="opacity-50 normal-case">· cargando...</span>}
                  </label>
                  {!rescheduleModal.loading&&rescheduleModal.slots.length===0&&(
                    <p className="text-xs text-center py-2" style={{color:'#8A8470'}}>No hay horarios disponibles ese día</p>
                  )}
                  <div className="grid grid-cols-4 gap-1.5">
                    {rescheduleModal.slots.map(s=>(
                      <button key={s} type="button" onClick={()=>setRescheduleModal(p=>({...p,slot:s}))}
                        className="py-2 rounded-lg text-xs font-medium transition-all"
                        style={{background:rescheduleModal.slot===s?'#3D4A18':'#F5F1E8',color:rescheduleModal.slot===s?'#fff':'#3D4A18',border:rescheduleModal.slot===s?'none':'1.5px solid rgba(0,0,0,.07)'}}>
                        {s}
                      </button>
                    ))}
                  </div>
                </div>
              )}
              {rescheduleModal.error&&<p className="text-xs text-center py-2 px-3 rounded-lg" style={{background:'#FEE2E2',color:'#991B1B'}}>{rescheduleModal.error}</p>}
            </div>
            <div className="flex gap-2 mt-5">
              <button onClick={()=>setRescheduleModal(null)} className="flex-1 py-2.5 rounded-xl text-sm font-medium" style={{background:'rgba(0,0,0,.05)',color:'#5C5840'}}>Cancelar</button>
              <button onClick={doReschedule} disabled={rescheduleModal.loading||!rescheduleModal.slot} className="flex-1 py-2.5 rounded-xl text-sm font-medium text-white disabled:opacity-40" style={{background:'#3D4A18'}}>
                {rescheduleModal.loading?"Guardando...":"Confirmar"}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Modal de confirmación custom */}
      {modal&&(
        <div className="fixed inset-0 z-50 flex items-center justify-center px-5" style={{background:'rgba(0,0,0,.4)',backdropFilter:'blur(4px)'}}>
          <div className="w-full max-w-sm rounded-2xl p-6 text-center" style={{background:'#FEFDF8',boxShadow:'0 24px 80px rgba(0,0,0,.15)',animation:'rise .25s ease-out'}}>
            <div className="w-12 h-12 rounded-full mx-auto mb-4 flex items-center justify-center" style={{background:'#FEE2E2'}}>
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 9v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke="#991B1B" strokeWidth="1.5" strokeLinecap="round"/></svg>
            </div>
            <h3 className="text-base font-bold mb-2" style={{color:'#1C1A14'}}>{modal.title}</h3>
            <p className="text-sm mb-6 leading-relaxed whitespace-pre-line" style={{color:'#5C5840'}}>{modal.message}</p>
            <div className="flex gap-2">
              <button onClick={()=>setModal(null)} className="flex-1 py-2.5 rounded-xl text-sm font-medium" style={{background:'rgba(0,0,0,.05)',color:'#5C5840'}}>
                Volver
              </button>
              <button onClick={()=>{setModal(null);modal.onConfirm()}} className="flex-1 py-2.5 rounded-xl text-sm font-medium text-white" style={{background:modal.confirmColor||'#991B1B'}}>
                {modal.confirmLabel||"Confirmar"}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
