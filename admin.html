<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light only">
<title>GF Studio — Panel de Turnos</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0}
body{font-family:'Figtree',sans-serif;background:#F5F1E8;color:#1C1A14;min-height:100vh}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const SB_URL="https://ibikdnjuctopdkmtmgdd.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImliaWtkbmp1Y3RvcGRrbXRtZ2RkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MjEwOTMsImV4cCI6MjA5MTA5NzA5M30.Tzsi0ZbcdohuJLFTut4z8h2vf5yi1dv_KfA_6m6COBI";
const sb=window.supabase.createClient(SB_URL,SB_KEY);
/* ═══ Contraseña simple para acceder ═══ */
const ADMIN_PASS="guada";
/* ═══════════════════════════════════════ */

const{useState,useEffect}=React;

const fP=n=>"$"+n.toLocaleString("es-AR");
const fDate=d=>new Date(d+"T12:00:00").toLocaleDateString("es-AR",{weekday:"short",day:"numeric",month:"short"});
// Normaliza teléfono a formato WhatsApp Argentina: 549+área+número
const waTel=p=>{let t=(p||"").replace(/\D/g,'');if(t.startsWith("549"))return t;if(t.startsWith("54"))return "549"+t.slice(2);return "549"+t};

const STATUS_COLORS={
  pending:{bg:"#FEF3C7",tx:"#92400E",label:"Pendiente"},
  confirmed:{bg:"#D1FAE5",tx:"#065F46",label:"Confirmado"},
  cancelled:{bg:"#FEE2E2",tx:"#991B1B",label:"Cancelado"},
};

const App=()=>{
  const[auth,setAuth]=useState(false);
  const[pass,setPass]=useState("");
  const[appointments,setAppointments]=useState([]);
  const[services,setServices]=useState([]);
  const[loading,setLoading]=useState(true);
  const[filter,setFilter]=useState("upcoming"); // upcoming, all, today
  const[updating,setUpdating]=useState(null);
  const[view,setView]=useState("list"); // "list" | "calendar"
  const[calMonth,setCalMonth]=useState(()=>{const d=new Date();return new Date(d.getFullYear(),d.getMonth(),1)});
  const[calSelectedDay,setCalSelectedDay]=useState(null);
  const[modal,setModal]=useState(null); // {title, message, onConfirm, confirmLabel, confirmColor}

  const login=e=>{e.preventDefault();if(pass===ADMIN_PASS)setAuth(true);else alert("Contraseña incorrecta")};

  const fetchData=async()=>{
    setLoading(true);
    const[{data:appts},{data:svcs}]=await Promise.all([
      sb.from("gf_appointments").select("*").order("appointment_date",{ascending:true}).order("time_slot",{ascending:true}),
      sb.from("gf_services").select("*"),
    ]);
    setAppointments(appts||[]);
    setServices(svcs||[]);
    setLoading(false);
  };

  useEffect(()=>{if(auth)fetchData()},[auth]);

  // Realtime subscription
  useEffect(()=>{
    if(!auth)return;
    const channel=sb.channel("admin-appointments")
      .on("postgres_changes",{event:"*",schema:"public",table:"gf_appointments"},()=>fetchData())
      .subscribe();
    return()=>sb.removeChannel(channel);
  },[auth]);

  const updateStatus=async(id,status)=>{
    setUpdating(id);
    await sb.from("gf_appointments").update({status}).eq("id",id);
    await fetchData();
    setUpdating(null);
  };

  // Calcula horario de fin sumando la duracion del servicio (en minutos) al time_slot
  const endTime=(start,dur)=>{
    const min=parseInt((dur||"").match(/\d+/)?.[0])||60;
    const[h,m]=start.split(":").map(Number);
    const total=h*60+m+min;
    const eh=Math.floor(total/60)%24,em=total%60;
    return `${String(eh).padStart(2,'0')}:${String(em).padStart(2,'0')}`;
  };

  const confirmAndWA=async(appt)=>{
    setUpdating(appt.id);
    await sb.from("gf_appointments").update({status:"confirmed"}).eq("id",appt.id);
    const svcObj=services.find(s=>s.id===appt.service_id);
    const svc=svcObj?.name||"tu turno";
    const fin=endTime(appt.time_slot,svcObj?.duration);
    const fecha=fDate(appt.appointment_date);
    const msg=`\u00a1Hola ${appt.client_name}! \u2728\n\nTe confirmamos tu turno en *GF Studio*:\n\n\u{1F4C5} *Fecha:* ${fecha}\n\u{1F552} *Horario:* ${appt.time_slot} a ${fin} hs\n\u{1F486} *Servicio:* ${svc}\n\u{1F4CD} *Direcci\u00f3n:* Hip\u00f3lito Yrigoyen 229, Henderson\n\nCualquier cambio o reagendamiento, avisanos por ac\u00e1 con anticipaci\u00f3n \u{1F49A}\n\n\u00a1Te esperamos!\n\u2014 Guada, GF Studio`;
    window.open(`https://api.whatsapp.com/send?phone=${waTel(appt.client_phone)}&text=${encodeURIComponent(msg)}`,"_blank");
    await fetchData();
    setUpdating(null);
  };

  const showConfirm=(title,message,confirmLabel,confirmColor,onConfirm)=>{
    setModal({title,message,confirmLabel,confirmColor,onConfirm});
  };

  const cancelAndNotify=(appt)=>{
    const svc=services.find(s=>s.id===appt.service_id)?.name||"tu turno";
    showConfirm(
      "Cancelar turno",
      `Se cancelar\u00e1 el turno de ${appt.client_name} (${svc}, ${fDate(appt.appointment_date)} ${appt.time_slot} hs).\n\nSe le enviar\u00e1 un email y se abrir\u00e1 WhatsApp con el aviso.`,
      "Cancelar turno",
      "#991B1B",
      async()=>{
        setUpdating(appt.id);
        const pr=services.find(s=>s.id===appt.service_id)?.price||0;
        const fecha=fDate(appt.appointment_date);
        await sb.from("gf_appointments").update({status:"cancelled"}).eq("id",appt.id);
        fetch(`${SB_URL}/functions/v1/notify-booking`,{
          method:"POST",
          headers:{"Content-Type":"application/json","apikey":SB_KEY},
          body:JSON.stringify({event:"cancellation",nombre:appt.client_name,email:appt.client_email,telefono:appt.client_phone,servicio:svc,fecha,horario:appt.time_slot,precio:fP(pr)})
        }).catch(e=>console.warn("cancel email failed",e));
        const msg=`Hola ${appt.client_name} \u{1F49A}\n\nLamentablemente tenemos que cancelar tu turno en *GF Studio*:\n\n\u{1F4C5} *Fecha y hora:* ${fecha} \u2014 ${appt.time_slot} hs\n\u{1F486} *Servicio:* ${svc}\n\nDisculp\u00e1 las molestias. Cuando quieras reagendar, avisanos por ac\u00e1 o volv\u00e9 a reservar en la web.\n\n\u2014 Guada, GF Studio`;
        window.open(`https://api.whatsapp.com/send?phone=${waTel(appt.client_phone)}&text=${encodeURIComponent(msg)}`,"_blank");
        await fetchData();
        setUpdating(null);
      }
    );
  };

  const deleteAppt=(id,name)=>{
    showConfirm(
      "Eliminar turno",
      `\u00bfEliminar el turno de ${name||"este cliente"}?\n\nEsta acci\u00f3n no se puede deshacer.`,
      "Eliminar",
      "#991B1B",
      async()=>{
        await sb.from("gf_appointments").delete().eq("id",id);
        await fetchData();
      }
    );
  };

  const today=new Date().toISOString().split("T")[0];
  const filtered=appointments.filter(a=>{
    if(filter==="today")return a.appointment_date===today;
    if(filter==="upcoming")return a.appointment_date>=today;
    return true;
  });

  // Helpers calendario
  const ymd=d=>d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,'0')+"-"+String(d.getDate()).padStart(2,'0');
  const monthLabel=d=>{const s=d.toLocaleDateString("es-AR",{month:"long",year:"numeric"});return s.charAt(0).toUpperCase()+s.slice(1)};
  const monthGrid=anchor=>{
    const y=anchor.getFullYear(),m=anchor.getMonth();
    const last=new Date(y,m+1,0).getDate();
    let firstDow=new Date(y,m,1).getDay()-1;if(firstDow<0)firstDow=6; // Lun=0..Dom=6
    const cells=[];
    for(let i=0;i<firstDow;i++)cells.push(null);
    for(let d=1;d<=last;d++)cells.push(ymd(new Date(y,m,d)));
    while(cells.length%7!==0)cells.push(null);
    return cells;
  };
  const dayAppts=date=>appointments.filter(a=>a.appointment_date===date);
  const dayCounts=date=>{
    const arr=dayAppts(date);
    return{
      pending:arr.filter(a=>a.status==="pending").length,
      confirmed:arr.filter(a=>a.status==="confirmed").length,
      cancelled:arr.filter(a=>a.status==="cancelled").length,
      total:arr.filter(a=>a.status!=="cancelled").length,
    };
  };

  // Card de turno reusable (para lista y para vista día del calendario)
  const renderAppt=a=>{
    const st=STATUS_COLORS[a.status]||STATUS_COLORS.pending;
    return(
      <div key={a.id} className="rounded-xl p-4" style={{background:'#FEFDF8',border:'1px solid rgba(0,0,0,.04)'}}>
        <div className="flex items-start justify-between mb-2">
          <div>
            <p className="font-semibold text-sm">{a.client_name}</p>
            <p className="text-xs" style={{color:'#8A8470'}}>{a.client_phone}</p>
          </div>
          <span className="text-[10px] font-medium px-2.5 py-1 rounded-full" style={{background:st.bg,color:st.tx}}>{st.label}</span>
        </div>
        <div className="flex flex-wrap gap-x-4 gap-y-1 text-xs mb-3" style={{color:'#5C5840'}}>
          <span>{"\u{1F4C5}"} {fDate(a.appointment_date)}</span>
          <span>{"\u{1F552}"} {a.time_slot} hs</span>
          <span>{"\u{1F486}"} {svcName(a.service_id)}</span>
          <span className="font-medium" style={{color:'#3D4A18'}}>{fP(svcPrice(a.service_id))}</span>
        </div>
        <div className="flex gap-1.5 flex-wrap">
          {a.status==="pending"&&(
            <button onClick={()=>confirmAndWA(a)} disabled={updating===a.id}
              className="text-[11px] font-medium px-3 py-1.5 rounded-lg text-white" style={{background:'#065F46'}}>
              {updating===a.id?"...":"Confirmar por WA"}
            </button>
          )}
          {a.status!=="cancelled"&&(
            <button onClick={()=>cancelAndNotify(a)} disabled={updating===a.id}
              className="text-[11px] font-medium px-3 py-1.5 rounded-lg" style={{background:'#FEE2E2',color:'#991B1B'}}>
              {updating===a.id?"...":"Cancelar + Avisar"}
            </button>
          )}
          {a.status==="cancelled"&&(
            <button onClick={()=>updateStatus(a.id,"pending")} disabled={updating===a.id}
              className="text-[11px] font-medium px-3 py-1.5 rounded-lg" style={{background:'rgba(0,0,0,.04)',color:'#8A8470'}}>
              Reactivar
            </button>
          )}
          <button onClick={()=>deleteAppt(a.id,a.client_name)} className="text-[11px] px-3 py-1.5 rounded-lg ml-auto" style={{color:'#8A8470'}}>Eliminar</button>
          <a href={`https://api.whatsapp.com/send?phone=${waTel(a.client_phone)}`} target="_blank"
            className="text-[11px] font-medium px-2.5 py-1.5 rounded-lg text-white flex items-center justify-center" style={{background:'#25D366'}}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="#fff"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          </a>
        </div>
        <p className="text-[9px] mt-2" style={{color:'rgba(0,0,0,.15)'}}>Reservado: {new Date(a.created_at).toLocaleString("es-AR")}</p>
      </div>
    );
  };

  const svcName=id=>services.find(s=>s.id===id)?.name||"—";
  const svcPrice=id=>services.find(s=>s.id===id)?.price||0;

  // Stats
  const pendingCount=appointments.filter(a=>a.status==="pending"&&a.appointment_date>=today).length;
  const confirmedCount=appointments.filter(a=>a.status==="confirmed"&&a.appointment_date>=today).length;
  const todayCount=appointments.filter(a=>a.appointment_date===today&&a.status!=="cancelled").length;

  if(!auth){
    return(
      <div className="min-h-screen flex items-center justify-center px-4">
        <form onSubmit={login} className="w-full max-w-xs">
          <div className="rounded-2xl p-8 text-center" style={{background:'#FEFDF8',border:'1px solid rgba(0,0,0,.06)',boxShadow:'0 20px 60px rgba(0,0,0,.05)'}}>
            <h1 className="text-xl font-bold mb-1">GF Studio</h1>
            <p className="text-xs mb-6" style={{color:'#8A8470'}}>Panel de Turnos</p>
            <input type="password" value={pass} onChange={e=>setPass(e.target.value)}
              className="w-full px-4 py-3 rounded-xl text-sm text-center mb-3"
              style={{background:'#F5F1E8',border:'1.5px solid rgba(0,0,0,.08)'}}
              placeholder="Contraseña" autoFocus/>
            <button type="submit" className="w-full py-3 rounded-xl text-sm font-medium text-white" style={{background:'#3D4A18'}}>
              Entrar
            </button>
          </div>
        </form>
      </div>
    );
  }

  return(
    <div className="min-h-screen">
      {/* Header */}
      <div className="sticky top-0 z-10 px-4 py-3 flex items-center justify-between" style={{background:'rgba(245,241,232,.9)',backdropFilter:'blur(12px)',borderBottom:'1px solid rgba(0,0,0,.04)'}}>
        <div>
          <h1 className="text-base font-bold">GF Studio</h1>
          <p className="text-[10px]" style={{color:'#8A8470'}}>Panel de Turnos</p>
        </div>
        <button onClick={fetchData} className="text-xs px-3 py-1.5 rounded-lg" style={{background:'rgba(0,0,0,.04)',color:'#8A8470'}}>
          Actualizar
        </button>
      </div>

      <div className="px-4 py-4 max-w-3xl mx-auto">
        {/* Stats */}
        <div className="grid grid-cols-3 gap-2 mb-5">
          {[
            {n:todayCount,l:"Hoy",bg:"#3D4A18",tx:"#fff"},
            {n:pendingCount,l:"Pendientes",bg:"#FEF3C7",tx:"#92400E"},
            {n:confirmedCount,l:"Confirmados",bg:"#D1FAE5",tx:"#065F46"},
          ].map((s,i)=>(
            <div key={i} className="rounded-xl p-3 text-center" style={{background:s.bg,color:s.tx}}>
              <p className="text-2xl font-bold">{s.n}</p>
              <p className="text-[10px] opacity-70">{s.l}</p>
            </div>
          ))}
        </div>

        {/* View toggle */}
        <div className="flex gap-1.5 mb-3">
          {[{k:"list",l:"Lista"},{k:"calendar",l:"Calendario"}].map(v=>(
            <button key={v.k} onClick={()=>{setView(v.k);setCalSelectedDay(null)}}
              className="px-3 py-1.5 rounded-lg text-xs font-medium transition-all"
              style={{background:view===v.k?'#3D4A18':'rgba(0,0,0,.04)',color:view===v.k?'#F5F1E8':'#8A8470'}}>
              {v.l}
            </button>
          ))}
        </div>

        {view==="calendar"?(
          <div>
            {/* Month nav */}
            <div className="flex items-center justify-between mb-3 px-1">
              <button onClick={()=>setCalMonth(d=>new Date(d.getFullYear(),d.getMonth()-1,1))}
                className="w-8 h-8 rounded-lg flex items-center justify-center" style={{background:'rgba(0,0,0,.04)'}}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="#5C5840" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
              </button>
              <h2 className="text-sm font-semibold" style={{color:'#1C1A14'}}>{monthLabel(calMonth)}</h2>
              <button onClick={()=>setCalMonth(d=>new Date(d.getFullYear(),d.getMonth()+1,1))}
                className="w-8 h-8 rounded-lg flex items-center justify-center" style={{background:'rgba(0,0,0,.04)'}}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="#5C5840" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
              </button>
            </div>

            {/* Day headers */}
            <div className="grid grid-cols-7 gap-1 mb-1">
              {["L","M","X","J","V","S","D"].map((d,i)=>(
                <div key={i} className="text-center text-[10px] font-medium py-1.5" style={{color:'#8A8470'}}>{d}</div>
              ))}
            </div>

            {/* Calendar grid */}
            <div className="grid grid-cols-7 gap-1 mb-5">
              {monthGrid(calMonth).map((cell,i)=>{
                if(!cell)return <div key={i}/>;
                const counts=dayCounts(cell);
                const isToday=cell===today;
                const isSelected=cell===calSelectedDay;
                const isPast=cell<today;
                return(
                  <button key={i} onClick={()=>setCalSelectedDay(cell)}
                    className="aspect-square rounded-lg p-1 flex flex-col items-center justify-between transition-all"
                    style={{
                      background:isSelected?'#3D4A18':isToday?'rgba(61,74,24,.12)':'#FEFDF8',
                      color:isSelected?'#F5F1E8':isPast?'#A8A296':'#1C1A14',
                      border:isSelected?'none':'1px solid rgba(0,0,0,.04)',
                      opacity:isPast&&!isSelected?.7:1,
                    }}>
                    <span className="text-[12px] font-semibold leading-none mt-0.5">{parseInt(cell.split("-")[2])}</span>
                    <div className="flex gap-0.5">
                      {counts.confirmed>0&&<span className="w-1.5 h-1.5 rounded-full" style={{background:isSelected?'#fff':'#10B981'}}/>}
                      {counts.pending>0&&<span className="w-1.5 h-1.5 rounded-full" style={{background:isSelected?'#fff':'#F59E0B'}}/>}
                      {counts.cancelled>0&&counts.total===0&&<span className="w-1.5 h-1.5 rounded-full" style={{background:isSelected?'#fff':'#EF4444'}}/>}
                    </div>
                    {counts.total>0&&<span className="text-[9px] font-medium opacity-70 leading-none mb-0.5">{counts.total}</span>}
                    {counts.total===0&&<span className="text-[9px] opacity-0 leading-none mb-0.5">0</span>}
                  </button>
                );
              })}
            </div>

            {/* Selected day details */}
            {calSelectedDay&&(
              <div>
                <h3 className="text-sm font-semibold mb-2 px-1" style={{color:'#3D4A18'}}>
                  Turnos del {fDate(calSelectedDay)}
                </h3>
                {dayAppts(calSelectedDay).length===0?(
                  <p className="text-center text-xs py-6" style={{color:'#8A8470'}}>Sin turnos este día</p>
                ):(
                  <div className="space-y-2.5">
                    {dayAppts(calSelectedDay).sort((a,b)=>a.time_slot.localeCompare(b.time_slot)).map(renderAppt)}
                  </div>
                )}
              </div>
            )}

            {!calSelectedDay&&(
              <p className="text-center text-xs py-4" style={{color:'#8A8470'}}>Tocá un día para ver sus turnos</p>
            )}
          </div>
        ):(
        <>
        {/* Filters */}
        <div className="flex gap-1.5 mb-5">
          {[{k:"upcoming",l:"Próximos"},{k:"today",l:"Hoy"},{k:"all",l:"Todos"}].map(f=>(
            <button key={f.k} onClick={()=>setFilter(f.k)}
              className="px-3 py-1.5 rounded-lg text-xs font-medium transition-all"
              style={{background:filter===f.k?'#1C1A14':'rgba(0,0,0,.04)',color:filter===f.k?'#F5F1E8':'#8A8470'}}>
              {f.l}
            </button>
          ))}
        </div>

        {/* Appointments list */}
        {loading?(
          <p className="text-center text-sm py-10" style={{color:'#8A8470'}}>Cargando...</p>
        ):filtered.length===0?(
          <p className="text-center text-sm py-10" style={{color:'#8A8470'}}>No hay turnos {filter==="today"?"para hoy":filter==="upcoming"?"próximos":""}</p>
        ):(
          <div className="space-y-2.5">
            {filtered.map(renderAppt)}
          </div>
        )}
        </>
        )}
      </div>

      {/* Modal de confirmación custom */}
      {modal&&(
        <div className="fixed inset-0 z-50 flex items-center justify-center px-5" style={{background:'rgba(0,0,0,.4)',backdropFilter:'blur(4px)'}}>
          <div className="w-full max-w-sm rounded-2xl p-6 text-center" style={{background:'#FEFDF8',boxShadow:'0 24px 80px rgba(0,0,0,.15)',animation:'rise .25s ease-out'}}>
            <div className="w-12 h-12 rounded-full mx-auto mb-4 flex items-center justify-center" style={{background:'#FEE2E2'}}>
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 9v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke="#991B1B" strokeWidth="1.5" strokeLinecap="round"/></svg>
            </div>
            <h3 className="text-base font-bold mb-2" style={{color:'#1C1A14'}}>{modal.title}</h3>
            <p className="text-sm mb-6 leading-relaxed whitespace-pre-line" style={{color:'#5C5840'}}>{modal.message}</p>
            <div className="flex gap-2">
              <button onClick={()=>setModal(null)} className="flex-1 py-2.5 rounded-xl text-sm font-medium" style={{background:'rgba(0,0,0,.05)',color:'#5C5840'}}>
                Volver
              </button>
              <button onClick={()=>{setModal(null);modal.onConfirm()}} className="flex-1 py-2.5 rounded-xl text-sm font-medium text-white" style={{background:modal.confirmColor||'#991B1B'}}>
                {modal.confirmLabel||"Confirmar"}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
