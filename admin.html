/* ============ BLOQUEOS TAB ============ */
const BloqueosTab = ({blocks, setBlocks, appts, services, settings, setSettings, persistSettings, refetch}) => {
  const [view, setView] = useState("calendar");
  // Si hoy es domingo, mostrar la semana que arranca mañana (no la que ya pasó)
  const [weekStart, setWeekStart] = useState(()=>{
    const m = mondayOf(TODAY);
    if(TODAY.getDay()===0){ m.setDate(m.getDate()+7); }
    return m;
  });
  const [editing, setEditing] = useState(null);

  const weekDays = useMemo(()=>{
    return Array.from({length:settings.open_days.length}, (_,i)=>{
      const idx = settings.open_days[i];
      const d = new Date(weekStart); d.setDate(d.getDate()+idx);
      return { dow:idx, date:d, iso:toISO(d) };
    });
  }, [weekStart, settings.open_days]);

  const slots = useMemo(()=>{
    const out = [];
    for(let m=settings.open_min; m<settings.close_min; m+=settings.slot_step) out.push(m);
    return out;
  }, [settings]);

  const svcMap = useMemo(()=>Object.fromEntries(services.map(s=>[s.id,s])), [services]);

  const slotState = (iso, min, dow) => {
    const apptsHere = appts.filter(a=>a.appointment_date===iso && a.status!=="cancelled").find(a=>{
      const svc = svcMap[a.service_id]; const dur = svc?.duration_minutes||30; const aMin = toMin(a.time_slot);
      return min >= aMin && min < aMin + dur;
    });
    if(apptsHere) return { type:"appt", data:apptsHere };
    for(const b of blocks){
      if(b.type==="full_day" && b.block_date===iso) return { type:"block", data:b };
      if(b.type==="datetime_range" && b.block_date===iso){
        if(min>=toMin(b.start_time) && min<toMin(b.end_time)) return { type:"block", data:b };
      }
      if(b.type==="weekly" && b.day_of_week===dow){
        if(min>=toMin(b.start_time) && min<toMin(b.end_time)) return { type:"block", data:b };
      }
      if(b.type==="date_range" && b.date_from && b.date_to && iso>=b.date_from && iso<=b.date_to) return { type:"block", data:b };
    }
    return { type:"free" };
  };

  const navWeek = dir => { const d=new Date(weekStart); d.setDate(d.getDate()+7*dir); setWeekStart(d); };

  const insertBlock = async (b) => {
    const tmpId = "tmp_"+Date.now();
    setBlocks(prev => [...prev, {...b, id: tmpId}]);
    const { data, error } = await sb.from("gf_blocked_slots").insert(denormBlock(b)).select().single();
    if(error){ toast("Error: "+error.message); setBlocks(prev => prev.filter(x => x.id !== tmpId)); return; }
    setBlocks(prev => prev.map(x => x.id === tmpId ? normBlock(data) : x));
  };
  const updateBlock = async (id, b) => {
    setBlocks(prev => prev.map(x => x.id === id ? {...b, id} : x));
    const { error } = await sb.from("gf_blocked_slots").update(denormBlock(b)).eq("id", id);
    if(error){ toast("Error: "+error.message); refetch(); }
  };
  const deleteBlock = async (id) => {
    setBlocks(prev => prev.filter(x => x.id !== id));
    const { error } = await sb.from("gf_blocked_slots").delete().eq("id", id);
    if(error){ toast("Error: "+error.message); refetch(); }
  };

  const toggleSlot = async (iso, min, dow) => {
    const st = slotState(iso, min, dow);
    if(st.type==="appt") return;
    if(st.type==="free"){
      const endMin = min+settings.slot_step;
      const adj = blocks.find(b=>b.type==="datetime_range" && b.block_date===iso && (toMin(b.end_time)===min || toMin(b.start_time)===endMin));
      if(adj){
        await updateBlock(adj.id, {...adj,
          start_time: toMin(adj.start_time) < min ? adj.start_time : toHHMM(min),
          end_time: toMin(adj.end_time) > endMin ? adj.end_time : toHHMM(endMin),
        });
      } else {
        await insertBlock({ type:"datetime_range", block_date:iso, start_time:toHHMM(min), end_time:toHHMM(endMin), reason:"" });
      }
      return;
    }
    if(st.type==="block"){
      const b = st.data;
      if(b.type==="full_day" || b.type==="weekly" || b.type==="date_range"){ setEditing(b); return; }
      if(b.type==="datetime_range"){
        const bStart = toMin(b.start_time), bEnd = toMin(b.end_time);
        const sStart = min, sEnd = min+settings.slot_step;
        if(bStart>=sStart && bEnd<=sEnd) await deleteBlock(b.id);
        else if(sStart===bStart) await updateBlock(b.id,{...b,start_time:toHHMM(sEnd)});
        else if(sEnd===bEnd) await updateBlock(b.id,{...b,end_time:toHHMM(sStart)});
        else {
          await updateBlock(b.id,{...b,end_time:toHHMM(sStart)});
          await insertBlock({...b, id:undefined, start_time:toHHMM(sEnd)});
        }
      }
    }
  };

  return (
    <>
      <div className="strip">
        <div>
          <div className="sec-label" style={{color:"rgba(250,247,239,.6)"}}>Agenda · Gestión visual</div>
          <h2 className="mt-2">Tu semana <em>en vista grilla.</em></h2>
          <p>Click en slot libre = bloquear. Click en bloqueado = liberar. Los turnos en oliva no se tocan.</p>
        </div>
        <div className="kpis">
          <div className="kpi"><div className="lb">Bloqueos</div><div className="v">{blocks.length}</div></div>
          <div className="kpi"><div className="lb">Horario</div><div className="v" style={{fontSize:18}}>{toHHMM(settings.open_min)}–{toHHMM(settings.close_min)}</div></div>
        </div>
      </div>

      <div className="flex flex-wrap gap-3 items-center mb-5">
        <Tabs value={view} onChange={setView} options={[{v:"calendar",l:"Calendario"},{v:"list",l:"Lista"},{v:"settings",l:"Ajustes"}]}/>
        <div className="flex-1"/>
        {view==="calendar" && <>
          <button className="btn btn-gh btn-sm" onClick={()=>{const m=mondayOf(TODAY); if(TODAY.getDay()===0){ m.setDate(m.getDate()+7); } setWeekStart(m);}}>Hoy</button>
          <div className="flex items-center gap-1 sm:gap-2" style={{whiteSpace:"nowrap"}}>
            <button className="btn btn-sc btn-sm" onClick={()=>navWeek(-1)}>←</button>
            <span className="mono hidden sm:inline" style={{fontSize:11,color:"var(--muted)",letterSpacing:".15em",textTransform:"uppercase",padding:"0 4px"}}>
              Sem. {fDate(toISO(weekStart))} – {fDate(toISO(addDays(weekStart,5)))}
            </span>
            <span className="mono sm:hidden" style={{fontSize:10.5,color:"var(--muted)",letterSpacing:".08em",textTransform:"uppercase",padding:"0 4px"}}>
              {weekStart.getDate()}–{addDays(weekStart,5).getDate()} {new Date(addDays(weekStart,5)).toLocaleDateString('es-AR',{month:'short'}).toUpperCase().replace('.','')}
            </span>
            <button className="btn btn-sc btn-sm" onClick={()=>navWeek(1)}>→</button>
          </div>
        </>}
        {view!=="settings" && <button className="btn btn-pr" onClick={()=>setEditing({ id:null, type:"full_day", block_date:toISO(TODAY), start_time:"09:00", end_time:"18:00", day_of_week:0, reason:"" })}><Icon name="plus"/> Nuevo bloqueo</button>}
      </div>

      {view==="calendar" && (
        <div className="wkg-wrap">
          <div className="wkg">
            <WeekGrid days={weekDays} slots={slots} settings={settings} slotState={slotState} svcMap={svcMap} onToggle={toggleSlot}/>
          </div>
        </div>
      )}

      {view==="list" && (
        blocks.length===0 ? (
          <EmptyState icon="lock" title="Sin bloqueos" desc="Agregá días u horarios que no vas a atender para excluirlos del booking."/>
        ) : (
          <div className="card">
            <table className="tbl">
              <thead><tr><th>Tipo</th><th>Cuándo</th><th>Motivo</th><th></th></tr></thead>
              <tbody>
                {blocks.map(b=>(
                  <tr key={b.id} onClick={()=>setEditing(b)}>
                    <td><Chip tone="dk">{b.type==="full_day"?"Día":b.type==="datetime_range"?"Rango":b.type==="weekly"?"Semanal":"Fechas"}</Chip></td>
                    <td><div className="t-name">{blockDesc(b)}</div></td>
                    <td style={{color:"var(--muted)",fontSize:13}}>{b.reason||"—"}</td>
                    <td style={{color:"var(--muted)"}}><Icon name="chevron" size={14}/></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )
      )}

      {view==="settings" && <AjustesHorario settings={settings} setSettings={setSettings} persist={persistSettings}/>}

      <Drawer open={!!editing} onClose={()=>setEditing(null)} subtitle={editing?.id?"Editar bloqueo":"Nuevo bloqueo"} title={<>Bloqueo de <em>agenda</em></>}
        footer={editing && (<>
          <div>{editing.id && <button className="btn btn-dg" onClick={async()=>{await deleteBlock(editing.id);setEditing(null);}}><Icon name="trash" size={14}/> Eliminar</button>}</div>
          <div className="flex gap-2">
            <button className="btn btn-sc" onClick={()=>setEditing(null)}>Cancelar</button>
            <button className="btn btn-pr" onClick={async()=>{
              if(editing.id) await updateBlock(editing.id, editing);
              else await insertBlock(editing);
              setEditing(null);
            }}>Guardar</button>
          </div>
        </>)}>
        {editing && <BlockEditor b={editing} onChange={setEditing}/>}
      </Drawer>
    </>
  );
};

const WeekGrid = ({days, slots, settings, slotState, svcMap, onToggle}) => {
  const todayISO = toISO(TODAY);
  return (
    <div className="card" style={{overflow:"hidden"}}>
      <div className="wg-scroll" style={{maxHeight:"70vh",overflowY:"auto"}}>
        <div className="wg-inner" style={{"--wg-days":days.length}}>
          <div className="wg-row wg-head">
            <div/>
            {days.map(d=>{
              const isToday = d.iso===todayISO;
              return (
                <div key={d.iso} className="wg-dayhd" style={{background:isToday?"rgba(94,107,46,.08)":"transparent"}}>
                  <div className="wg-dow" style={{color:isToday?"var(--olive)":"var(--muted)"}}>{DOW_LABELS[d.dow]}</div>
                  <div className="wg-dnum" style={{color:isToday?"var(--olive-dk)":"var(--ink)"}}>{d.date.getDate()}</div>
                </div>
              );
            })}
          </div>
          <div style={{position:"relative"}}>
            {slots.map((min)=>(
              <div key={min} className="wg-row">
                <div className={"mono wg-time"+(min%60===0?" wg-time-full":"")}>
                  {toHHMM(min)}
                </div>
                {days.map(d=>{
                  const st = slotState(d.iso, min, d.dow);
                  const cellStyle = { minHeight:44, borderLeft:"1px solid var(--border)", position:"relative", cursor:"pointer", transition:"background .15s", minWidth:0, overflow:"hidden" };
                  if(st.type==="free"){
                    return (
                      <div key={d.iso+min} className="group cell-free" style={{...cellStyle,background:"var(--cream)"}} onClick={()=>onToggle(d.iso,min,d.dow)}>
                        <div className="cell-hint" style={{background:"rgba(163,59,42,.08)"}}><span className="mono" style={{fontSize:9,color:"var(--danger)",letterSpacing:".15em",textTransform:"uppercase"}}>＋ bloquear</span></div>
                      </div>
                    );
                  }
                  if(st.type==="appt"){
                    const aMin = toMin(st.data.time_slot);
                    if(min!==aMin) return <div key={d.iso+min} style={{...cellStyle,background:"rgba(94,107,46,.85)",borderLeft:"1px solid rgba(250,247,239,.08)",cursor:"default"}}/>;
                    const svc = svcMap[st.data.service_id];
                    return (
                      <div key={d.iso+min} style={{...cellStyle,background:"var(--olive)",color:"var(--cream)",padding:"5px 7px",cursor:"default"}}>
                        <div className="mono" style={{fontSize:9,letterSpacing:".1em",opacity:.65}}>{st.data.time_slot}</div>
                        <div style={{fontSize:11.5,fontWeight:500,lineHeight:1.2,marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{st.data.client_name}</div>
                        {svc && <div style={{fontSize:10,opacity:.7,marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{svc.name}</div>}
                      </div>
                    );
                  }
                  if(st.type==="block"){
                    const isFirst = st.data.type==="datetime_range" ? toMin(st.data.start_time)===min : min%60===0;
                    return (
                      <div key={d.iso+min} className="group cell-blk" style={{...cellStyle,background:"repeating-linear-gradient(135deg,rgba(163,59,42,.22) 0,rgba(163,59,42,.22) 6px,rgba(163,59,42,.1) 6px,rgba(163,59,42,.1) 12px)",borderLeft:"1px solid var(--border)"}} onClick={()=>onToggle(d.iso,min,d.dow)}>
                        {isFirst && <div className="mono" style={{position:"absolute",top:4,left:6,fontSize:9,color:"var(--danger)",letterSpacing:".12em",textTransform:"uppercase",opacity:.85}}>{st.data.reason || "Bloqueado"}</div>}
                        <div className="cell-hint" style={{background:"rgba(74,107,46,.15)"}}><span className="mono" style={{fontSize:9,color:"var(--success)",letterSpacing:".15em",textTransform:"uppercase"}}>− liberar</span></div>
                      </div>
                    );
                  }
                  return null;
                })}
              </div>
            ))}
          </div>
        </div>
      </div>
      <div className="flex items-center gap-4 px-4 py-3 flex-wrap" style={{borderTop:"1px solid var(--border)",background:"var(--cream)",fontSize:11.5,color:"var(--muted)"}}>
        <div className="flex items-center gap-2"><span style={{width:12,height:12,background:"var(--cream)",border:"1px solid var(--border)"}}/>Libre</div>
        <div className="flex items-center gap-2"><span style={{width:12,height:12,background:"var(--olive)"}}/>Turno</div>
        <div className="flex items-center gap-2"><span style={{width:12,height:12,background:"repeating-linear-gradient(135deg,rgba(163,59,42,.3) 0,rgba(163,59,42,.3) 3px,rgba(163,59,42,.1) 3px,rgba(163,59,42,.1) 6px)"}}/>Bloqueado</div>
      </div>
    </div>
  );
};

const blockDesc = b => {
  if(b.type==="full_day") return `Día completo · ${fDate(b.block_date)}`;
  if(b.type==="datetime_range") return `${fDate(b.block_date)} · ${b.start_time}–${b.end_time}`;
  if(b.type==="weekly") return `Semanal · ${DOW_LABELS[b.day_of_week]} ${b.start_time}–${b.end_time}`;
  if(b.type==="date_range") return `${fDate(b.date_from)} → ${fDate(b.date_to)}`;
  return "—";
};

const BlockEditor = ({b, onChange}) => {
  const u = (k,v) => onChange({...b,[k]:v});
  return (
    <div className="flex flex-col gap-5">
      <Field label="Tipo">
        <select className="inp" value={b.type} onChange={e=>u("type",e.target.value)}>
          <option value="full_day">Día completo</option>
          <option value="datetime_range">Franja horaria de un día</option>
          <option value="weekly">Recurrente semanal</option>
          <option value="date_range">Rango de fechas</option>
        </select>
      </Field>
      {b.type==="full_day" && <Field label="Fecha"><input className="inp" type="date" value={b.block_date||""} onChange={e=>u("block_date",e.target.value)}/></Field>}
      {b.type==="datetime_range" && <>

/* ============ RESULTADOS TAB ============ */
const ResultadosTab = ({appts, services, coupons}) => {
  const [period, setPeriod] = useState("month");
  const svcMap = useMemo(()=>Object.fromEntries(services.map(s=>[s.id,s])), [services]);
  const periodDays = period==="week"?7:period==="month"?30:90;

  const { filtered, prev, noShows, cancelled, byPay, bySvc, withCoupon, total, prevTotal, byDow, occupancy } = useMemo(()=>{
    const from     = addDays(TODAY, -periodDays);
    const prevFrom = addDays(TODAY, -periodDays*2);
    const prevTo   = addDays(TODAY, -periodDays);
    const priceOf = a => a.charged_price || svcMap[a.service_id]?.price || 0;
    const inRange = (a, f, t=null) => {
      const d = new Date(a.appointment_date+"T12:00:00");
      return d >= f && (t===null || d < t);
    };
    const kept = s => (s==="completed"||s==="confirmed");
    const filtered = appts.filter(a=>kept(a.status) && inRange(a, from));
    const prev = appts.filter(a=>kept(a.status) && inRange(a, prevFrom, prevTo));
    const noShows = appts.filter(a=>a.status==="no_show" && inRange(a, from)).length;
    const cancelled = appts.filter(a=>a.status==="cancelled" && inRange(a, from)).length;
    const byPay = filtered.reduce((m,a)=>{ const k=a.payment_method||"—"; m[k]=(m[k]||0)+priceOf(a); return m; }, {});
    const bySvc = filtered.reduce((m,a)=>{ const k=svcMap[a.service_id]?.name||"—"; m[k]={count:(m[k]?.count||0)+1, total:(m[k]?.total||0)+priceOf(a)}; return m; }, {});
    const withCoupon = filtered.filter(a=>a.coupon_code).length;
    const total = filtered.reduce((s,a)=>s+priceOf(a),0);
    const prevTotal = prev.reduce((s,a)=>s+priceOf(a),0);
    // Day of week: 1=Lun .. 0=Dom (JS getDay). Mostramos Lun→Sáb, oculto Dom si no hay datos.
    const dowLabels = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
    const byDow = Array(7).fill(0).map((_,i)=>({label:dowLabels[i], count:0, revenue:0}));
    filtered.forEach(a=>{
      const dow = new Date(a.appointment_date+"T12:00:00").getDay();
      byDow[dow].count += 1;
      byDow[dow].revenue += priceOf(a);
    });
    // Occupancy: horas trabajadas / horas disponibles. Asumimos 9h/día * días laborables en período.
    const workedMinutes = filtered.reduce((s,a)=>s+(svcMap[a.service_id]?.duration_minutes||60),0);
    // Días laborables (Lun-Sáb) dentro del período
    let workdays = 0;
    for(let i=0;i<periodDays;i++){
      const d = addDays(TODAY, -i);
      if(d.getDay()!==0) workdays++; // Dom cerrado (aproximación)
    }
    const availableMinutes = workdays * 9 * 60; // 9h/día
    const occupancy = availableMinutes ? Math.round(workedMinutes/availableMinutes*100) : 0;
    return { filtered, prev, noShows, cancelled, byPay, bySvc, withCoupon, total, prevTotal, byDow, occupancy };
  }, [appts, svcMap, periodDays]);

  const deltaPct = prevTotal>0 ? Math.round((total-prevTotal)/prevTotal*100) : null;
  const deltaApp = prev.length>0 ? Math.round((filtered.length-prev.length)/prev.length*100) : null;
  const noShowRate = (filtered.length+noShows+cancelled)>0 ? Math.round((noShows+cancelled)/(filtered.length+noShows+cancelled)*100) : 0;
  const maxDow = Math.max(1, ...byDow.map(d=>d.count));

  const deltaFmt = (v) => {
    if(v===null) return { text:"vs. período anterior: sin datos", tone:"" };
    const arrow = v>0?"↑":v<0?"↓":"·";
    const tone = v>0?"up":v<0?"dn":"";
    return { arrow, tone, text:`${arrow} ${Math.abs(v)}% vs. período anterior` };
  };
  const dTotal = deltaFmt(deltaPct);
  const dAppts = deltaFmt(deltaApp);

  return (
    <>
      <div className="strip">
        <div>
          <div className="sec-label" style={{color:"rgba(250,247,239,.6)"}}>Resultados · {period==="week"?"7 días":period==="month"?"30 días":"90 días"}</div>
          <h2 className="mt-2">Facturación <em>del período.</em></h2>
          <p>Comparado contra los {periodDays} días anteriores. No-shows y cancelaciones se cuentan aparte.</p>
        </div>
        <div className="kpis">
          <div className="kpi"><div className="lb">Total</div><div className="v">{fP(total)}</div></div>
          {deltaPct!==null && <div className="kpi"><div className="lb">vs. anterior</div><div className="v" style={{color:deltaPct>0?"var(--success)":deltaPct<0?"var(--danger)":"var(--muted)"}}>{dTotal.arrow} {Math.abs(deltaPct)}%</div></div>}
        </div>
      </div>
      <div className="flex gap-3 mb-5 items-center flex-wrap">
        <Tabs value={period} onChange={setPeriod} options={[{v:"week",l:"7 días"},{v:"month",l:"30 días"},{v:"90",l:"90 días"}]}/>
        <button className="btn btn-gh btn-sm" onClick={()=>exportApptsCSV(filtered, svcMap, period)} title="Descargar como CSV">
          <Icon name="download" size={13}/> Exportar CSV
        </button>
      </div>
      <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-5">
        <Stat label="Ingresos" value={fP(total)} delta={dTotal.text} tone={dTotal.tone}/>
        <Stat label="Turnos" value={filtered.length} delta={dAppts.text} tone={dAppts.tone}/>
        <Stat label="Ticket prom." value={fP(Math.round(total/Math.max(1,filtered.length)))}/>
        <Stat label="Ocupación" value={occupancy+"%"} delta={`${Math.round((filtered.reduce((s,a)=>s+(svcMap[a.service_id]?.duration_minutes||60),0))/60)}h trabajadas`}/>
      </div>
      <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
        <Stat label="No-shows" value={noShows} delta={noShowRate>0?`${noShowRate}% del total (incl. cancel.)`:"—"} tone={noShows>0?"dn":""}/>
        <Stat label="Cancelados" value={cancelled}/>
        <Stat label="Con cupón" value={withCoupon} delta={filtered.length?`${Math.round(withCoupon/filtered.length*100)}% del total`:""}/>
        <Stat label="Clientas únicas" value={new Set(filtered.map(a=>(a.client_phone||a.client_email||a.client_name||"").toLowerCase())).size}/>
      </div>

      {noShows+cancelled>=3 && noShowRate>=10 && (
        <div className="card mb-5" style={{background:"rgba(163,59,42,.04)",borderColor:"rgba(163,59,42,.15)"}}>
          <div className="card-bd" style={{padding:"14px 20px",display:"flex",gap:14,alignItems:"center"}}>
            <div style={{width:34,height:34,flex:"0 0 34px",borderRadius:"50%",background:"rgba(163,59,42,.1)",color:"var(--danger)",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon name="bell" size={15}/></div>
            <div style={{minWidth:0,flex:1}}>
              <div style={{fontSize:13.5,fontWeight:500,color:"var(--ink)"}}>Tasa de no-show {noShowRate}% — considerá activar seña por MercadoPago.</div>
              <div style={{fontSize:11.5,color:"var(--muted)",marginTop:2}}>Cuando supera el 10% mensual, una seña del 30% suele bajarla al 2-4%.</div>
            </div>
          </div>
        </div>
      )}

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-5 mb-5">
        <div className="card"><div className="card-hd"><h3>Día más fuerte</h3><span className="mono" style={{fontSize:10,letterSpacing:".18em",textTransform:"uppercase",color:"var(--muted)"}}>Turnos por día</span></div>
          <div className="card-bd">
            <div style={{display:"flex",alignItems:"flex-end",gap:8,height:120,marginBottom:10}}>
              {byDow.slice(1).concat(byDow[0]).map((d,i)=>{
                const h = maxDow ? (d.count/maxDow*100) : 0;
                const isTop = d.count===maxDow && maxDow>0;
                return (
                  <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:6,minWidth:0}}>
                    <div className="num" style={{fontSize:11,color:isTop?"var(--olive-dk)":"var(--muted)",fontWeight:isTop?500:400}}>{d.count||""}</div>
                    <div style={{width:"100%",height:`${h}%`,minHeight:d.count?4:0,background:isTop?"var(--olive)":"var(--olive-lt)",opacity:d.count?(isTop?1:.5):.15,borderRadius:"2px 2px 0 0",transition:"height .4s"}}/>
                  </div>
                );
              })}
            </div>
            <div style={{display:"flex",gap:8}}>
              {["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"].map((l,i)=>(
                <div key={i} className="mono" style={{flex:1,textAlign:"center",fontSize:10,letterSpacing:".1em",color:"var(--muted)"}}>{l}</div>
              ))}
            </div>
          </div>
        </div>
        <div className="card"><div className="card-hd"><h3>Top servicios</h3></div>
          <div className="card-bd">
            {Object.entries(bySvc).sort((a,b)=>b[1].total-a[1].total).slice(0,6).map(([k,v])=>(
              <div key={k} className="flex items-center justify-between py-2" style={{borderBottom:"1px solid var(--border)"}}>
                <div><div style={{fontSize:13.5}}>{k}</div><div className="mono" style={{fontSize:10.5,color:"var(--muted)",letterSpacing:".1em",marginTop:2}}>{v.count} turnos</div></div>
                <div className="serif num" style={{fontSize:17,color:"var(--olive-dk)"}}>{fP(v.total)}</div>
              </div>
            ))}
            {Object.keys(bySvc).length===0 && <div style={{color:"var(--muted)",fontSize:13}}>Sin datos en el período.</div>}
          </div>
        </div>
      </div>

      <div className="card"><div className="card-hd"><h3>Por medio de pago</h3></div>
        <div className="card-bd">
          {Object.entries(byPay).sort((a,b)=>b[1]-a[1]).map(([k,v])=>{
            const pct = total ? Math.round(v/total*100) : 0;
            const label = PAY_LABELS[k]||(k==="—"?"Sin definir":k);
            return (
              <div key={k} className="mb-4 last:mb-0">
                <div className="flex items-baseline justify-between mb-2"><span style={{fontSize:13}}>{label}</span><span className="num" style={{fontSize:13.5}}>{fP(v)} <span style={{color:"var(--muted)",fontSize:11}}>({pct}%)</span></span></div>
                <div style={{height:6,background:"rgba(26,24,16,.06)",borderRadius:2,overflow:"hidden"}}><div style={{width:pct+"%",height:"100%",background:"var(--olive)"}}/></div>
              </div>
            );
          })}
          {Object.keys(byPay).length===0 && <div style={{color:"var(--muted)",fontSize:13}}>Sin datos en el período.</div>}
        </div>
      </div>
    </>
  );
};

const EMPTY_GAL = { id:null, title:"", description:"", category:"otros", service_id:null, before_url:"", after_url:"", display_order:0, active:true };

const GaleriaTab = ({gallery, services, refetch}) => {
  const [editing, setEditing] = useState(null);
  const [filter, setFilter] = useState("all");
  const sorted = useMemo(()=>(gallery||[]).slice().sort((a,b)=>(a.display_order||0)-(b.display_order||0) || (b.created_at||"").localeCompare(a.created_at||"")), [gallery]);
  const filtered = sorted.filter(g => filter==="all" ? true : filter==="active" ? g.active : !g.active);

  const save = async (data) => {
    if(!data.after_url){ toast("Falta la foto (después)"); return; }
    const payload = {
      title: data.title||null,
      description: data.description||null,
      category: data.category||"otros",
      service_id: data.service_id||null,
      before_url: data.before_url||null,
      after_url: data.after_url,
      display_order: data.display_order||0,
      active: !!data.active,
    };
    let error;
    if(data.id) ({ error } = await sb.from("gf_gallery").update(payload).eq("id", data.id));
    else ({ error } = await sb.from("gf_gallery").insert(payload));
    if(error){ toast("Error: "+error.message); return; }
    setEditing(null); refetch(); toast(data.id?"Foto actualizada":"Foto agregada");
  };
  const del = async (id) => {
    if(!confirm("¿Eliminar esta foto?")) return;
    const { error } = await sb.from("gf_gallery").delete().eq("id", id);
    if(error){ toast("Error: "+error.message); return; }
    setEditing(null); refetch(); toast("Foto eliminada");
  };
  const toggle = async (g, v) => { await sb.from("gf_gallery").update({active:v}).eq("id", g.id); refetch(); };

  return (
    <>
      <div className="strip">
        <div>
          <div className="sec-label" style={{color:"rgba(250,247,239,.6)"}}>Trabajos · Galería</div>
          <h2 className="mt-2">Mostrá los <em>resultados.</em></h2>
          <p>Subí fotos antes/después (o solo el después). Aparecen en la landing cuando la clienta toca "Galería" en el menú.</p>
        </div>
        <div className="kpis">
          <div className="kpi"><div className="lb">Visibles</div><div className="v">{sorted.filter(g=>g.active).length}</div></div>
          <div className="kpi"><div className="lb">Total</div><div className="v">{sorted.length}</div></div>
        </div>
      </div>

      <div className="flex flex-wrap gap-3 items-center mb-5">
        <Tabs value={filter} onChange={setFilter} options={[{v:"all",l:"Todas"},{v:"active",l:"Visibles"},{v:"inactive",l:"Ocultas"}]}/>
        <div style={{flex:1}}/>
        <button className="btn btn-pr" onClick={()=>setEditing({...EMPTY_GAL, display_order:(sorted.length+1)*10})}><Icon name="plus"/> Nueva foto</button>
      </div>

      {filtered.length===0 ? (
        <EmptyState icon="eye" title="Sin fotos" desc="Subí el primer trabajo para que aparezca en la landing." action={<button className="btn btn-pr" onClick={()=>setEditing({...EMPTY_GAL})}><Icon name="plus"/> Nueva foto</button>}/>
      ) : (
        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
          {filtered.map(g=>(
            <div key={g.id} className="card" style={{opacity:g.active?1:.55,cursor:"pointer"}} onClick={()=>setEditing(g)}>
              <div style={{aspectRatio:"4/5",background:"var(--cream)",overflow:"hidden",borderBottom:"1px solid var(--border)",position:"relative"}}>
                {g.after_url ? <img src={g.after_url} alt={g.title||""} style={{width:"100%",height:"100%",objectFit:"cover"}}/> : <div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",color:"var(--muted)",fontSize:12}}>Sin foto</div>}
                {g.before_url && <div className="mono" style={{position:"absolute",top:8,left:8,background:"rgba(0,0,0,.65)",color:"#fff",fontSize:10,letterSpacing:".1em",padding:"3px 7px",textTransform:"uppercase"}}>Antes/Después</div>}
              </div>
              <div className="card-bd" style={{padding:12}}>
                <div className="flex items-center justify-between gap-2 mb-2">
                  <div style={{fontSize:13.5,fontWeight:500,flex:1,minWidth:0,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{g.title||"Sin título"}</div>
                  <span onClick={e=>{e.stopPropagation();toggle(g,!g.active);}}><Toggle checked={g.active} onChange={()=>{}}/></span>
                </div>
                <div className="mono" style={{fontSize:10,letterSpacing:".12em",color:"var(--muted)",textTransform:"uppercase"}}>{g.category||"otros"}</div>
              </div>
            </div>
          ))}
        </div>
      )}

      <Drawer open={!!editing} onClose={()=>setEditing(null)}
        subtitle={editing?.id?"Foto · Editar":"Foto · Nueva"}
        title={editing?.id ? <>Editar <em>{editing.title||"foto"}</em></> : <>Nueva <em>foto</em></>}
        footer={editing && (
          <>
            <div>{editing.id && <button className="btn btn-dg" onClick={()=>del(editing.id)}><Icon name="trash" size={13}/> Eliminar</button>}</div>
            <div className="flex gap-2">
              <button className="btn btn-sc" onClick={()=>setEditing(null)}>Cancelar</button>
              <button className="btn btn-pr" onClick={()=>save(editing)}>Guardar</button>
            </div>
          </>
        )}>
        {editing && <GalleryEditor item={editing} onChange={setEditing} services={services}/>}
      </Drawer>
    </>
  );
};

/* ============ TESTIMONIOS TAB ============ */
const TestimoniosTab = ({content, persist}) => {
  const [list, setList] = useState(()=>Array.isArray(content.testimonials)?content.testimonials:[]);
  const [dirty, setDirty] = useState(false);

  useEffect(()=>{ setList(Array.isArray(content.testimonials)?content.testimonials:[]); setDirty(false); }, [content.testimonials]);

  const update = (i, patch) => { setList(xs=>xs.map((t,idx)=>idx===i?{...t,...patch}:t)); setDirty(true); };
  const add = () => { setList(xs=>[...xs, {name:"",svc:"",text:"",rating:5,visible:true}]); setDirty(true); };
  const del = (i) => { setList(xs=>xs.filter((_,idx)=>idx!==i)); setDirty(true); };
  const move = (i, dir) => {
    setList(xs=>{
      const arr = xs.slice();
      const j = i+dir;
      if(j<0 || j>=arr.length) return arr;
      [arr[i], arr[j]] = [arr[j], arr[i]];
      return arr;
    });
    setDirty(true);
  };
  const save = async () => {
    const merged = {...content, testimonials:list};
    const rows = Object.entries(merged).map(([key, value])=>({ key, value }));
    const { error } = await sb.from("gf_content").upsert(rows, { onConflict:"key" });
    if(error){ toast("Error: "+error.message); return; }
    setDirty(false);
    toast("Testimonios guardados");
    if(persist) {} // persist is optional: data is already saved above
  };

  const visible = list.filter(t=>t.visible!==false).length;

  return (
    <>
      <div className="strip">
        <div>
          <div className="sec-label" style={{color:"rgba(250,247,239,.6)"}}>Reseñas · Landing</div>
          <h2 className="mt-2">Lo que dicen <em>quienes pasaron.</em></h2>
          <p>Los primeros 3 visibles aparecen en la landing, rotando en la sección "Lo que dicen quienes pasaron".</p>
        </div>
        <div className="kpis">
          <div className="kpi"><div className="lb">Visibles</div><div className="v">{visible}</div></div>
          <div className="kpi"><div className="lb">Total</div><div className="v">{list.length}</div></div>
        </div>
      </div>

      <div className="flex items-center gap-3 mb-5">
        <button className="btn btn-pr" onClick={add}><Icon name="plus"/> Nuevo testimonio</button>
        <div style={{flex:1}}/>
        {dirty && <span className="mono" style={{fontSize:11,color:"var(--warn,#c4822e)",letterSpacing:".12em",textTransform:"uppercase"}}>Cambios sin guardar</span>}
        <button className="btn btn-sc" disabled={!dirty} onClick={save}>Guardar</button>
      </div>

      {list.length===0 ? (
        <EmptyState icon="chart" title="Sin testimonios" desc="Agregá reseñas reales para que aparezcan en la landing." action={<button className="btn btn-pr" onClick={add}><Icon name="plus"/> Nuevo testimonio</button>}/>
      ) : (
        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
          {list.map((t,i)=>(
            <div key={i} className="card" style={{opacity:t.visible===false?.55:1}}>
              <div className="card-bd flex flex-col gap-3">
                <div className="flex items-center justify-between">
                  <Toggle checked={t.visible!==false} onChange={v=>update(i,{visible:v})} label="Visible"/>
                  <div className="flex gap-1">
                    <button className="btn btn-sc btn-sm" onClick={()=>move(i,-1)} disabled={i===0} title="Subir" aria-label="Subir testimonio"><Icon name="chevron" size={12} style={{transform:"rotate(90deg)"}}/></button>
                    <button className="btn btn-sc btn-sm" onClick={()=>move(i,1)} disabled={i===list.length-1} title="Bajar" aria-label="Bajar testimonio"><Icon name="chevron" size={12} style={{transform:"rotate(-90deg)"}}/></button>
                    <button className="btn btn-dg btn-sm" onClick={()=>del(i)} aria-label="Eliminar testimonio"><Icon name="trash" size={12}/></button>
                  </div>
                </div>
                <Field label="Nombre"><input className="inp" value={t.name||""} onChange={e=>update(i,{name:e.target.value})}/></Field>
                <Field label="Servicio"><input className="inp" value={t.svc||""} onChange={e=>update(i,{svc:e.target.value})}/></Field>
                <Field label="Texto"><textarea className="inp" rows="4" value={t.text||""} onChange={e=>update(i,{text:e.target.value})}/></Field>
                <Field label="Calificación">
                  <div className="flex gap-1">
                    {[1,2,3,4,5].map(n=>(
                      <button key={n} type="button" onClick={()=>update(i,{rating:n})} style={{border:"none",background:"none",cursor:"pointer",fontSize:20,color:n<=(t.rating||0)?"var(--olive)":"var(--border-strong)"}}>★</button>
                    ))}
                  </div>
                </Field>
              </div>
            </div>
          ))}
        </div>
      )}
    </>
  );
};

/* ============ FICHA TAB (config preguntas + historial de fichas) ============ */
const EMPTY_Q = { id:null, question:"", hint:"", category:"general", type:"text", options:[], display_order:0, required:false, active:true };

const FichaTab = ({questions, fichas, services, refetch}) => {
  const [sub, setSub] = useState("preguntas");
  const [editingQ, setEditingQ] = useState(null);
  const [editingF, setEditingF] = useState(null);

  const sortedQ = useMemo(()=>(questions||[]).slice().sort((a,b)=>(a.display_order||0)-(b.display_order||0)), [questions]);
  const sortedF = useMemo(()=>(fichas||[]).slice().sort((a,b)=>(b.created_at||"").localeCompare(a.created_at||"")), [fichas]);

  const saveQ = async (data) => {
    if(!data.question?.trim()){ toast("La pregunta no puede estar vacía"); return; }
    const payload = {
      question: data.question.trim(),
      hint: data.hint||null,
      category: data.category||"general",
      type: data.type||"text",
      options: data.options||[],
      display_order: data.display_order||0,
      required: !!data.required,
      active: !!data.active,
    };
    let error;
    if(data.id) ({ error } = await sb.from("gf_ficha_questions").update(payload).eq("id", data.id));
    else ({ error } = await sb.from("gf_ficha_questions").insert(payload));
    if(error){ toast("Error: "+error.message); return; }
    setEditingQ(null); refetch(); toast(data.id?"Pregunta actualizada":"Pregunta agregada");
  };
  const delQ = async (id) => {
    if(!confirm("¿Eliminar esta pregunta? Las respuestas previas se conservan en las fichas.")) return;
    const { error } = await sb.from("gf_ficha_questions").delete().eq("id", id);
    if(error){ toast("Error: "+error.message); return; }
    setEditingQ(null); refetch(); toast("Pregunta eliminada");
  };
  const toggleQ = async (q,v)=>{ await sb.from("gf_ficha_questions").update({active:v}).eq("id", q.id); refetch(); };
  const moveQ = async (i, dir) => {
    const arr = sortedQ;
    const curr = arr[i]; const target = arr[i+dir];
    if(!curr || !target) return;
    const [ord1, ord2] = [curr.display_order||0, target.display_order||0];
    await Promise.all([
      sb.from("gf_ficha_questions").update({display_order:ord2}).eq("id", curr.id),
      sb.from("gf_ficha_questions").update({display_order:ord1}).eq("id", target.id),
    ]);
    refetch();
  };

  const saveF = async (data) => {
    const payload = {
      client_phone: data.client_phone||"",
      client_name: data.client_name||"",
      responses: data.responses||{},
      professional_notes: data.professional_notes||"",
      updated_at: new Date().toISOString(),
    };
    let error;
    if(data.id) ({ error } = await sb.from("gf_fichas").update(payload).eq("id", data.id));
    else ({ error } = await sb.from("gf_fichas").insert(payload));
    if(error){ toast("Error: "+error.message); return; }
    setEditingF(null); refetch(); toast(data.id?"Ficha actualizada":"Ficha guardada");
  };
  const delF = async (id) => {
    if(!confirm("¿Eliminar esta ficha?")) return;
    const { error } = await sb.from("gf_fichas").delete().eq("id", id);
    if(error){ toast("Error: "+error.message); return; }
    setEditingF(null); refetch(); toast("Ficha eliminada");
  };

  return (
    <>
      <div className="strip">
        <div>
          <div className="sec-label" style={{color:"rgba(250,247,239,.6)"}}>Formulario · Ficha</div>
          <h2 className="mt-2">La ficha de <em>cada clienta.</em></h2>
          <p>Armá el cuestionario que usás en la primera cita (hábitos, piel, salud). Después, desde cada clienta, podés cargar su ficha completa.</p>
        </div>
        <div className="kpis">
          <div className="kpi"><div className="lb">Preguntas</div><div className="v">{sortedQ.filter(q=>q.active).length}</div></div>
          <div className="kpi"><div className="lb">Fichas</div><div className="v">{sortedF.length}</div></div>
        </div>
      </div>

      <div className="mb-5">
        <Tabs value={sub} onChange={setSub} options={[{v:"preguntas",l:"Preguntas"},{v:"historial",l:"Historial"}]}/>
      </div>

      {sub==="preguntas" && (
        <>
          <div className="flex items-center gap-3 mb-4">
            <div style={{flex:1}}/>
            <button className="btn btn-pr" onClick={()=>setEditingQ({...EMPTY_Q, display_order:(sortedQ.length+1)*10})}><Icon name="plus"/> Nueva pregunta</button>
          </div>
          {sortedQ.length===0 ? (
            <EmptyState icon="edit" title="Sin preguntas" desc="Agregá las preguntas que hacés en la primera cita." action={<button className="btn btn-pr" onClick={()=>setEditingQ({...EMPTY_Q})}><Icon name="plus"/> Primera pregunta</button>}/>
          ) : (
            <div className="card">
              <table className="tbl">
                <thead><tr><th style={{width:50}}>#</th><th>Pregunta</th><th>Tipo</th><th>Categoría</th><th>Req.</th><th style={{width:160}}></th></tr></thead>
                <tbody>
                  {sortedQ.map((q,i)=>(
                    <tr key={q.id} style={{opacity:q.active?1:.5}}>
                      <td className="mono" style={{color:"var(--muted)"}}>{String(i+1).padStart(2,'0')}</td>
                      <td><div style={{fontWeight:500}}>{q.question}</div>{q.hint && <div style={{fontSize:11.5,color:"var(--muted)",marginTop:2}}>{q.hint}</div>}</td>
                      <td><span className="chip dk">{q.type}</span></td>
                      <td className="mono" style={{fontSize:11,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".1em"}}>{q.category}</td>
                      <td>{q.required ? <span className="chip dk">sí</span> : "—"}</td>
                      <td>
                        <div className="flex gap-2 items-center justify-end">
                          <div style={{display:"inline-flex",flexDirection:"column",border:"1px solid var(--border-strong)",borderRadius:2,overflow:"hidden",background:"var(--cream)"}}>
                            <button className="svc-ord-btn" style={{padding:"2px 6px"}} onClick={()=>moveQ(i,-1)} disabled={i===0} title="Subir" aria-label="Subir"><Icon name="caret-up" size={12}/></button>
                            <button className="svc-ord-btn" style={{padding:"2px 6px"}} onClick={()=>moveQ(i,1)} disabled={i===sortedQ.length-1} title="Bajar" aria-label="Bajar"><Icon name="caret-down" size={12}/></button>
                          </div>
                          <span onClick={()=>toggleQ(q,!q.active)}><Toggle checked={q.active} onChange={()=>{}}/></span>
                          <button className="btn btn-sc btn-sm" onClick={()=>setEditingQ(q)} title="Editar" aria-label="Editar pregunta"><Icon name="edit" size={11}/></button>
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </>
      )}

      {sub==="historial" && (
        <>
          <div className="flex items-center gap-3 mb-4">
            <div style={{flex:1}}/>
            <button className="btn btn-pr" onClick={()=>setEditingF({id:null, client_phone:"", client_name:"", responses:{}, professional_notes:""})}><Icon name="plus"/> Nueva ficha</button>
          </div>
          {sortedF.length===0 ? (
            <EmptyState icon="edit" title="Sin fichas" desc="Cargá la primera ficha desde acá o desde el drawer de Clientes."/>
          ) : (
            <div className="card">
              <table className="tbl">
                <thead><tr><th>Fecha</th><th>Clienta</th><th>Teléfono</th><th>Respuestas</th><th>Notas</th><th style={{width:80}}></th></tr></thead>
                <tbody>
                  {sortedF.map(f=>(
                    <tr key={f.id} style={{cursor:"pointer"}} onClick={()=>setEditingF(f)}>
                      <td className="mono" style={{fontSize:11.5,color:"var(--muted)"}}>{fDate((f.created_at||"").slice(0,10))}</td>
                      <td style={{fontWeight:500}}>{f.client_name||"—"}</td>
                      <td className="mono" style={{fontSize:11.5}}>{f.client_phone||"—"}</td>
                      <td>{Object.keys(f.responses||{}).length}</td>
                      <td style={{fontSize:12,color:"var(--muted)",maxWidth:260,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{f.professional_notes||""}</td>
                      <td><button className="btn btn-sc btn-sm" onClick={e=>{e.stopPropagation();setEditingF(f);}} aria-label="Editar ficha"><Icon name="edit" size={11}/></button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </>
      )}

      <Drawer open={!!editingQ} onClose={()=>setEditingQ(null)}
        subtitle={editingQ?.id?"Pregunta · Editar":"Pregunta · Nueva"}
        title={editingQ?.id ? <>Editar <em>pregunta</em></> : <>Nueva <em>pregunta</em></>}
        footer={editingQ && (
          <>
            <div>{editingQ.id && <button className="btn btn-dg" onClick={()=>delQ(editingQ.id)}><Icon name="trash" size={13}/> Eliminar</button>}</div>
            <div className="flex gap-2">
              <button className="btn btn-sc" onClick={()=>setEditingQ(null)}>Cancelar</button>
              <button className="btn btn-pr" onClick={()=>saveQ(editingQ)}>Guardar</button>
            </div>
          </>
        )}>
        {editingQ && <QuestionEditor q={editingQ} onChange={setEditingQ}/>}
      </Drawer>

      <Drawer open={!!editingF} onClose={()=>setEditingF(null)}
        subtitle={editingF?.id?"Ficha · Editar":"Ficha · Nueva"}
        title={editingF?.id ? <>Ficha <em>{editingF.client_name||""}</em></> : <>Nueva <em>ficha</em></>}
        footer={editingF && (
          <>
            <div>{editingF.id && <button className="btn btn-dg" onClick={()=>delF(editingF.id)}><Icon name="trash" size={13}/> Eliminar</button>}</div>
            <div className="flex gap-2">
              <button className="btn btn-sc" onClick={()=>setEditingF(null)}>Cancelar</button>
              <button className="btn btn-pr" onClick={()=>saveF(editingF)}>Guardar</button>
            </div>
          </>
        )}>
        {editingF && <FichaEditor ficha={editingF} onChange={setEditingF} questions={questions}/>}
      </Drawer>
    </>
  );
};

        <div>

      <Field label="Ayuda" hint="Texto secundario debajo de la pregunta (opcional)"><input className="inp" value={q.hint||""} onChange={e=>u("hint",e.target.value)} placeholder="Aprox. en litros o vasos"/></Field>

  const [auth, setAuth] = useState(null); // null = cargando sesión, true = autenticado, false = sin sesión

  const [services, setServices] = useState([]);
  const [packs, setPacks] = useState([]);
  const [coupons, setCoupons] = useState([]);
  const [appts, setAppts] = useState([]);
  const [blocks, setBlocks] = useState([]);
  const [gallery, setGallery] = useState([]);
  const [fichaQuestions, setFichaQuestions] = useState([]);
  const [fichas, setFichas] = useState([]);
  const [content, setContent] = useState(DEFAULT_CONTENT);
  const [settings, setSettings] = useState(()=>{
    try {
      const s = JSON.parse(localStorage.getItem("gf_admin_settings"));
      if(!s) return DEFAULT_SETTINGS;
      if(!s._v2){ s.close_min = Math.max(s.close_min||0, 20*60); s._v2 = true; }
      return s;
    }
    catch { return DEFAULT_SETTINGS; }
  });
  const [loading, setLoading] = useState(false);

  useEffect(()=>{ localStorage.setItem("gf_admin_tab", tab); },[tab]);
  useEffect(()=>{ localStorage.setItem("gf_admin_settings", JSON.stringify(settings)); },[settings]);
  useEffect(()=>{
    const h = () => {
      const mob = window.innerWidth <= 900;
      setIsMobile(mob);
      if(!mob) setDrawerOpen(false);
    };
    window.addEventListener("resize", h);
    return () => window.removeEventListener("resize", h);
  },[]);
  useEffect(()=>{
    document.body.style.overflow = drawerOpen ? "hidden" : "";
    return () => { document.body.style.overflow = ""; };
  },[drawerOpen]);
  // Escape cierra el sidebar mobile
  useEffect(()=>{
    if(!drawerOpen) return;
    const h = e => { if(e.key==="Escape") setDrawerOpen(false); };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  },[drawerOpen]);

  const handleNav = useCallback((id) => {
    setTab(id);
    setDrawerOpen(false);
    window.scrollTo(0,0);
  },[]);

  const fetchAll = useCallback(async () => {
    setLoading(true);
    const [svcRes, pkRes, apRes, blRes, cpRes, cnRes, glRes, fqRes, fhRes] = await Promise.all([
      sb.from("gf_services").select("*"),
      sb.from("gf_packs").select("*").then(r=>r, ()=>({data:[]})),
      sb.from("gf_appointments").select("*").order("appointment_date",{ascending:true}).order("time_slot",{ascending:true}),
      sb.from("gf_blocked_slots").select("*"),
      sb.from("gf_coupons").select("*").then(r=>r, ()=>({data:[]})),
      sb.from("gf_content").select("*").then(r=>r, ()=>({data:[]})),
      sb.from("gf_gallery").select("*").order("display_order",{ascending:true}).then(r=>r, ()=>({data:[]})),
      sb.from("gf_ficha_questions").select("*").order("display_order",{ascending:true}).then(r=>r, ()=>({data:[]})),
      sb.from("gf_fichas").select("*").order("created_at",{ascending:false}).then(r=>r, ()=>({data:[]})),
    ]);
    setServices((svcRes.data||[]).map(normSvc));
    setPacks((pkRes.data||[]).map(normPack));
    setAppts(apRes.data||[]);
    setBlocks((blRes.data||[]).map(normBlock));
    setCoupons((cpRes.data||[]).map(normCoupon));
    setGallery(glRes.data||[]);
    setFichaQuestions(fqRes.data||[]);
    setFichas(fhRes.data||[]);
    if(cnRes.data && cnRes.data.length){
      const merged = {...DEFAULT_CONTENT};
      for(const row of cnRes.data){ if(row.value) merged[row.key] = row.value; }
      setContent(merged);
    }
    setLoading(false);
  }, []);

  useEffect(()=>{ if(auth) fetchAll(); }, [auth, fetchAll]);

  const fetchTimeout = useRef(null);
  const debouncedFetch = useCallback(()=>{
    clearTimeout(fetchTimeout.current);
    fetchTimeout.current = setTimeout(fetchAll, 400);
  }, [fetchAll]);

  useEffect(()=>{
    if(!auth) return;
    const channel = sb.channel("admin-all")
      .on("postgres_changes",{event:"INSERT",schema:"public",table:"gf_appointments"}, (payload)=>{
        const row = payload?.new;
        if(row){
          const hm = (row.time_slot||"").slice(0,5);
          const name = (row.client_name||"").split(" ")[0] || "Clienta";
          toast(`Nuevo turno: ${name} · ${hm}`);
          beep();
        }
        debouncedFetch();
      })
      .on("postgres_changes",{event:"UPDATE",schema:"public",table:"gf_appointments"}, debouncedFetch)
      .on("postgres_changes",{event:"DELETE",schema:"public",table:"gf_appointments"}, debouncedFetch)
      .on("postgres_changes",{event:"*",schema:"public",table:"gf_blocked_slots"}, debouncedFetch)
      .on("postgres_changes",{event:"*",schema:"public",table:"gf_services"}, debouncedFetch)
      .on("postgres_changes",{event:"*",schema:"public",table:"gf_packs"}, debouncedFetch)
      .on("postgres_changes",{event:"*",schema:"public",table:"gf_coupons"}, debouncedFetch)
      .on("postgres_changes",{event:"*",schema:"public",table:"gf_gallery"}, debouncedFetch)
      .on("postgres_changes",{event:"*",schema:"public",table:"gf_ficha_questions"}, debouncedFetch)
      .on("postgres_changes",{event:"*",schema:"public",table:"gf_fichas"}, debouncedFetch)
      .subscribe();
    return ()=>{ sb.removeChannel(channel); clearTimeout(fetchTimeout.current); };
  }, [auth, debouncedFetch]);

  const persistContent = async () => {
    const rows = Object.entries(content).map(([key, value])=>({ key, value }));
    const { error } = await sb.from("gf_content").upsert(rows);
    if(error) toast("Error: "+error.message+" — ¿migración aplicada?");
    else toast("Contenido guardado");
  };

  const persistSettings = async () => {
    localStorage.setItem("gf_admin_settings", JSON.stringify(settings));
    // Also persist to DB so landing page reads schedule
    try{
      await sb.from("gf_content").upsert({key:"schedule",value:JSON.stringify({open_min:settings.open_min,close_min:settings.close_min,slot_step:settings.slot_step,break_start:settings.break_start||0,break_end:settings.break_end||0,open_days:settings.open_days})});
    }catch(_){}
    toast("Ajustes guardados");
  };

  useEffect(()=>{
    let mounted = true;
    sb.auth.getSession().then(({data})=>{
      if(mounted) setAuth(!!data?.session);
    }).catch(()=>{ if(mounted) setAuth(false); });
    const { data: sub } = sb.auth.onAuthStateChange((_e, session)=>{
      if(mounted) setAuth(!!session);
    });
    return ()=>{ mounted = false; sub?.subscription?.unsubscribe?.(); };
  }, []);

  const login = async (e) => {
    e.preventDefault();
    if(loggingIn || !pass) return;
    setLoggingIn(true);
    const { error } = await sb.auth.signInWithPassword({ email: ADMIN_EMAIL, password: pass });
    setLoggingIn(false);
    if(error){ toast("Contraseña incorrecta"); setPass(""); }
    else { setPass(""); /* onAuthStateChange setea auth=true */ }
  };
  const forgotPassword = async () => {
    if(loggingIn) return;
    setLoggingIn(true);
    const redirect = `${location.origin}/admin.html`;
    const { error } = await sb.auth.resetPasswordForEmail(ADMIN_EMAIL, { redirectTo: redirect });
    setLoggingIn(false);
    if(error){ toast("No se pudo enviar el email. Probá de nuevo en un rato."); }
    else { toast("Revisá tu email — te llegó un link para resetear."); }
  };
  const logout = async () => { await sb.auth.signOut(); };

  if(auth === null){
    return (
      <div className="login-wrap">
        <div className="login-card">
          <h1>GF <em>Studio</em></h1>
          <p>Cargando sesión…</p>
        </div>
      </div>
    );
  }
  if(!auth){
    return (
      <div className="login-wrap">
        <form className="login-card" onSubmit={login}>
          <h1>GF <em>Studio</em></h1>
          <p>Panel de administración</p>
          <Field label="Contraseña">
            <input className="inp" type="password" value={pass} onChange={e=>setPass(e.target.value)} autoFocus disabled={loggingIn}/>
          </Field>
          <button type="submit" className="btn btn-pr w-full mt-4" style={{width:"100%"}} disabled={loggingIn||!pass}>
            {loggingIn ? "Entrando…" : "Entrar"}
          </button>
          <button type="button" onClick={forgotPassword} disabled={loggingIn}
            style={{marginTop:14,background:"none",border:"none",color:"var(--muted)",fontSize:12,textDecoration:"underline",cursor:loggingIn?"wait":"pointer"}}>
            ¿Olvidaste la contraseña?
          </button>
        </form>
      </div>
    );
  }

  const titles = {
    turnos:     {c:"Agenda",      t:<>Turnos <em>y reservas</em></>},
    clientes:   {c:"Cartera",     t:<>Clientes <em>de la casa</em></>},
    ficha:      {c:"Formulario",  t:<>Ficha <em>de clienta</em></>},
    servicios:  {c:"Carta",       t:<>Servicios <em>de la casa</em></>},
    packs:      {c:"Combos",      t:<>Packs <em>configurables</em></>},
    galeria:    {c:"Trabajos",    t:<>Galería <em>de fotos</em></>},
    testimonios:{c:"Reseñas",     t:<>Testimonios <em>de clientas</em></>},
    cupones:    {c:"Campañas",    t:<>Cupones <em>de descuento</em></>},
    contenido:  {c:"Landing",     t:<>Contenido <em>editable</em></>},
    bloqueos:   {c:"Calendario",  t:<>Agenda <em>visual</em></>},
    resultados: {c:"Métricas",    t:<>Resultados <em>del período</em></>},
  };
  const meta = titles[tab] || titles.turnos;

  return (
    <div className={"app"+(drawerOpen?" drawer-open":"")}>
      {isMobile && (
        <div
          className="drawer-backdrop"
          onClick={()=>setDrawerOpen(false)}
          style={{
            opacity: drawerOpen ? 1 : 0,
            pointerEvents: drawerOpen ? "auto" : "none"
          }}
        />
      )}
      <Sidebar current={tab} onNav={handleNav} appts={appts} onLogout={logout} isMobile={isMobile} drawerOpen={drawerOpen}/>
      <main className="main">
        <Topbar crumb={meta.c} title={meta.t} onMenuClick={isMobile ? (()=>setDrawerOpen(true)) : null}
          actions={<span className="mono topbar-date" style={{fontSize:11,color:"var(--muted)",letterSpacing:".15em",textTransform:"uppercase"}}>
            {fDateLong(toISO(TODAY))}
          </span>}/>
        <div className="content">
          {loading && appts.length===0 && <div className="card"><div className="card-empty">Cargando…</div></div>}
          {tab==="turnos"     && <TurnosTab appts={appts} services={services} blocks={blocks} settings={settings} refetch={fetchAll}/>}
          {tab==="clientes"   && <ClientesTab appts={appts} services={services} fichaQuestions={fichaQuestions} fichas={fichas} refetch={fetchAll}/>}
          {tab==="ficha"      && <FichaTab questions={fichaQuestions} fichas={fichas} services={services} refetch={fetchAll}/>}
          {tab==="servicios"  && <ServiciosTab services={services} refetch={fetchAll}/>}
          {tab==="packs"      && <PacksTab packs={packs} services={services} refetch={fetchAll}/>}
          {tab==="galeria"    && <GaleriaTab gallery={gallery} services={services} refetch={fetchAll}/>}
          {tab==="testimonios"&& <TestimoniosTab content={content} persist={persistContent}/>}
          {tab==="cupones"    && <CuponesTab coupons={coupons} services={services} packs={packs} refetch={fetchAll}/>}
          {tab==="contenido"  && <ContenidoTab content={content} setContent={setContent} persist={persistContent}/>}
          {tab==="bloqueos"   && <BloqueosTab blocks={blocks} setBlocks={setBlocks} appts={appts} services={services} settings={settings} setSettings={setSettings} persistSettings={persistSettings} refetch={fetchAll}/>}
          {tab==="resultados" && <ResultadosTab appts={appts} services={services} coupons={coupons}/>}
        </div>
      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
<script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
