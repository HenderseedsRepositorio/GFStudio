<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="light dark">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://ibikdnjuctopdkmtmgdd.supabase.co wss://ibikdnjuctopdkmtmgdd.supabase.co; base-uri 'self'; form-action 'self'">
<title>GF Studio · Panel</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Inter+Tight:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --olive-dk:#3D4A18;
  --olive:#5E6B2E;
  --olive-lt:#8A9456;
  --olive-soft:#B8C481;
  --sand:#E8E2D4;
  --bone:#F2EDE0;
  --cream:#FAF7EF;
  --ink:#1A1810;
  --ink-sec:#3F3B2E;
  --muted:#6B6650;
  --border:rgba(26,24,16,.08);
  --border-strong:rgba(26,24,16,.14);
  --danger:#A33B2A;
  --success:#4A6B2E;
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;color-scheme:light dark;forced-color-adjust:none;background-color:#F2EDE0;background-image:linear-gradient(#F2EDE0,#F2EDE0)}
body{
  font-family:'Inter Tight',system-ui,sans-serif;
  background-color:var(--bone);
  background-image:linear-gradient(var(--bone),var(--bone));
  color:var(--ink);
  font-weight:400;
  letter-spacing:-.005em;
  min-height:100vh;
}
@media(prefers-color-scheme:dark){
  :root{
    color-scheme:light!important;
    --olive-dk:#3D4A18!important;
    --olive:#5E6B2E!important;
    --olive-lt:#8A9456!important;
    --olive-soft:#B8C481!important;
    --sand:#E8E2D4!important;
    --bone:#F2EDE0!important;
    --cream:#FAF7EF!important;
    --ink:#1A1810!important;
    --ink-sec:#3F3B2E!important;
    --muted:#6B6650!important;
    --border:rgba(26,24,16,.08)!important;
    --border-strong:rgba(26,24,16,.14)!important;
    --danger:#A33B2A!important;
    --success:#4A6B2E!important;
  }
  html,body{
    background-color:#F2EDE0!important;
    background-image:linear-gradient(#F2EDE0,#F2EDE0)!important;
    color:#1A1810!important;
  }
  img,svg,video,picture,iframe{filter:none!important}
}
.serif{font-family:'Fraunces',serif;font-optical-sizing:auto}
.mono{font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;font-variant-numeric:tabular-nums}
.num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}

body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:1;opacity:.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(26,24,16,.12);border-radius:10px;border:2px solid var(--bone)}
::-webkit-scrollbar-thumb:hover{background:rgba(26,24,16,.22)}

/* ============ LAYOUT ============ */
.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
.drawer-backdrop{display:none}
.menu-btn{display:none;align-items:center;justify-content:center;width:40px;height:40px;margin-right:4px;background:transparent;border:1px solid var(--border);border-radius:2px;cursor:pointer;color:var(--ink);flex-shrink:0}
.menu-btn:hover{background:rgba(0,0,0,.04)}
@media(max-width:900px){
  .app{grid-template-columns:1fr;padding-bottom:0}
  .sidebar.is-mobile{
    position:fixed;top:0;left:0;bottom:0;right:auto;
    width:min(280px,85vw);height:100vh;
    z-index:50;border-right:1px solid rgba(250,247,239,.08);border-top:none;
    overflow-y:auto;
    flex-direction:column;padding:24px 20px;gap:20px;
  }
  .drawer-backdrop{
    display:block;position:fixed;inset:0;z-index:40;
    background:rgba(0,0,0,.45);backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);
  }
  .app .main{overflow-y:visible}
  .app .topbar{padding:14px 16px;gap:8px}
  .app .topbar h1{font-size:19px;line-height:1.15}
  .app .topbar .crumb{font-size:9px;letter-spacing:.18em;margin-bottom:2px}
  .menu-btn{display:inline-flex}
}

.sidebar{
  background:var(--ink);color:var(--cream);
  padding:28px 20px;
  display:flex;flex-direction:column;gap:24px;
  position:sticky;top:0;height:100vh;overflow-y:auto;
  border-right:1px solid rgba(250,247,239,.06);
}
.sidebar .brand{display:flex;align-items:center;gap:10px;padding:0 6px}
.sidebar .brand .name{font-family:'Fraunces',serif;font-size:17px;letter-spacing:-.01em}
.sidebar .meta{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:rgba(250,247,239,.4);padding:0 6px}
.sidebar nav{display:flex;flex-direction:column;gap:2px;margin-top:8px}
.sidebar nav .nav-group{font-family:'JetBrains Mono',monospace;font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;color:rgba(250,247,239,.32);padding:14px 14px 6px;border-top:1px solid rgba(250,247,239,.06);margin-top:6px}
.sidebar nav .nav-group:first-child{border-top:0;margin-top:0;padding-top:4px}
.sidebar nav a{
  display:flex;align-items:center;gap:12px;
  padding:11px 14px;border-radius:2px;
  font-size:13.5px;color:rgba(250,247,239,.7);
  cursor:pointer;transition:all .2s;
  position:relative;
}
.sidebar nav a:hover{background:rgba(250,247,239,.04);color:var(--cream)}
.sidebar nav a.active{background:var(--olive);color:var(--cream)}
.sidebar nav a .ic{width:16px;height:16px;flex-shrink:0;opacity:.85}
.sidebar nav a .badge{
  margin-left:auto;background:rgba(250,247,239,.1);padding:2px 7px;border-radius:2px;
  font-size:10px;font-family:'JetBrains Mono',monospace;letter-spacing:.05em;
}
.sidebar nav a.active .badge{background:rgba(0,0,0,.25)}
.sidebar .footer{margin-top:auto;padding-top:20px;border-top:1px solid rgba(250,247,239,.08)}
.sidebar .user{display:flex;align-items:center;gap:10px;padding:6px}
.sidebar .user .av{width:32px;height:32px;border-radius:50%;background:var(--olive);display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:13px;color:var(--cream)}
.sidebar .user .tx .n{font-size:13px;color:var(--cream)}
.sidebar .user .tx .r{font-size:10px;color:rgba(250,247,239,.4);letter-spacing:.1em;text-transform:uppercase;font-family:'JetBrains Mono',monospace;margin-top:2px}
.sidebar a.logout{display:flex;align-items:center;gap:10px;padding:8px 6px;font-size:12px;color:rgba(250,247,239,.4);cursor:pointer;margin-top:12px}
.sidebar a.logout:hover{color:var(--cream)}
@media(max-height:720px){
  .sidebar{padding:16px 14px;gap:12px}
  .sidebar nav .nav-group{padding:10px 14px 4px;margin-top:2px}
  .sidebar nav a{padding:8px 12px;font-size:13px}
  .sidebar .footer{padding-top:12px}
  .sidebar a.logout{margin-top:6px}
}

.main{overflow-y:auto;min-width:0;position:relative;z-index:2}
.topbar{
  border-bottom:1px solid var(--border);
  padding:18px 40px;
  display:flex;align-items:center;justify-content:space-between;gap:20px;
  position:sticky;top:0;z-index:20;
  backdrop-filter:blur(12px);
  background:rgba(242,237,224,.92);
}
.topbar h1{font-family:'Fraunces',serif;font-size:26px;font-weight:400;letter-spacing:-.015em}
.topbar h1 em{font-style:italic;color:var(--olive)}
.topbar .crumb{font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.22em;color:var(--muted);margin-bottom:4px}
.content{padding:32px 40px 80px}
@media(max-width:900px){.content{padding:20px 14px 50px}}

/* ============ COMPONENTS ============ */
.btn{
  display:inline-flex;align-items:center;gap:8px;justify-content:center;
  padding:10px 18px;border-radius:2px;
  font-size:12.5px;font-weight:500;letter-spacing:.02em;
  border:1px solid transparent;cursor:pointer;
  transition:all .25s cubic-bezier(.2,.8,.2,1);white-space:nowrap;
  text-decoration:none;
}
.btn-pr{background:var(--ink);color:var(--cream);border-color:var(--ink)}
.btn-pr:hover{background:var(--olive-dk);border-color:var(--olive-dk)}
.btn-sc{background:transparent;color:var(--ink);border-color:var(--border-strong)}
.btn-sc:hover{border-color:var(--ink);background:var(--cream)}
.btn-gh{background:transparent;color:var(--muted);border-color:transparent;padding:8px 12px}
.btn-gh:hover{color:var(--ink);background:rgba(26,24,16,.04)}
.btn-dg{background:transparent;color:var(--danger);border-color:transparent;padding:8px 12px}
.btn-dg:hover{background:rgba(163,59,42,.08)}
.btn-sm{padding:7px 12px;font-size:11.5px}
.btn-wa{background:#25D366;color:#fff;border-color:#25D366}
.btn-wa:hover{background:#1ebe5d;border-color:#1ebe5d}

.card{
  background:var(--cream);
  border:1px solid var(--border);
  border-radius:2px;
}
.card-hd{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px}
.card-hd h3{font-family:'Fraunces',serif;font-size:20px;font-weight:400;letter-spacing:-.01em}
.card-bd{padding:24px}
.card-empty{padding:40px;text-align:center;color:var(--muted);font-size:13px}

.sec-label{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;letter-spacing:.22em;text-transform:uppercase;
  color:var(--olive);display:inline-block;
}

.fld{display:flex;flex-direction:column;gap:6px}
.fld label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
.fld .hint{font-size:11.5px;color:var(--muted);line-height:1.4}
.inp{
  padding:11px 14px;border:1px solid var(--border-strong);border-radius:2px;
  background:var(--cream);font-family:inherit;font-size:13.5px;color:var(--ink);
  transition:border-color .2s,background .2s;width:100%;
}
.inp:focus{outline:none;border-color:var(--olive);background:#fff}
/* a11y: focus visible para teclado en botones/links (WCAG 2.4.7) */
button:focus-visible,a:focus-visible,[role="button"]:focus-visible{outline:2px solid var(--olive);outline-offset:2px;border-radius:4px}
.inp:focus-visible{outline:2px solid var(--olive);outline-offset:1px}
textarea.inp{resize:vertical;min-height:88px;line-height:1.5;font-family:inherit}
select.inp{appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236B6650' stroke-width='1.5'><path d='M6 9l6 6 6-6'/></svg>");background-repeat:no-repeat;background-position:right 12px center;background-size:14px;padding-right:36px}

.stat{padding:20px 22px;background:var(--cream);border:1px solid var(--border);border-radius:2px}
.stat .lb{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.stat .val{font-family:'Fraunces',serif;font-size:34px;line-height:1;color:var(--ink);font-weight:400;letter-spacing:-.02em}
.stat .delta{margin-top:8px;font-size:11.5px;color:var(--muted)}
.stat .delta.up{color:var(--success)}
.stat .delta.dn{color:var(--danger)}

.tbl{width:100%;border-collapse:collapse;font-size:13.5px}
.tbl th{
  text-align:left;padding:12px 16px;
  font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);
  border-bottom:1px solid var(--border);font-weight:400;
  background:rgba(26,24,16,.02);
}
.tbl td{padding:14px 16px;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr{cursor:pointer;transition:background .15s}
.tbl tr:hover{background:rgba(94,107,46,.04)}
.tbl tr.active{background:rgba(94,107,46,.08)}
.tbl td .t-name{font-weight:500;color:var(--ink)}
.tbl td .t-sub{font-size:11.5px;color:var(--muted);margin-top:2px}

.chip{
  display:inline-flex;align-items:center;gap:6px;
  padding:3px 9px;border-radius:2px;
  font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;
  background:rgba(26,24,16,.06);color:var(--muted);
}
.chip.ok{background:rgba(74,107,46,.12);color:var(--success)}
.chip.wait{background:rgba(184,196,129,.3);color:var(--olive-dk)}
.chip.warn{background:rgba(196,130,46,.14);color:#8B5A1F}
.chip.err{background:rgba(163,59,42,.12);color:var(--danger)}
.chip.dk{background:var(--ink);color:var(--cream)}
.chip.live::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

.tabs{display:inline-flex;background:rgba(26,24,16,.05);border-radius:3px;padding:3px;gap:2px}
.tabs button{
  padding:7px 14px;border:none;background:transparent;
  font-family:inherit;font-size:12px;color:var(--muted);
  border-radius:2px;cursor:pointer;transition:all .2s;letter-spacing:.01em;
}
.tabs button:hover{color:var(--ink)}
.tabs button.on{background:var(--cream);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.06)}

.drawer-ov{position:fixed;inset:0;z-index:90;background:rgba(26,24,16,.45);opacity:0;pointer-events:none;transition:opacity .3s}
.drawer-ov.open{opacity:1;pointer-events:auto}
.drawer{
  position:fixed;top:0;right:0;bottom:0;width:min(560px,92vw);z-index:91;
  background:var(--bone);border-left:1px solid var(--border);
  transform:translateX(100%);transition:transform .4s cubic-bezier(.2,.8,.2,1);
  display:flex;flex-direction:column;
  box-shadow:-20px 0 60px rgba(26,24,16,.15);
}
.drawer.open{transform:translateX(0)}
.drawer-hd{padding:22px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--cream)}
.drawer-hd h2{font-family:'Fraunces',serif;font-size:24px;font-weight:400;letter-spacing:-.015em}
.drawer-hd h2 em{font-style:italic;color:var(--olive)}
.drawer-bd{flex:1;overflow-y:auto;padding:28px}
.drawer-ft{padding:18px 28px;border-top:1px solid var(--border);display:flex;justify-content:space-between;gap:10px;background:var(--cream)}

.tg{position:relative;display:inline-flex;align-items:center;cursor:pointer;gap:10px}
.tg input{position:absolute;opacity:0;pointer-events:none}
.tg .trk{width:36px;height:20px;background:rgba(26,24,16,.15);border-radius:20px;position:relative;transition:background .25s}
.tg .trk::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;background:var(--cream);border-radius:50%;transition:left .25s}
.tg input:checked + .trk{background:var(--olive)}
.tg input:checked + .trk::after{left:18px}
.tg .lb{font-size:13px;color:var(--ink)}

.strip{
  background:var(--olive-dk);color:var(--cream);
  padding:28px 32px;border-radius:2px;
  display:grid;grid-template-columns:1.5fr 1fr;gap:24px;align-items:center;
  margin-bottom:28px;
}
.strip h2{font-family:'Fraunces',serif;font-size:32px;font-weight:400;letter-spacing:-.015em;line-height:1.1}
.strip h2 em{font-style:italic;color:var(--olive-soft)}
.strip p{font-size:13px;color:rgba(250,247,239,.7);margin-top:8px;max-width:48ch}
.strip .kpis{display:flex;gap:24px;justify-content:flex-end}
.strip .kpi .lb{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:rgba(250,247,239,.5);margin-bottom:6px}
.strip .kpi .v{font-family:'Fraunces',serif;font-size:30px;line-height:1;color:var(--olive-soft)}
@media(max-width:700px){.strip{grid-template-columns:1fr}.strip .kpis{justify-content:flex-start}}

.empty{padding:60px 32px;text-align:center;background:var(--cream);border:1px dashed var(--border-strong);border-radius:2px}
.empty .ic{width:48px;height:48px;border-radius:50%;background:var(--bone);display:inline-flex;align-items:center;justify-content:center;margin-bottom:14px;color:var(--olive)}
.empty h3{font-family:'Fraunces',serif;font-size:22px;font-weight:400;margin-bottom:6px}
.empty p{color:var(--muted);font-size:13px;max-width:40ch;margin:0 auto 16px}

.divider{height:1px;background:var(--border);margin:24px 0}

.sel-chip{
  display:inline-flex;align-items:center;gap:6px;padding:8px 12px;border-radius:2px;
  border:1px solid var(--border-strong);font-size:12.5px;cursor:pointer;user-select:none;
  transition:all .2s;background:var(--cream);
}
.sel-chip:hover{border-color:var(--ink)}
.sel-chip.on{background:var(--olive);color:var(--cream);border-color:var(--olive)}
.sel-chip .x{width:12px;height:12px;display:inline-flex;align-items:center;justify-content:center;border:1.5px solid currentColor;border-radius:2px;opacity:.6}
.sel-chip.on .x{background:currentColor;opacity:1}
.sel-chip.on .x::after{content:'✓';color:var(--olive);font-size:9px;font-weight:700}

.cell-free:hover{background:rgba(163,59,42,.05) !important}
.cell-blk:hover{background:repeating-linear-gradient(135deg,rgba(74,107,46,.22) 0,rgba(74,107,46,.22) 6px,rgba(74,107,46,.1) 6px,rgba(74,107,46,.1) 12px) !important}
.cell-hint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;pointer-events:none}
.cell-free:hover .cell-hint,.cell-blk:hover .cell-hint{opacity:1}

/* Service card order rail */
.svc-ord{width:32px}
.svc-ord-btn{border:none;background:transparent;padding:8px 0;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s}
.svc-ord-btn:hover:not(:disabled){background:rgba(94,107,46,.1);color:var(--olive-dk)}
.svc-ord-btn:disabled{opacity:.25;cursor:not-allowed}
.svc-ord-btn:first-child{border-bottom:1px solid var(--border)}
.svc-ord-btn:last-child{border-top:1px solid var(--border)}

/* Week grid */
.wg-row{display:grid;grid-template-columns:64px repeat(var(--wg-days,6), 1fr);border-bottom:1px solid var(--border)}
.wg-head{position:sticky;top:0;z-index:3;background:var(--cream);box-shadow:0 1px 0 var(--border)}
.wg-head .wg-dayhd{padding:12px 8px;text-align:center;border-left:1px solid var(--border)}
.wg-dow{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase}
.wg-dnum{font-family:'Fraunces',serif;font-size:20px;margin-top:2px}
.wg-time{padding:2px 8px 0;font-size:10px;color:var(--muted);letter-spacing:.05em;text-align:right;min-height:44px;background:rgba(26,24,16,.02);opacity:.5;font-variant-numeric:tabular-nums}
.wg-time-full{opacity:1;font-weight:500;color:var(--ink)}
@media(max-width:640px){
  .wg-row{grid-template-columns:40px repeat(var(--wg-days,6), 1fr)}
  .wg-head .wg-dayhd{padding:8px 2px}
  .wg-dow{font-size:8.5px;letter-spacing:.08em}
  .wg-dnum{font-size:15px;margin-top:1px}
  .wg-time{padding:2px 4px 0;font-size:9px;letter-spacing:0}
}

@media(max-width:900px){
  .topbar h1{font-size:20px}
  .topbar{padding:12px 16px}
  .strip{padding:16px 18px;grid-template-columns:1fr;gap:10px;margin-bottom:18px}
  .strip h2{font-size:18px;line-height:1.15}
  .strip .sec-label{font-size:9px;letter-spacing:.15em}
  .strip p{display:none}
  .strip .kpis{gap:20px;justify-content:flex-start;margin-top:2px}
  .strip .kpi .lb{font-size:9px;margin-bottom:2px}

const exportApptsCSV = (rows, svcMap, period="period") => {
  const headers = ["Fecha","Horario","Cliente","Teléfono","Email","Servicio","Duración","Estado","Precio","Cupón","Método de pago","Notas"];
  const lines = [headers.join(";")];
  rows.forEach(a=>{
    const svc = svcMap[a.service_id];
    lines.push([
      a.appointment_date,
      a.time_slot,
      a.client_name||"",
      a.client_phone||"",
      a.client_email||"",
      svc?.name||"",
      svc?.duration_minutes ? svc.duration_minutes+" min" : "",
      STATUS_LABELS_ES[a.status]||a.status||"",
      a.charged_price || svc?.price || 0,
      a.coupon_code||"",
      a.payment_method||"",
      (a.notes||"").replace(/\r?\n/g," "),
    ].map(csvEscape).join(";"));
  });
  const blob = new Blob(["\ufeff"+lines.join("\r\n")], {type:"text/csv;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  const today = new Date().toISOString().slice(0,10);
  link.href = url;
  link.download = `gf-studio_turnos_${period}_${today}.csv`;
  document.body.appendChild(link);

  document.body.removeChild(link);

};

const beep = () => {
  if(isSoundMuted()) return;
  try{
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if(!Ctx) return;
    const ctx = new Ctx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = "sine";
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.frequency.setValueAtTime(1320, ctx.currentTime+0.12);
    gain.gain.setValueAtTime(0.14, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.4);
    osc.connect(gain).connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime+0.4);
    setTimeout(()=>ctx.close().catch(()=>{}), 500);
  }catch(_){}
};

const TurnosTab = ({appts, services, blocks, settings, refetch}) => {
  const svcMap = useMemo(()=>Object.fromEntries(services.map(s=>[s.id,s])), [services]);
  const todayISO = toISO(TODAY);

  const getMonday = (iso) => {
    const d = new Date(iso+"T12:00:00");
    const dow = d.getDay();
    const monday = new Date(d);
    monday.setDate(d.getDate()-(dow===0?6:dow-1));
    return toISO(monday);
  };

  const [selectedDate, setSelectedDate] = useState(todayISO);
  const [windowStart, setWindowStart] = useState(()=>getMonday(todayISO));
  const [selected, setSelected] = useState(null);
  const [creating, setCreating] = useState(false);

  // Sliding 7-day window starting at windowStart
  const weekDays = useMemo(()=>{
    const d = new Date(windowStart+"T12:00:00");
    return Array.from({length:7},(_,i)=>{
      const day = new Date(d);
      day.setDate(d.getDate()+i);
      return toISO(day);
    });
  }, [windowStart]);

  const countByDay = useMemo(()=>{
    const c={};
    for(const a of appts) if(a.status!=="cancelled") c[a.appointment_date]=(c[a.appointment_date]||0)+1;
    return c;
  }, [appts]);

  const dayAppts = useMemo(()=>
    appts.filter(a=>a.appointment_date===selectedDate && a.status!=="cancelled")
         .sort((a,b)=>a.time_slot.localeCompare(b.time_slot)),
    [appts, selectedDate]
  );

  // Move both selectedDate and window together
  const moveDate = (days) => {
    const sd = new Date(selectedDate+"T12:00:00");
    sd.setDate(sd.getDate()+days);
    const ws = new Date(windowStart+"T12:00:00");
    ws.setDate(ws.getDate()+days);
    setSelectedDate(toISO(sd));
    setWindowStart(toISO(ws));
  };

  const updateAppt = async (id, patch) => {
    const {error} = await sb.from("gf_appointments").update(patch).eq("id",id);
    if(error){ toast("Error: "+error.message); return; }
    if(selected?.id===id) setSelected(s=>({...s,...patch}));
    refetch(); toast("Cambios guardados");
  };

  const deleteAppt = async (id) => {
    if(!confirm("¿Eliminar turno definitivamente?")) return;
    await sb.from("gf_appointments").delete().eq("id",id);
    setSelected(null); refetch(); toast("Turno eliminado");
  };

  const DAY_ABBR = ["dom","lun","mar","mié","jue","vie","sáb"];
  const navBtn = {
    border:"1px solid var(--border)",borderRadius:8,background:"transparent",
    cursor:"pointer",color:"var(--ink)",display:"flex",alignItems:"center",justifyContent:"center",
    flexShrink:0,padding:0
  };

  return (
    <>
      <div className="strip">
        <div>
          <div className="sec-label" style={{color:"rgba(250,247,239,.6)"}}>Agenda · {fDateLong(todayISO)}</div>
          <h2 className="mt-2">
            {dayAppts.length>0
              ? <>{dayAppts.length} turno{dayAppts.length!==1?"s":""} · <em>{fDate(selectedDate)}</em></>
              : <>Sin turnos · <em>{fDate(selectedDate)}</em></>}
          </h2>
        </div>
      </div>

      {/* ── Week date picker ── */}
      <div className="card" style={{padding:"10px 8px",marginBottom:12}}>
        <div style={{display:"flex",alignItems:"center",gap:3}}>
          <div style={{display:"flex",flexDirection:"column",gap:3,flexShrink:0}}>
            <button onClick={()=>moveDate(-7)} style={{...navBtn,width:34,height:22,fontSize:13,fontWeight:700}}>«</button>
            <button onClick={()=>moveDate(-1)} style={{...navBtn,width:34,height:22,fontSize:17}}>‹</button>
          </div>

          <div style={{flex:1,display:"flex",gap:2}}>
            {weekDays.map(iso=>{
              const d = new Date(iso+"T12:00:00");
              const abbr = DAY_ABBR[d.getDay()];
              const dayNum = d.getDate();
              const isSel = iso===selectedDate;
              const isToday = iso===todayISO;
              const count = countByDay[iso]||0;
              return (
                <button key={iso} onClick={()=>setSelectedDate(iso)} style={{
                  flex:1,display:"flex",flexDirection:"column",alignItems:"center",
                  padding:"7px 2px 5px",borderRadius:10,border:"none",
                  background:isSel?"var(--olive)":"transparent",
                  color:isSel?"var(--cream)":isToday?"var(--olive)":"var(--ink)",
                  cursor:"pointer",gap:2,minWidth:0
                }}>
                  <span style={{fontSize:9.5,fontFamily:"'JetBrains Mono',monospace",letterSpacing:".02em",opacity:.85}}>{abbr}</span>
                  <span style={{fontSize:16,fontWeight:700,lineHeight:1.2}}>{dayNum}</span>
                  {count>0
                    ? <span style={{
                        width:17,height:17,borderRadius:"50%",fontSize:10,fontWeight:700,
                        background:isSel?"rgba(255,255,255,.25)":"var(--olive)",
                        color:"var(--cream)",display:"flex",alignItems:"center",justifyContent:"center"
                      }}>{count}</span>
                    : <span style={{width:17,height:17}}/>
                  }
                </button>
              );
            })}
          </div>

          <div style={{display:"flex",flexDirection:"column",gap:3,flexShrink:0}}>
            <button onClick={()=>moveDate(7)} style={{...navBtn,width:34,height:22,fontSize:13,fontWeight:700}}>»</button>
            <button onClick={()=>moveDate(1)} style={{...navBtn,width:34,height:22,fontSize:17}}>›</button>
          </div>
        </div>
      </div>

      {/* ── Appointment cards ── */}
      <div style={{marginBottom:16}}>
        {dayAppts.length===0 ? (
          <div className="card"><div className="card-empty">Sin turnos para este día.</div></div>
        ) : dayAppts.map(a=>{
          const svc = svcMap[a.service_id];
          const initials = (a.client_name||"?").split(" ").slice(0,2).map(w=>w[0]||"").join("").toUpperCase()||"?";
          const isPending = a.status==="pending";
          return (
            <div key={a.id} onClick={()=>setSelected(a)} style={{
              display:"flex",alignItems:"center",gap:12,
              background:"var(--cream)",borderRadius:10,padding:"12px 14px",marginBottom:8,
              cursor:"pointer",
              border:isPending?"1.5px solid var(--olive)":"1px solid var(--border)",
              boxShadow:"0 1px 3px rgba(0,0,0,.04)"
            }}>
              <div style={{
                width:40,height:40,borderRadius:"50%",
                background:isPending?"var(--olive-soft)":"#d8d4c8",
                display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:14,fontWeight:700,
                color:isPending?"var(--cream)":"var(--muted)",
                flexShrink:0,fontFamily:"'Fraunces',serif"
              }}>{initials}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:600,fontSize:14.5,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{a.client_name||"—"}</div>
                <div style={{fontSize:12,color:"var(--muted)",marginTop:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                  {svc?.name||"—"} <span style={{opacity:.7}}>({svc?fDur(svc.duration_minutes):"—"})</span>
                </div>
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:5,flexShrink:0}}>
                <span style={{
                  background:"var(--olive)",color:"var(--cream)",borderRadius:6,
                  padding:"2px 8px",fontSize:11.5,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"
                }}>{a.appointment_date.slice(8,10)}/{a.appointment_date.slice(5,7)}</span>
                <span style={{fontSize:12,color:"var(--muted)",display:"flex",alignItems:"center",gap:3}}>
                  <Icon name="clock" size={11}/> {a.time_slot}
                </span>
              </div>
            </div>
          );
        })}
      </div>

      {/* ── Bottom buttons ── */}
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        <button className="btn btn-pr" style={{width:"100%",padding:"13px 16px",fontSize:15,justifyContent:"center"}}
          onClick={()=>setCreating(true)}>
          Turno para cliente <strong style={{marginLeft:4}}>NUEVO</strong>
        </button>
        <button className="btn btn-sc" style={{width:"100%",padding:"13px 16px",fontSize:15,justifyContent:"center"}}
          onClick={()=>setCreating(true)}>
          Turno para cliente <strong style={{marginLeft:4}}>EXISTENTE</strong>
        </button>
      </div>

      <Drawer open={!!selected} onClose={()=>setSelected(null)}
        subtitle={selected ? `Turno · ${fDate(selected.appointment_date)} ${selected.time_slot}`:""}
        title={selected ? selected.client_name : ""}
        footer={selected && (
          <>
            <button className="btn btn-dg" onClick={()=>deleteAppt(selected.id)}><Icon name="trash" size={14}/> Eliminar</button>
            <div className="flex gap-2">
              <button className="btn btn-sc" onClick={()=>setSelected(null)}>Cerrar</button>
            </div>
          </>
        )}>
        {selected && <ApptDetail a={selected} svc={svcMap[selected.service_id]} onUpdate={p=>updateAppt(selected.id,p)} services={services} appts={appts} blocks={blocks} settings={settings}/>}
      </Drawer>

      <NewApptDrawer open={creating} onClose={()=>setCreating(false)} services={services} appts={appts} blocks={blocks} settings={settings} onCreated={()=>{ setCreating(false); refetch(); toast("Turno creado"); }}/>
    </>
  );
};

const NewApptDrawer = ({open, onClose, services, appts, blocks, settings, onCreated}) => {
  const [form, setForm] = useState(null);
  const [clientSuggestions, setClientSuggestions] = useState([]);
  const [showSuggestions, setShowSuggestions] = useState(false);

  // Build unique client list from appts for autocomplete
  const knownClients = useMemo(()=>{
    const map = new Map();
    for(const a of appts){
      const phone = (a.client_phone||"").replace(/\s/g,"");
      if(!phone || map.has(phone)) continue;
      map.set(phone, { name:a.client_name||"", phone:a.client_phone||"", email:a.client_email||"" });
    }
    return Array.from(map.values());
  }, [appts]);

  useEffect(()=>{
    if(open){
      setForm({
        service_id: services[0]?.id || null,
        appointment_date: toISO(TODAY),
        time_slot: "",
        client_name: "",
        client_phone: "+549 ",
        client_email: "",
        notes: "",
        status: "confirmed",
      });
      setClientSuggestions([]);
      setShowSuggestions(false);
    }
  }, [open]);

  const searchClients = (query) => {
    if(!query || query.length<2){ setClientSuggestions([]); setShowSuggestions(false); return; }
    const q = query.toLowerCase();
    const matches = knownClients.filter(c => c.name.toLowerCase().includes(q) || c.phone.includes(q)).slice(0,5);
    setClientSuggestions(matches);
    setShowSuggestions(matches.length>0);
  };

  const pickClient = (c) => {
    setForm(f=>({...f, client_name:c.name, client_phone:c.phone, client_email:c.email}));
    setShowSuggestions(false);
  };

  const u = (k,v) => setForm(f=>({...f,[k]:v}));
  const svc = useMemo(()=> services.find(s=>s.id===form?.service_id) || null, [services, form?.service_id]);

  const timeOptions = useMemo(()=>{
    if(!form || !svc) return [];
    const dur = svc.duration_minutes||60;
    const out = [];
    const brkS = settings.break_start||0, brkE = settings.break_end||0;
    for(let m=settings.open_min; m+dur<=settings.close_min; m+=settings.slot_step){
      // Skip slots that overlap with break
      if(brkS>0 && brkE>brkS && m<brkE && m+dur>brkS) continue;
      const t = toHHMM(m);
      const ok = slotAvailable(t, dur, appts, services, blocks, form.appointment_date);
      out.push({ t, ok });
    }
    return out;
  }, [form?.appointment_date, form?.service_id, svc, appts, services, blocks, settings]);

  // Auto-clear selected time if it becomes invalid
  useEffect(()=>{
    if(!form || !form.time_slot) return;
    const match = timeOptions.find(o=>o.t===form.time_slot);
    if(!match || !match.ok) setForm(f=>({...f, time_slot:""}));
  }, [timeOptions]);

  const phoneDigits = (form?.client_phone||"").replace(/\D/g,"").replace(/^549/,"");
  const canSave = form && form.service_id && form.appointment_date && form.time_slot && form.client_name.trim() && phoneDigits.length>=8;

  const save = async () => {
    if(!canSave) return;
    const payload = {
      service_id: form.service_id,
      appointment_date: form.appointment_date,
      time_slot: form.time_slot,
      client_name: form.client_name.trim(),
      client_phone: form.client_phone.trim(),
      client_email: form.client_email.trim() || null,
      notes: form.notes.trim() || null,
      status: form.status,
    };
    // Re-check collision with fresh DB read (defensive)
    const { data:fresh } = await sb.from("gf_appointments").select("time_slot,service_id,status").eq("appointment_date", form.appointment_date);
    const dur = svc.duration_minutes||60;
    const sMin = toMin(form.time_slot), eMin = sMin+dur;
    const collision = (fresh||[]).some(r=>{
      if(r.status==="cancelled") return false;
      const aMin = toMin(r.time_slot);
      const aDur = (services.find(s=>s.id===r.service_id)?.duration_minutes)||60;
      return aMin<eMin && (aMin+aDur)>sMin;
    });
    if(collision){ toast("Ese horario ya se reservó. Elegí otro."); return; }
    const { error } = await sb.from("gf_appointments").insert(payload);
    if(error){ toast("Error: "+error.message); return; }
    // Best-effort: upsert to gf_clients (table may not exist)
    try { await sb.from("gf_clients").upsert({ name:payload.client_name, phone:payload.client_phone, email:payload.client_email },{ onConflict:"phone" }); } catch(_){}
    onCreated();
  };

  return (
    <Drawer open={open} onClose={onClose} subtitle="Turno manual" title={<>Nuevo <em>turno</em></>}
      footer={form && (
        <>
          <div/>
          <div className="flex gap-2">
            <button className="btn btn-sc" onClick={onClose}>Cancelar</button>
            <button className="btn btn-pr" disabled={!canSave} onClick={save}><Icon name="check" size={13}/> Guardar</button>
          </div>
        </>
      )}>
      {form && (
        <div className="flex flex-col gap-5">
          <Field label="Servicio">
            <select className="inp" value={form.service_id||""} onChange={e=>u("service_id", Number(e.target.value))}>
              {services.map(s=><option key={s.id} value={s.id}>{s.name} · {fDur(s.duration_minutes||60)} · {fP(s.price)}</option>)}
            </select>
          </Field>
          <div className="flex flex-col sm:flex-row gap-3">
            <Field label="Fecha" grow>
              <input className="inp" type="date" min={toISO(TODAY)} value={form.appointment_date} onChange={e=>u("appointment_date", e.target.value)}/>
            </Field>
            <Field label="Horario" grow>
              <select className="inp" value={form.time_slot} onChange={e=>u("time_slot", e.target.value)}>
                <option value="">Elegí un horario…</option>

const CASH_DISCOUNT = 0.10; // 10% descuento efectivo

const ApptDetail = ({a, svc, onUpdate, services, appts, blocks, settings}) => {
  const listPrice = svc?.price || 0;
  const saveTimer = useRef(null);
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);
  const [reschedule, setReschedule] = useState(false);
  const [newDate, setNewDate] = useState(a.appointment_date);
  const [newTime, setNewTime] = useState(a.time_slot);

  const [draft, setDraft] = useState({
    client_name: a.client_name||"",
    client_phone: a.client_phone||"",
    client_email: a.client_email||"",
    notes: a.notes||"",
    charged_price: a.charged_price ?? "",
    payment_method: a.payment_method||"",
    coupon_code: a.coupon_code||"",
    status: a.status,
  });
  useEffect(()=>{
    setDraft({
      client_name: a.client_name||"",
      client_phone: a.client_phone||"",
      client_email: a.client_email||"",
      notes: a.notes||"",
      charged_price: a.charged_price ?? "",
      payment_method: a.payment_method||"",
      coupon_code: a.coupon_code||"",
      status: a.status,
    });
    setNewDate(a.appointment_date);
    setNewTime(a.time_slot);
    setReschedule(false);
  },[a.id]);

  // Auto-save with debounce
  const autoSave = useCallback((nextDraft) => {
    if(saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(()=>{
      const patch = {
        client_name: nextDraft.client_name.trim(),
        client_phone: nextDraft.client_phone.trim(),
        client_email: nextDraft.client_email.trim()||null,
        notes: nextDraft.notes.trim()||null,
        charged_price: nextDraft.charged_price===""?null:Number(nextDraft.charged_price),
        payment_method: nextDraft.payment_method||null,
        coupon_code: nextDraft.coupon_code.trim()||null,
        status: nextDraft.status,
      };
      setSaving(true);
      onUpdate(patch);
      setSaving(false);
      setSaved(true);
      setTimeout(()=>setSaved(false), 1500);
    }, 800);
  }, [onUpdate]);

  // Cleanup timer on unmount
  useEffect(()=>()=>{ if(saveTimer.current) clearTimeout(saveTimer.current); },[]);

  const u = (k,v) => {
    setDraft(d=>{
      const next = {...d,[k]:v};
      if(k==="payment_method" && v==="efectivo" && listPrice>0){
        next.charged_price = Math.round(listPrice * (1 - CASH_DISCOUNT));
      }
      if(k==="payment_method" && v!=="efectivo" && d.payment_method==="efectivo" && Number(d.charged_price)===Math.round(listPrice*(1-CASH_DISCOUNT))){
        next.charged_price = "";
      }
      autoSave(next);
      return next;
    });
  };

  // Reschedule: available time slots for new date
  const rescheduleSlots = useMemo(()=>{
    if(!reschedule || !svc) return [];
    const dur = svc.duration_minutes||60;
    const brkS = settings.break_start||0, brkE = settings.break_end||0;
    const out = [];
    for(let m=settings.open_min; m+dur<=settings.close_min; m+=settings.slot_step){
      if(brkS>0 && brkE>brkS && m<brkE && m+dur>brkS) continue;
      const t = toHHMM(m);
      // Check availability (exclude current appointment from collision check)
      const ok = slotAvailable(t, dur, appts.filter(x=>x.id!==a.id), services, blocks, newDate);
      out.push({t, ok});
    }
    return out;
  }, [reschedule, newDate, svc, appts, services, blocks, settings, a.id]);

  const doReschedule = async () => {
    if(!newTime || (newDate===a.appointment_date && newTime===a.time_slot)){ setReschedule(false); return; }
    // Verify no collision with fresh data
    const dur = svc?.duration_minutes||60;
    const{data:fresh} = await sb.from("gf_appointments").select("id,time_slot,service_id,status").eq("appointment_date",newDate);
    const sMin = toMin(newTime), eMin = sMin+dur;
    const collision = (fresh||[]).some(r=>{
      if(r.id===a.id || r.status==="cancelled") return false;
      const aMin = toMin(r.time_slot);
      const aDur = (services.find(s=>s.id===r.service_id)?.duration_minutes)||60;
      return aMin<eMin && (aMin+aDur)>sMin;
    });
    if(collision){ toast("Ese horario está ocupado"); return; }
    onUpdate({appointment_date:newDate, time_slot:newTime});
    setReschedule(false);
    toast("Turno movido");
  };

  const waConfirm = () => {
    onUpdate({status:"confirmed"});
    const url = `https://wa.me/${waTel(a.client_phone)}?text=${encodeURIComponent(waMsgConfirm(a, svc))}`;
    window.open(url,"_blank");
  };
  const cancelAppt = () => {
    if(!confirm("¿Cancelar este turno?")) return;
    onUpdate({status:"cancelled"});
    toast("Turno cancelado");
  };

  const isCashDiscount = draft.payment_method==="efectivo" && listPrice>0;

  return (
    <div className="flex flex-col gap-4">
      {/* Resumen compacto */}
      <div className="flex items-start justify-between gap-3 py-3 px-4 rounded" style={{background:"rgba(94,107,46,.06)",border:"1px solid var(--border)"}}>
        <div style={{minWidth:0,flex:1}}>
          <div className="serif" style={{fontSize:16,lineHeight:1.3}}>{svc?.name||"—"}</div>
          <div className="mono" style={{fontSize:11,color:"var(--muted)",marginTop:2}}>{fDate(a.appointment_date)} · {a.time_slot} hs · {svc?.duration_minutes ? fDur(svc.duration_minutes) : "—"}</div>
          {a.created_at && <div className="mono" style={{fontSize:10,color:"var(--muted)",marginTop:2}}>Reservado {fDateTime(a.created_at)}</div>}
        </div>
        <div className="flex items-center gap-2">
          {saved && <span className="mono" style={{fontSize:10,color:"var(--success)"}}>Guardado</span>}
          {saving && <span className="mono" style={{fontSize:10,color:"var(--muted)"}}>Guardando…</span>}
          <Chip tone={STATUS_TONES[a.status]||"neutral"}>{STATUS_LABELS[a.status]||a.status}</Chip>
        </div>
      </div>

      {/* Acciones rápidas */}
      <div className="flex gap-2 flex-wrap">
        {a.client_phone && a.status!=="confirmed" && <button className="btn btn-pr btn-sm" onClick={waConfirm}><Icon name="check" size={13}/> Confirmar + WA</button>}
        {a.status!=="cancelled" && <button className="btn btn-sc btn-sm" onClick={cancelAppt}><Icon name="x" size={13}/> Cancelar turno</button>}
        {a.client_phone && <a className="btn btn-wa btn-sm" target="_blank" href={`https://wa.me/${waTel(a.client_phone)}`}><Icon name="phone" size={13}/> Chat</a>}
        <button className="btn btn-sc btn-sm" onClick={()=>setReschedule(!reschedule)}><Icon name="calendar" size={13}/> {reschedule?"Cancelar":"Mover turno"}</button>
      </div>

      {/* Reagendar */}
      {reschedule && (
        <div className="flex flex-col gap-3 py-3 px-4 rounded" style={{background:"rgba(94,107,46,.04)",border:"1px dashed var(--olive-soft)"}}>
          <div className="sec-label">Mover turno</div>
          <div className="flex gap-3">
            <Field label="Nueva fecha" grow>
              <input className="inp" type="date" value={newDate} onChange={e=>{setNewDate(e.target.value);setNewTime("")}} min={toISO(TODAY)}/>
            </Field>
            <Field label="Nuevo horario" grow>
              <select className="inp" value={newTime} onChange={e=>setNewTime(e.target.value)}>
                <option value="">Elegí…</option>
                {rescheduleSlots.map(o=>(
                  <option key={o.t} value={o.t} disabled={!o.ok}>{o.t}{o.ok?"":" — ocupado"}</option>
                ))}
              </select>
            </Field>
          </div>
          <button className="btn btn-pr btn-sm" disabled={!newTime || (newDate===a.appointment_date && newTime===a.time_slot)} onClick={doReschedule}>
            <Icon name="check" size={13}/> Confirmar cambio
          </button>
        </div>
      )}

      {/* Cliente */}
      <div className="flex flex-col gap-3">
        <div className="sec-label">Cliente</div>
        <Field label="Nombre"><input className="inp" value={draft.client_name} onBlur={()=>autoSave(draft)} onChange={e=>u("client_name",e.target.value)}/></Field>
        <div className="flex gap-3">
          <Field label="Teléfono" grow><input className="inp" value={draft.client_phone} onBlur={()=>autoSave(draft)} onChange={e=>u("client_phone",e.target.value)}/></Field>
          <Field label="Email" grow><input className="inp" value={draft.client_email} onBlur={()=>autoSave(draft)} onChange={e=>u("client_email",e.target.value)} placeholder="opcional"/></Field>
        </div>
      </div>

      {/* Estado y cobro */}
      <div className="flex flex-col gap-3">
        <div className="sec-label">Estado y cobro</div>
        <div className="flex gap-3">
          <Field label="Estado" grow>
            <select className="inp" value={draft.status} onChange={e=>u("status",e.target.value)}>
              {Object.entries(STATUS_LABELS).map(([k,v])=><option key={k} value={k}>{v}</option>)}
            </select>
          </Field>
          <Field label="Medio de pago" grow>
            <select className="inp" value={draft.payment_method} onChange={e=>u("payment_method",e.target.value)}>
              <option value="">—</option>
              {Object.entries(PAY_LABELS).map(([k,v])=><option key={k} value={k}>{v}</option>)}
            </select>
          </Field>
        </div>
        <div className="flex gap-3 items-end">
          <div style={{flex:"0 0 auto"}}>
            <div className="mono" style={{fontSize:10,letterSpacing:".15em",textTransform:"uppercase",color:"var(--muted)",marginBottom:4}}>Lista</div>
            <div className="mono" style={{fontSize:14,color:"var(--ink)",fontWeight:600}}>{fP(listPrice)}</div>
          </div>
          <Field label={isCashDiscount ? `Cobrado (−${CASH_DISCOUNT*100}% efvo)` : "Monto cobrado"} grow>
            <input className="inp num" type="number" value={draft.charged_price} onChange={e=>{setDraft(d=>({...d,charged_price:e.target.value}));autoSave({...draft,charged_price:e.target.value})}} placeholder={listPrice?String(listPrice):""}/>
          </Field>
        </div>
        {isCashDiscount && Number(draft.charged_price)===Math.round(listPrice*(1-CASH_DISCOUNT)) && (
          <div className="mono" style={{fontSize:10.5,color:"var(--success)",padding:"4px 0"}}>Descuento efectivo aplicado: {fP(listPrice)} → {fP(draft.charged_price)}</div>
        )}
        <Field label="Cupón" grow>
          <input className="inp mono" value={draft.coupon_code} onChange={e=>u("coupon_code",e.target.value.toUpperCase())} placeholder="sin cupón"/>
        </Field>
      </div>

      <Field label="Notas" hint="Internas">
        <textarea className="inp" rows={2} value={draft.notes} onBlur={()=>autoSave(draft)} onChange={e=>u("notes",e.target.value)}/>
      </Field>
    </div>
  );
};

const buildClientes = (appts, services) => {
  const svcMap = Object.fromEntries(services.map(s=>[s.id,s]));
  const map = new Map();
  for(const a of appts){
    const key = (a.client_phone||"").replace(/\s/g,"") || "noph-"+(a.client_name||"");
    const price = a.charged_price || svcMap[a.service_id]?.price || 0;
    const ex = map.get(key);
    if(!ex){
      map.set(key, {
        phone:a.client_phone, name:a.client_name, email:a.client_email||"",
        appts:[a], total:price, lastDate:a.appointment_date, firstDate:a.appointment_date,
        completed: a.status==="completed"?1:0,
        cancelled: a.status==="cancelled"?1:0,
        no_show: a.status==="no_show"?1:0,
        coupons: a.coupon_code?[a.coupon_code]:[],
        notes: a.notes?[{date:a.appointment_date,text:a.notes}]:[],
        aliases: [],
      });
    } else {
      ex.appts.push(a);
      ex.total += price;
      if(a.appointment_date > ex.lastDate) ex.lastDate = a.appointment_date;
      if(a.appointment_date < ex.firstDate) ex.firstDate = a.appointment_date;
      if(a.status==="completed") ex.completed++;
      if(a.status==="cancelled") ex.cancelled++;
      if(a.status==="no_show") ex.no_show++;
      if(a.coupon_code && !ex.coupons.includes(a.coupon_code)) ex.coupons.push(a.coupon_code);
      if(a.notes) ex.notes.push({date:a.appointment_date,text:a.notes});
      if(!ex.email && a.client_email) ex.email = a.client_email;
      // Track silent merges: different name/phone normalized to same key
      const nameDiff = (a.client_name||"").trim().toLowerCase() !== (ex.name||"").trim().toLowerCase();
      const phoneDiff = (a.client_phone||"") !== (ex.phone||"");
      if((nameDiff && a.client_name) || (phoneDiff && a.client_phone)){
        const aliasKey = `${a.client_name||""}|${a.client_phone||""}`;
        if(!ex.aliases.some(x=>`${x.name}|${x.phone}`===aliasKey)) {
          ex.aliases.push({name:a.client_name||"", phone:a.client_phone||""});
        }
      }
    }
  }
  return Array.from(map.values()).sort((a,b)=>(b.lastDate||"").localeCompare(a.lastDate||""));
};
const daysAgo = iso => Math.floor((TODAY - new Date(iso+"T12:00:00"))/86400000);
const relDays = iso => {
  if(!iso) return "";
  const d = daysAgo(iso);
  if(d===0) return "hoy";
  if(d===1) return "ayer";
  if(d===-1) return "mañana";
  if(d>0) return `hace ${d} días`;
  return `en ${-d} días`;
};
const clientTag = c => {
  const d = daysAgo(c.lastDate);
  if(d>90) return {tone:"err",label:"Inactiva"};
  if(c.appts.length===1 && d<=30) return {tone:"wait",label:"Nueva"};
  if(d>30) return {tone:"warn",label:"Dormida"};
  if(c.appts.length>=5) return {tone:"ok",label:"Recurrente"};
  return {tone:"neutral",label:"Regular"};
};
const waMessageFor = (c) => {
  const firstName = ((c.name||"").trim().split(" ")[0]||"").replace(/[^\wáéíóúñÁÉÍÓÚÑ]/g,"");
  const hi = firstName ? `Hola ${firstName}!` : "Hola!";
  const d = daysAgo(c.lastDate);
  if(d>90) return `${hi} Soy Guada de GF Studio 🌿 Hace un tiempo que no nos vemos, te queríamos recordar que seguimos acá. ¿Te armo un turno?`;
  if(d>30) return `${hi} ¿Cómo estás? Soy Guada de GF Studio. ¿Querés que te reserve un turno esta semana?`;
  return `${hi} Soy Guada de GF Studio. `;
};

              {filtered.map(c=>{
                const tag = clientTag(c);
                return (
                  <tr key={(c.phone||"")+(c.name||"")} onClick={()=>setSelected(c)}>
                    <td>
                      <div className="flex items-center gap-3">
                        <div style={{width:36,height:36,flex:"0 0 36px",aspectRatio:"1",borderRadius:"50%",background:"var(--olive)",color:"var(--cream)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Fraunces',serif",fontSize:15}}>{(c.name||"?").trim()[0].toUpperCase()}</div>
                        <div>
                          <div className="t-name">{c.name}</div>
                          <div className="flex items-center gap-1 flex-wrap"><Chip tone={tag.tone}>{tag.label}</Chip>{c.aliases && c.aliases.length>0 && <span title={c.aliases.map(a=>`${a.name||'—'} (${a.phone||'—'})`).join('\n')} style={{fontSize:10,letterSpacing:".08em",textTransform:"uppercase",color:"var(--olive-dk)",cursor:"help"}}>+{c.aliases.length} alias</span>}</div>
                        </div>
                      </div>
                    </td>
                    <td><div className="mono" style={{fontSize:12.5}}>{c.phone||"—"}</div>{c.email && <div className="t-sub">{c.email}</div>}</td>
                    <td>
                      <div className="t-name num">{c.appts.length}</div>
                      <div className="t-sub">{c.completed} realizados{c.cancelled?` · ${c.cancelled} cancel.`:""}</div>
                    </td>
                    <td>
                      <div className="t-name">{fDate(c.lastDate)}</div>
                      <div className="t-sub">{relDays(c.lastDate)}</div>
                    </td>
                    <td className="num"><strong>{fP(c.total)}</strong></td>
                    <td style={{color:"var(--muted)"}}><Icon name="chevron" size={14}/></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}

      <Drawer open={!!selected} onClose={()=>setSelected(null)} width={620}
        subtitle={selected ? `${selected.appts.length} turno${selected.appts.length!==1?"s":""} · ${fP(selected.total)} gastado` : ""}
        title={selected ? selected.name : ""}
        footer={selected && (
          <>
            <div className="flex gap-2 flex-wrap">
              {selected.phone && <a className="btn btn-wa" href={`https://wa.me/${waTel(selected.phone)}?text=${encodeURIComponent(waMessageFor(selected))}`} target="_blank" rel="noopener"><Icon name="phone" size={13}/> WhatsApp</a>}
              {selected.email && <a className="btn btn-sc" href={`mailto:${selected.email}`}><Icon name="mail" size={13}/> Email</a>}

                responses:{}, professional_notes:""
              })}><Icon name="edit" size={13}/> Nueva ficha</button>
              <button className="btn btn-sc" onClick={()=>setEditingClient({
                origPhone: selected.phone||"",
                name: selected.name||"",
                phone: selected.phone||"",
                email: selected.email||"",
              })}><Icon name="edit" size={13}/> Editar</button>
              <button className="btn btn-sc" onClick={()=>setMergingClient({source:selected, targetKey:""})}><Icon name="copy" size={13}/> Fusionar</button>
            </div>
            <button className="btn btn-pr" onClick={()=>setSelected(null)}>Cerrar</button>
          </>
        )}>
        {selected && <ClienteDetail c={selected} svcMap={svcMap} fichas={fichas} questions={fichaQuestions} onEditFicha={setFichaEditing}/>}
      </Drawer>

      <Drawer open={!!editingClient} onClose={()=>setEditingClient(null)}
        subtitle="Clienta · Editar"
        title={<>Editar <em>clienta</em></>}
        footer={editingClient && (
          <>
            <div style={{fontSize:11.5,color:"var(--muted)",flex:1}}>Se actualiza en <strong>todos</strong> los turnos y fichas con el teléfono actual.</div>
            <div className="flex gap-2">
              <button className="btn btn-sc" onClick={()=>setEditingClient(null)}>Cancelar</button>
              <button className="btn btn-pr" onClick={async()=>{
                const d = editingClient;
                if(!d.name?.trim()){ toast("Nombre vacío"); return; }
                const match = d.origPhone ? sb.from("gf_appointments").update({
                  client_name: d.name.trim(),
                  client_phone: d.phone||null,
                  client_email: d.email||null,
                }).eq("client_phone", d.origPhone) : null;
                if(!match){ toast("Clienta sin teléfono — editá cada turno individualmente"); return; }
                const { error: apErr } = await match;
                if(apErr){ toast("Error turnos: "+apErr.message); return; }
                const { error: fhErr } = await sb.from("gf_fichas").update({
                  client_name: d.name.trim(),
                  client_phone: d.phone||"",
                }).eq("client_phone", d.origPhone);
                if(fhErr && !/not.?exist|does not exist/i.test(fhErr.message||"")){ toast("Error fichas: "+fhErr.message); return; }
                setEditingClient(null);
                setSelected(null);
                refetch();
                toast("Clienta actualizada");
              }}>Guardar</button>
            </div>
          </>
        )}>
        {editingClient && <ClientEditor data={editingClient} onChange={setEditingClient}/>}
      </Drawer>

      <Drawer open={!!mergingClient} onClose={()=>setMergingClient(null)}
        subtitle="Clienta · Fusionar"
        title={<>Fusionar <em>con otra clienta</em></>}
        footer={mergingClient && (
          <>
            <div style={{fontSize:11.5,color:"var(--muted)",flex:1}}>Mueve todos los turnos y fichas de <strong>{mergingClient.source.name}</strong> a la clienta destino.</div>
            <div className="flex gap-2">
              <button className="btn btn-sc" onClick={()=>setMergingClient(null)}>Cancelar</button>
              <button className="btn btn-pr" disabled={!mergingClient.targetKey} onClick={async()=>{
                const src = mergingClient.source;
                const tgt = clientes.find(c => ((c.phone||"").replace(/\s/g,"")+(c.name||"")) === mergingClient.targetKey);
                if(!tgt){ toast("Destino inválido"); return; }
                if(!confirm(`¿Fusionar "${src.name}" → "${tgt.name}"? Se moverán ${src.appts.length} turno${src.appts.length!==1?"s":""} + fichas. No se puede deshacer.`)) return;
                if(!src.phone){ toast("Source sin teléfono — no se puede fusionar masivamente"); return; }
                const { error: apErr } = await sb.from("gf_appointments").update({
                  client_phone: tgt.phone||null,
                  client_name: tgt.name||null,
                  client_email: tgt.email||null,
                }).eq("client_phone", src.phone);
                if(apErr){ toast("Error turnos: "+apErr.message); return; }
                const { error: fhErr } = await sb.from("gf_fichas").update({
                  client_phone: tgt.phone||"",
                  client_name: tgt.name||"",
                }).eq("client_phone", src.phone);
                if(fhErr && !/not.?exist|does not exist/i.test(fhErr.message||"")){ toast("Error fichas: "+fhErr.message); return; }
                setMergingClient(null);
                setSelected(null);
                refetch();
                toast("Clientas fusionadas");
              }}>Fusionar</button>
            </div>
          </>
        )}>
        {mergingClient && <ClientMerger source={mergingClient.source} clientes={clientes} targetKey={mergingClient.targetKey} onChange={k=>setMergingClient({...mergingClient, targetKey:k})}/>}
      </Drawer>

      <Drawer open={!!fichaEditing} onClose={()=>setFichaEditing(null)}
        subtitle={fichaEditing?.id ? "Ficha · Editar":"Ficha · Nueva"}
        title={fichaEditing?.id ? <>Editar <em>ficha</em></> : <>Nueva <em>ficha</em></>}
        footer={fichaEditing && (
          <>
            <div>{fichaEditing.id && <button className="btn btn-dg" onClick={async()=>{
              if(!confirm("¿Eliminar esta ficha?")) return;
              const { error } = await sb.from("gf_fichas").delete().eq("id", fichaEditing.id);
              if(error){ toast("Error: "+error.message); return; }
              setFichaEditing(null); refetch(); toast("Ficha eliminada");
            }}><Icon name="trash" size={13}/> Eliminar</button>}</div>
            <div className="flex gap-2">
              <button className="btn btn-sc" onClick={()=>setFichaEditing(null)}>Cancelar</button>
              <button className="btn btn-pr" onClick={async()=>{
                const payload = {
                  client_phone: fichaEditing.client_phone||"",
                  client_name: fichaEditing.client_name||"",
                  responses: fichaEditing.responses||{},
                  professional_notes: fichaEditing.professional_notes||"",
                  updated_at: new Date().toISOString(),
                };
                let error;
                if(fichaEditing.id) ({ error } = await sb.from("gf_fichas").update(payload).eq("id", fichaEditing.id));
                else ({ error } = await sb.from("gf_fichas").insert(payload));
                if(error){ toast("Error: "+error.message); return; }
                setFichaEditing(null); refetch(); toast(fichaEditing.id?"Ficha actualizada":"Ficha guardada");
              }}>Guardar</button>
            </div>
          </>
        )}>
        {fichaEditing && <FichaEditor ficha={fichaEditing} onChange={setFichaEditing} questions={fichaQuestions}/>}
      </Drawer>
    </>
  );
};

const ClientEditor = ({data, onChange}) => {
  const u = (k,v) => onChange({...data,[k]:v});
  const phoneChanged = (data.phone||"") !== (data.origPhone||"");
  return (
    <div className="flex flex-col gap-5">
      <Field label="Nombre" hint="Usá mayúscula inicial — queda uniforme en todos los turnos">
        <input className="inp" value={data.name||""} onChange={e=>u("name",e.target.value)}/>
      </Field>
      <Field label="Teléfono" hint="Con código país. Ej: +5492314573218">
        <input className="inp mono" value={data.phone||""} onChange={e=>u("phone",e.target.value)}/>
      </Field>
      <Field label="Email">
        <input className="inp" type="email" value={data.email||""} onChange={e=>u("email",e.target.value)}/>

      {phoneChanged && (

const ClientMerger = ({source, clientes, targetKey, onChange}) => {
  const [q, setQ] = useState("");
  const sourceKey = (source.phone||"").replace(/\s/g,"") + (source.name||"");
  const candidates = (clientes||[]).filter(c => {
    const key = (c.phone||"").replace(/\s/g,"") + (c.name||"");
    if(key === sourceKey) return false;
    if(!q) return true;
    const s = q.toLowerCase();
    return (c.name||"").toLowerCase().includes(s) || (c.phone||"").includes(s) || (c.email||"").toLowerCase().includes(s);
  });
  return (
    <div className="flex flex-col gap-5">
      <div className="card" style={{background:"var(--cream)"}}>
        <div className="card-bd" style={{padding:14}}>
          <div className="mono" style={{fontSize:10,letterSpacing:".12em",color:"var(--muted)",textTransform:"uppercase",marginBottom:6}}>Origen — se disuelve</div>
          <div style={{fontSize:14,fontWeight:500}}>{source.name}</div>
          <div className="mono" style={{fontSize:12,color:"var(--muted)",marginTop:2}}>{source.phone||"sin teléfono"} · {source.appts.length} turnos</div>
        </div>
      </div>
      <div>
        <div className="sec-label mb-2">Destino</div>
        <div className="relative mb-3">
          <input className="inp" placeholder="Buscar clienta destino…" value={q} onChange={e=>setQ(e.target.value)}/>
        </div>
        <div style={{maxHeight:320,overflowY:"auto",border:"1px solid var(--border)",borderRadius:2}}>
          {candidates.length===0 ? (
            <div style={{padding:"16px 14px",fontSize:12.5,color:"var(--muted)"}}>Sin candidatas.</div>
          ) : candidates.map(c=>{
            const key = (c.phone||"").replace(/\s/g,"") + (c.name||"");
            const active = key === targetKey;
            return (
              <button key={key} onClick={()=>onChange(key)} className="text-left"
                style={{display:"block",width:"100%",padding:"10px 14px",background:active?"var(--olive)":"transparent",color:active?"var(--cream)":"var(--ink)",borderBottom:"1px solid var(--border)",cursor:"pointer"}}>
                <div style={{fontSize:13.5,fontWeight:500}}>{c.name}</div>
                <div className="mono" style={{fontSize:11,marginTop:2,opacity:.75}}>{c.phone||"sin tel"} · {c.appts.length} turnos{c.email?(" · "+c.email):""}</div>
              </button>
            );
          })}
        </div>
      </div>
      {targetKey && (
        <div className="p-3" style={{background:"rgba(196,130,46,.08)",border:"1px solid rgba(196,130,46,.22)",borderRadius:2,fontSize:12,lineHeight:1.5,color:"#8B5A1F"}}>
          Los {source.appts.length} turno{source.appts.length!==1?"s":""} y fichas de <strong>{source.name}</strong> se van a mover a la clienta seleccionada. Esta acción no se puede deshacer.
        </div>
      )}
    </div>
  );
};

/* ============ FICHA EDITOR (usado en Clientes + Ficha tab) ============ */
const FichaEditor = ({ficha, onChange, questions}) => {
  const u = (k,v) => onChange({...ficha,[k]:v});
  const setResponse = (qid, val) => onChange({...ficha, responses:{...(ficha.responses||{}), [qid]:val}});
  const activeQs = (questions||[]).filter(q=>q.active!==false).sort((a,b)=>(a.display_order||0)-(b.display_order||0));
  const byCat = {};
  activeQs.forEach(q=>{ (byCat[q.category||"general"] = byCat[q.category||"general"]||[]).push(q); });
  const catLabels = { habitos:"Hábitos", piel:"Piel", salud:"Salud", rutina:"Rutina", notas:"Notas", general:"General" };
  return (
    <div className="flex flex-col gap-5">
      <div className="flex gap-3">
        <Field label="Nombre" grow><input className="inp" value={ficha.client_name||""} onChange={e=>u("client_name",e.target.value)} placeholder="Nombre de la clienta"/></Field>
        <Field label="Teléfono" grow><input className="inp mono" value={ficha.client_phone||""} onChange={e=>u("client_phone",e.target.value)} placeholder="+54 9 ..."/></Field>
      </div>

      {Object.keys(byCat).length===0 ? (
        <div className="card"><div className="card-empty">
          No hay preguntas configuradas. Andá al tab <strong>Ficha</strong> para agregar preguntas.
        </div></div>
      ) : Object.entries(byCat).map(([cat, qs])=>(
        <div key={cat}>
          <div className="sec-label mb-3">{catLabels[cat]||cat}</div>
          <div className="flex flex-col gap-4">
            {qs.map(q=>{
              const val = (ficha.responses||{})[q.id];
              return (
                <Field key={q.id} label={q.question + (q.required?" *":"")} hint={q.hint}>
                  {q.type==="textarea" && <textarea className="inp" rows="3" value={val||""} onChange={e=>setResponse(q.id,e.target.value)}/>}
                  {q.type==="text" && <input className="inp" value={val||""} onChange={e=>setResponse(q.id,e.target.value)}/>}
                  {q.type==="number" && <input className="inp num" type="number" value={val||""} onChange={e=>setResponse(q.id,e.target.value)}/>}
                  {q.type==="select" && (
                    <select className="inp" value={val||""} onChange={e=>setResponse(q.id,e.target.value)}>
                      <option value="">—</option>
                      {(q.options||[]).map(o=><option key={o} value={o}>{o}</option>)}
                    </select>
                  )}
                  {q.type==="scale" && (
                    <div className="flex gap-2">
                      {[1,2,3,4,5].map(n=>(
                        <button key={n} type="button" onClick={()=>setResponse(q.id,n)} className={"btn btn-sm "+(String(val)===String(n)?"btn-pr":"btn-sc")}>{n}</button>
                      ))}
                    </div>
                  )}
                  {q.type==="boolean" && (
                    <div className="flex gap-2">
                      <button type="button" onClick={()=>setResponse(q.id,"sí")} className={"btn btn-sm "+(val==="sí"?"btn-pr":"btn-sc")}>Sí</button>
                      <button type="button" onClick={()=>setResponse(q.id,"no")} className={"btn btn-sm "+(val==="no"?"btn-pr":"btn-sc")}>No</button>
                    </div>
                  )}
                </Field>
              );
            })}
          </div>
        </div>
      ))}

      <Field label="Observaciones profesionales" hint="Notas internas sobre la sesión (solo las ve el equipo)">
        <textarea className="inp" rows="4" value={ficha.professional_notes||""} onChange={e=>u("professional_notes",e.target.value)}/>
      </Field>
    </div>
  );
};

/* ============ SERVICIOS TAB ============ */
const EMPTY_SVC = { id:null, name:"", description:"", price:0, duration_minutes:60, category:"", active:true, order:99 };

const ServiciosTab = ({services, refetch}) => {
  const [editing, setEditing] = useState(null);
  const [filter, setFilter] = useState("all");
  const [search, setSearch] = useState("");

  const filtered = useMemo(()=>{
    return services.filter(s=>{
      if(filter==="active" && !s.active) return false;
      if(filter==="inactive" && s.active) return false;
      if(search && !s.name.toLowerCase().includes(search.toLowerCase()) && !(s.description||"").toLowerCase().includes(search.toLowerCase())) return false;
      return true;
    }).sort((a,b)=>(a.order||99)-(b.order||99));
  }, [services, filter, search]);

  const save = async (data) => {
    const payload = denormSvc(data);
    let error;
    if(data.id) ({ error } = await sb.from("gf_services").update(payload).eq("id", data.id));
    else ({ error } = await sb.from("gf_services").insert(payload));
    if(error){ toast("Error: "+error.message); return; }
    setEditing(null);
    refetch();
    toast(data.id?"Servicio actualizado":"Servicio creado");
  };
  const del = async (id) => {
    if(!confirm("¿Eliminar este servicio?")) return;
    const { error } = await sb.from("gf_services").delete().eq("id", id);
    if(error){
      // FK violation: turnos o packs apuntan a este servicio
      if(error.code==="23503" || /foreign key|referenc/i.test(error.message||"")){
        if(confirm("No se puede eliminar porque hay turnos o packs que lo referencian. ¿Querés ocultarlo (no aparece en la landing, pero se mantienen los registros históricos)?")){
          const { error: uErr } = await sb.from("gf_services").update({ active:false }).eq("id", id);
          if(uErr){ toast("Error: "+uErr.message); return; }
          setEditing(null);
          refetch();
          toast("Servicio ocultado");
        }
        return;
      }
      toast("Error: "+error.message);
      return;
    }
    setEditing(null);
    refetch();
    toast("Servicio eliminado");
  };
  const duplicate = async (s) => {
    await sb.from("gf_services").insert({...denormSvc(s), name:s.name+" (copia)"});
    refetch();
  };
  const toggleActive = async (s, v) => {
    await sb.from("gf_services").update({ active:v }).eq("id", s.id);
    refetch();
  };
  const moveSvc = async (i, dir) => {
    const target = filtered[i+dir];
    if(!target) return;
    const curr = filtered[i];
    const [ord1, ord2] = [curr.order||99, target.order||99];
    await Promise.all([
      sb.from("gf_services").update({ display_order: ord2 }).eq("id", curr.id),
      sb.from("gf_services").update({ display_order: ord1 }).eq("id", target.id),
    ]);
    refetch();
  };

  const stats = {
    total: services.length,
    active: services.filter(s=>s.active).length,
    avgPrice: Math.round(services.reduce((s,x)=>s+x.price,0)/Math.max(1,services.length)),
    avgDuration: Math.round(services.reduce((s,x)=>s+(x.duration_minutes||0),0)/Math.max(1,services.length)),
  };

  return (
    <>
      <div className="strip">
        <div>
          <div className="sec-label" style={{color:"rgba(250,247,239,.6)"}}>Carta · Servicios</div>
          <h2 className="mt-2">La oferta que ve <em>tu cliente.</em></h2>
          <p>Editá nombres, precios, duración y descripciones. Los cambios se reflejan en la landing apenas guardás.</p>
        </div>
        <div className="kpis">
          <div className="kpi"><div className="lb">Activos</div><div className="v">{stats.active}/{stats.total}</div></div>
          <div className="kpi"><div className="lb">Precio prom.</div><div className="v">{fP(stats.avgPrice)}</div></div>
          <div className="kpi"><div className="lb">Tiempo prom.</div><div className="v">{fDur(stats.avgDuration)}</div></div>
        </div>
      </div>

      <div className="flex flex-wrap gap-3 items-center mb-5 mobile-stack-filters">
        <Tabs value={filter} onChange={setFilter} options={[{v:"all",l:"Todos"},{v:"active",l:"Activos"},{v:"inactive",l:"Inactivos"}]}/>
        <div className="relative flex-1 min-w-[120px] sm:min-w-[200px]">
          <input className="inp" style={{paddingLeft:36}} placeholder="Buscar servicio…" value={search} onChange={e=>setSearch(e.target.value)}/>
          <div style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:"var(--muted)"}}><Icon name="search" size={14}/></div>
        </div>
        <button className="btn btn-pr" onClick={()=>setEditing({...EMPTY_SVC, order:services.length+1})}><Icon name="plus"/> Nuevo servicio</button>
      </div>

      {filtered.length===0 ? (
        <EmptyState icon="sparkle" title="Sin servicios" desc="Creá el primer servicio para que aparezca en la carta." action={<button className="btn btn-pr" onClick={()=>setEditing({...EMPTY_SVC})}><Icon name="plus"/> Nuevo servicio</button>}/>
      ) : (
        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
          {filtered.map((s,i)=>(
            <ServiceCard key={s.id} svc={s} index={i} count={filtered.length} onEdit={()=>setEditing(s)} onDuplicate={()=>duplicate(s)} onToggle={v=>toggleActive(s,v)} onMove={dir=>moveSvc(i,dir)}/>
          ))}
        </div>
      )}

      <Drawer open={!!editing} onClose={()=>setEditing(null)}
        subtitle={editing?.id ? `Servicio · N.º ${String(editing.order||0).padStart(2,'0')}`:"Nuevo"}
        title={editing?.id ? <>Editar <em>{editing.name||""}</em></> : <>Nuevo <em>servicio</em></>}
        footer={editing && (
          <>
            <div>{editing.id && <button className="btn btn-dg" onClick={()=>del(editing.id)}><Icon name="trash" size={14}/> Eliminar</button>}</div>
            <div className="flex gap-2">
              <button className="btn btn-sc" onClick={()=>setEditing(null)}>Cancelar</button>
              <button className="btn btn-pr" onClick={()=>save(editing)}>Guardar</button>
            </div>
          </>
        )}>
        {editing && <ServiceEditor svc={editing} onChange={setEditing}/>}
      </Drawer>
    </>
  );
};

/* ============ CUPONES TAB ============ */
const EMPTY_COUPON = { id:null, code:"", name:"", type:"percent", value:10, active:true, valid_from:null, valid_to:null, max_uses:null, uses_count:0, max_per_client:1, applies_to:"all", applies_ids:[], min_amount:null, first_visit_only:false };
const isCouponActive = c => {
  if(!c.active) return false;
  const today = toISO(TODAY);
  if(c.valid_from && today < c.valid_from) return false;
  if(c.valid_to && today > c.valid_to) return false;
  if(c.max_uses && c.uses_count >= c.max_uses) return false;
  return true;
};
const couponStatus = c => {
  if(!c.active) return {tone:"neutral",label:"Pausado"};
  if(c.max_uses && c.uses_count >= c.max_uses) return {tone:"err",label:"Agotado"};
  const today = toISO(TODAY);
  if(c.valid_from && today < c.valid_from) return {tone:"wait",label:"Pronto"};
  if(c.valid_to && today > c.valid_to) return {tone:"err",label:"Expirado"};
  return {tone:"ok",label:"Activo"};
};

const CuponesTab = ({coupons, services, packs, refetch}) => {
  const [editing, setEditing] = useState(null);
  const [filter, setFilter] = useState("active");
  const filtered = useMemo(()=>coupons.filter(c=>{
    const s = couponStatus(c);
    if(filter==="active" && s.label!=="Activo") return false;
    if(filter==="paused" && c.active) return false;
    if(filter==="expired" && s.label!=="Expirado" && s.label!=="Agotado") return false;
    return true;
  }), [coupons, filter]);

  const save = async (data) => {
    const payload = denormCoupon(data);
    let error;
    if(data.id) ({ error } = await sb.from("gf_coupons").update(payload).eq("id", data.id));
    else ({ error } = await sb.from("gf_coupons").insert(payload));
    if(error){ toast("Error: "+error.message+" — ¿migración aplicada?"); return; }
    setEditing(null);
    refetch();
    toast(data.id?"Cupón actualizado":"Cupón creado");
  };
  const del = async (id) => {
    if(!confirm("¿Eliminar cupón?")) return;
    await sb.from("gf_coupons").delete().eq("id", id);
    setEditing(null);
    refetch();
  };
  const toggleActive = async (c, v) => { await sb.from("gf_coupons").update({ active:v }).eq("id", c.id); refetch(); };

  const stats = useMemo(()=>{
    const activeC = coupons.filter(c=>isCouponActive(c));
    const totalUses = coupons.reduce((s,c)=>s+(c.uses_count||0),0);
    return { active:activeC.length, total:coupons.length, uses:totalUses };
  }, [coupons]);

  return (
    <>
      <div className="strip">
        <div>
          <div className="sec-label" style={{color:"rgba(250,247,239,.6)"}}>Campañas</div>
          <h2 className="mt-2">Cupones de <em>descuento.</em></h2>
          <p>Creá códigos promocionales — % off, monto fijo, con vigencia, límite de usos y reglas.</p>
        </div>
        <div className="kpis">
          <div className="kpi"><div className="lb">Activos</div><div className="v">{stats.active}</div></div>
          <div className="kpi"><div className="lb">Usos totales</div><div className="v">{stats.uses}</div></div>
        </div>
      </div>

      <div className="flex flex-wrap gap-3 items-center mb-5">
        <Tabs value={filter} onChange={setFilter} options={[{v:"active",l:"Activos"},{v:"paused",l:"Pausados"},{v:"expired",l:"Expirados / agotados"},{v:"all",l:"Todos"}]}/>
        <div className="flex-1"/>
        <button className="btn btn-pr" onClick={()=>setEditing({...EMPTY_COUPON, valid_from:toISO(TODAY)})}><Icon name="plus"/> Nuevo cupón</button>
      </div>

      {filtered.length===0 ? (
        <EmptyState icon="ticket" title="Sin cupones" desc="Códigos que tus clientas ingresan al reservar. Ideales para campañas estacionales o primera visita." action={<button className="btn btn-pr" onClick={()=>setEditing({...EMPTY_COUPON})}><Icon name="plus"/> Crear cupón</button>}/>
      ) : (
        <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
          {filtered.map(c=>(
            <CouponCard key={c.id} c={c} onEdit={()=>setEditing(c)} onToggle={v=>toggleActive(c,v)}/>
          ))}
        </div>
      )}

      <Drawer open={!!editing} onClose={()=>setEditing(null)} width={640}
        subtitle={editing?.id?"Editar cupón":"Nuevo cupón"}
        title={editing?.code ? <em>{editing.code}</em> : <>Nuevo <em>cupón</em></>}
        footer={editing && (
          <>
            <div>{editing.id && <button className="btn btn-dg" onClick={()=>del(editing.id)}><Icon name="trash" size={14}/> Eliminar</button>}</div>
            <div className="flex gap-2">
              <button className="btn btn-sc" onClick={()=>setEditing(null)}>Cancelar</button>
              <button className="btn btn-pr" onClick={()=>save(editing)}>Guardar</button>
            </div>
          </>
        )}>
        {editing && <CouponEditor c={editing} onChange={setEditing} services={services} packs={packs}/>}
      </Drawer>
    </>
  );
};

};
